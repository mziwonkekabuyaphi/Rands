<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#cc0000">
    <title>VVIP Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #ffffff;
            color: #cc0000;
            min-height: 100vh;
            padding: 12px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .premium-header {
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid #cc0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(145deg, #cc0000, #8b0000);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .title h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #cc0000, #8b0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title p {
            color: #cc0000;
            font-size: 10px;
        }
        .sync-status {
            background: #ffffff;
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #cc0000;
            color: #cc0000;
            font-size: 11px;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            background: #cc0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        .nav-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: #f5f5f5;
            padding: 6px;
            border-radius: 50px;
        }
        .nav-tab {
            padding: 10px 16px;
            background: transparent;
            border: none;
            color: #cc0000;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s;
            font-size: 13px;
            flex: 1;
            text-align: center;
            white-space: nowrap;
        }
        .nav-tab.active {
            background: #cc0000;
            color: white;
            box-shadow: 0 2px 8px rgba(204,0,0,0.3);
        }
        .nav-tab:hover:not(.active) {
            background: #ffe6e6;
            color: #cc0000;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .table-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #cc0000;
            transition: transform 0.2s;
            color: #cc0000;
        }
        .table-card:hover {
            transform: translateY(-2px);
            border-color: #cc0000;
            box-shadow: 0 4px 12px rgba(204,0,0,0.15);
        }
        .table-name {
            font-size: 18px;
            font-weight: 700;
            color: #cc0000;
        }
        .progress-bar {
            width: 100%;
            background: #f0f0f0;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #cc0000;
            width: 0%;
            transition: width 0.3s;
        }
        .btn-small {
            background: #cc0000;
            border: none;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin: 4px;
            transition: all 0.2s;
            font-size: 12px;
        }
        .btn-small:hover {
            background: #8b0000;
            transform: translateY(-1px);
        }
        .guest-badge {
            background: #cc0000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
            margin: 2px;
            color: white;
        }
        .bands-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: #ffffff;
            border-radius: 20px;
            overflow-x: auto;
            display: block;
        }
        .bands-table th, .bands-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #ffe6e6;
            color: #cc0000;
            font-size: 13px;
        }
        .bands-table th {
            background: #cc0000;
            color: white;
            font-weight: 600;
        }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid #cc0000;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: #cc0000;
        }
        .dashboard-table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border-radius: 20px;
            overflow-x: auto;
            display: block;
        }
        .dashboard-table th, .dashboard-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #ffe6e6;
            color: #cc0000;
            font-size: 12px;
        }
        .dashboard-table th {
            background: #cc0000;
            color: white;
        }
        .orders-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 16px;
        }
        .order-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px;
            border: 2px solid #cc0000;
            transition: all 0.2s;
            color: #cc0000;
        }
        .order-card.ready {
            border-color: #cc0000;
            box-shadow: 0 0 20px rgba(204,0,0,0.2);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #cc0000;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-id {
            background: #cc0000;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            color: white;
        }
        .status-pending, .status-preparing, .status-ready {
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        .status-pending {
            background: #ffaa00;
            color: #cc0000;
        }
        .status-preparing {
            background: #00a86b;
            color: white;
        }
        .status-ready {
            background: #cc0000;
            color: white;
            animation: pulse 1s infinite;
        }
        .order-total {
            font-size: 18px;
            font-weight: bold;
            color: #cc0000;
            margin: 12px 0;
            text-align: right;
        }
        .collect-btn {
            background: #cc0000;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .collect-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .collect-btn:hover:not(:disabled) {
            background: #8b0000;
            transform: translateY(-2px);
        }
        .create-form {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 120px;
        }
        .form-group label {
            font-size: 11px;
            color: #cc0000;
        }
        .create-form input {
            background: #ffffff;
            border: 1px solid #cc0000;
            border-radius: 40px;
            padding: 10px 14px;
            color: #cc0000;
            font-size: 14px;
        }
        .create-form input::placeholder {
            color: #ff9999;
        }
        .create-btn {
            background: #cc0000;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .history-stat-card {
            background: linear-gradient(135deg, #ffffff, #f5f5f5);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            border: 1px solid #cc0000;
        }
        .history-stat-card .value {
            font-size: 24px;
            font-weight: 800;
            color: #cc0000;
        }
        .transaction-list {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #cc0000;
        }
        .transaction-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #ffe6e6;
            transition: background 0.2s;
        }
        .transaction-icon {
            font-size: 28px;
            min-width: 40px;
            text-align: center;
        }
        .transaction-details {
            flex: 1;
        }
        .transaction-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .transaction-vendor {
            font-weight: 700;
            color: #cc0000;
            background: rgba(204,0,0,0.1);
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 11px;
        }
        .transaction-band {
            font-family: monospace;
            background: #ffe6e6;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            color: #cc0000;
        }
        .transaction-amount {
            font-weight: 800;
            font-size: 14px;
            color: #cc0000;
        }
        .transaction-item-name {
            color: #cc0000;
            font-size: 12px;
        }
        .transaction-time {
            font-size: 10px;
            color: #ff9999;
            font-family: monospace;
        }
        .empty-history, .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #ff9999;
            background: #f5f5f5;
            border-radius: 20px;
            font-size: 14px;
        }
        .vvip-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .vvip-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .vvip-modal-card {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border-radius: 32px;
            border: 2px solid #cc0000;
            max-width: 90%;
            width: 320px;
            padding: 24px;
            text-align: center;
        }
        .vvip-modal-title {
            color: #cc0000 !important;
            font-size: 24px !important;
        }
        .vvip-modal-message {
            color: #cc0000 !important;
            font-size: 14px !important;
        }
        .vvip-modal-btn {
            background: #cc0000;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 16px;
            font-size: 14px;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        /* Mobile optimizations */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .premium-header {
                padding: 12px 16px;
            }
            .logo-icon {
                width: 42px;
                height: 42px;
            }
            .title h1 {
                font-size: 16px;
            }
            .title p {
                font-size: 9px;
            }
            .nav-tab {
                padding: 8px 12px;
                font-size: 11px;
                white-space: normal;
                word-break: keep-all;
            }
            .stat-card .value {
                font-size: 22px;
            }
            .history-stat-card .value {
                font-size: 20px;
            }
            .table-card {
                padding: 14px;
            }
            .order-card {
                padding: 14px;
            }
        }
        /* Touch-friendly button sizing */
        button, .btn-small, .create-btn, .collect-btn, .nav-tab, .vvip-modal-btn {
            touch-action: manipulation;
            min-height: 44px;
        }
        .btn-small {
            min-height: 36px;
        }
        input, select, textarea {
            font-size: 16px;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="premium-header">
        <div class="logo-area">
            <div class="logo-icon">
                <img src="images/rands-logo.png" alt="Rands Logo" onerror="this.onerror=null; this.parentElement.innerHTML='👑';">
            </div>
            <div class="title">
                <h1>VVIP MANAGEMENT CONSOLE</h1>
                <p>Tables • Bands • Dashboard • Orders • History</p>
            </div>
        </div>
        <div class="sync-status">
            <div class="sync-dot"></div>
            <div>LIVE SYNC</div>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('tables')">📋 TABLES</button>
        <button class="nav-tab" onclick="switchTab('bands')">🖨️ BANDS</button>
        <button class="nav-tab" onclick="switchTab('dashboard')">📊 DASH</button>
        <button class="nav-tab" onclick="switchTab('orders')">👨‍🍳 ORDERS</button>
        <button class="nav-tab" onclick="switchTab('history')">📜 HISTORY</button>
    </div>

    <div id="tablesTab" class="tab-content active">
        <div class="create-form">
            <div class="form-group">
                <label>📌 Table Name</label>
                <input type="text" id="newTableName" placeholder="e.g., VIP Lounge">
            </div>
            <div class="form-group">
                <label>👥 Capacity</label>
                <input type="number" id="newTableCapacity" placeholder="Max guests" value="10">
            </div>
            <div class="form-group">
                <label>💰 Tab (R)</label>
                <input type="number" id="newTableTab" placeholder="Initial tab" value="8000">
            </div>
            <button type="button" class="create-btn" onclick="createTable()">+ CREATE</button>
        </div>
        <div id="tablesList" class="tables-grid"></div>
    </div>

    <div id="bandsTab" class="tab-content">
        <div id="bandsListContainer"></div>
    </div>

    <div id="dashboardTab" class="tab-content">
        <div id="dashboardContent"></div>
    </div>

    <div id="ordersTab" class="tab-content">
        <div id="activeOrdersGrid" class="orders-grid"></div>
    </div>

    <div id="historyTab" class="tab-content">
        <div id="historyContent"></div>
    </div>
</div>

<div id="vvipModal" class="vvip-modal">
    <div class="vvip-modal-card">
        <div class="vvip-modal-icon" id="modalIcon" style="font-size:48px;">👑</div>
        <div class="vvip-modal-title" id="modalTitle" style="font-size:24px; font-weight:800; margin:12px 0;">Notification</div>
        <div class="vvip-modal-message" id="modalMessage" style="margin:16px 0;">Message</div>
        <button class="vvip-modal-btn" onclick="closeModal()">Confirm</button>
    </div>
</div>

<script>
    // ==================== GLOBAL STATE ====================
    let walletAccounts = {};
    let tables = {};
    let revenue = 0;
    let guests = 0;
    let globalOrders = [];
    let transactionHistory = [];
    let vendorSales = { "Rands Smart Counter":0, "Shisha Lounge":0, "The Butcher Shop":0 };
    
    // Helper: check if any input inside tables grid has focus (to prevent re-render while typing)
    function isTablesGridInputFocused() {
        const tablesGrid = document.getElementById('tablesList');
        if (!tablesGrid) return false;
        const activeElement = document.activeElement;
        // Check if active element is inside tablesGrid and is an input or textarea
        if (activeElement && tablesGrid.contains(activeElement)) {
            const tagName = activeElement.tagName.toLowerCase();
            if (tagName === 'input' || tagName === 'textarea') {
                return true;
            }
        }
        return false;
    }
    
    function loadAll() {
        const walletsRaw = localStorage.getItem('rands_wallet_accounts');
        if (walletsRaw) {
            const accounts = JSON.parse(walletsRaw);
            walletAccounts = {};
            accounts.forEach(acc => { walletAccounts[acc.id] = acc; });
        }
        tables = JSON.parse(localStorage.getItem('tables') || '{}');
        revenue = parseFloat(localStorage.getItem('revenue') || '0');
        guests = parseInt(localStorage.getItem('guests') || '0');
        globalOrders = JSON.parse(localStorage.getItem('globalOrders') || '[]');
        transactionHistory = JSON.parse(localStorage.getItem('transactionHistory') || '[]');
        vendorSales = JSON.parse(localStorage.getItem('vendorSales') || '{"Rands Smart Counter":0,"Shisha Lounge":0,"The Butcher Shop":0}');
    }
    
    function saveAll() {
        localStorage.setItem('tables', JSON.stringify(tables));
        localStorage.setItem('revenue', revenue);
        localStorage.setItem('guests', guests);
        localStorage.setItem('globalOrders', JSON.stringify(globalOrders));
        localStorage.setItem('transactionHistory', JSON.stringify(transactionHistory));
        localStorage.setItem('vendorSales', JSON.stringify(vendorSales));
        localStorage.setItem('rands_wallet_accounts', JSON.stringify(Object.values(walletAccounts)));
        
        if (window.BroadcastChannel) {
            const channel = new BroadcastChannel('vvip_sync');
            channel.postMessage({ type: 'DATA_UPDATED', timestamp: Date.now() });
            channel.close();
        }
    }
    
    function showModal(title, message, icon = "👑") {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalMessage").innerHTML = message;
        document.getElementById("modalIcon").innerHTML = icon;
        document.getElementById("vvipModal").classList.add("active");
    }
    function closeModal() { document.getElementById("vvipModal").classList.remove("active"); }
    
    function escapeHtml(str) { 
        return str.replace(/[&<>]/g, function(m) { 
            if (m === '&') return '&amp;'; 
            if (m === '<') return '&lt;'; 
            if (m === '>') return '&gt;'; 
            return m; 
        }); 
    }
    
    // ========== TABLES RENDERING (with focus preservation) ==========
    function renderTables() {
        const container = document.getElementById("tablesList");
        if (!container) return;
        if (Object.keys(tables).length === 0) {
            container.innerHTML = '<div class="empty-state">✨ No tables yet. Create your first table above.</div>';
            return;
        }
        container.innerHTML = Object.entries(tables).map(([name, t]) => {
            const original = t.originalTab || t.tabBalance;
            const spent = original - t.tabBalance;
            const percent = original > 0 ? (spent / original) * 100 : 0;
            return `
                <div class="table-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <span class="table-name">${escapeHtml(name)}</span>
                        <span style="color:#cc0000; font-weight:bold;">Tab: R${t.tabBalance}</span>
                    </div>
                    <div style="margin-bottom:10px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                            <span>👥 Guests: ${t.entriesUsed}/${t.capacity}</span>
                            <span>💰 Spent: R${spent} / R${original}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
                        <input type="text" id="assign_${name.replace(/\s/g, '_')}" placeholder="Wallet ID" style="flex:1; padding:8px 12px; background:#ffffff; border:1px solid #cc0000; border-radius:40px; color:#cc0000; font-size:14px;">
                        <button onclick="assignToTable('${escapeHtml(name).replace(/'/g, "\\'")}')" class="btn-small">➕ Assign</button>
                        <button onclick="unassignFromTable('${escapeHtml(name).replace(/'/g, "\\'")}')" class="btn-small">🗑️ Remove</button>
                    </div>
                    <div>
                        <span style="color:#cc0000; font-size:12px;">Assigned:</span>
                        <div style="margin-top:6px;">${t.guests.map(g => `<span class="guest-badge">${escapeHtml(g)}</span>`).join('') || '<span style="color:#ff9999; font-size:11px;">No guests assigned</span>'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // ========== TABLE ACTIONS ==========
    function createTable() {
        const nameInput = document.getElementById("newTableName");
        const capacityInput = document.getElementById("newTableCapacity");
        const tabInput = document.getElementById("newTableTab");
        
        let name = nameInput.value.trim();
        let capacity = parseInt(capacityInput.value);
        let tab = parseInt(tabInput.value);
        
        if (!name || capacity < 1) {
            showModal("Error", "Valid name and capacity required", "⚠️");
            return;
        }
        if (tables[name]) {
            showModal("Duplicate", "Table already exists", "⚠️");
            return;
        }
        
        tables[name] = {
            name: name,
            capacity: capacity,
            tabBalance: tab,
            entriesUsed: 0,
            guests: [],
            originalTab: tab
        };
        revenue += 2000;
        saveAll();
        renderTables();
        showModal("Table Created", `${name} created with R${tab} tab + R2000 setup fee`, "🎉");
        nameInput.value = "";
    }
    
    function assignToTable(tableName) {
        const inputId = `assign_${tableName.replace(/\s/g, '_')}`;
        const walletId = document.getElementById(inputId)?.value.trim();
        if (!walletId) { showModal("Error", "Enter a Wallet ID", "⚠️"); return; }
        if (!walletAccounts[walletId]) {
            if (confirm(`Wallet "${walletId}" not found. Create new?`)) {
                walletAccounts[walletId] = { id: walletId, name: "Guest", balance: 0, pin: "0000", tableTab: 0, tableName: null };
                saveAll();
            } else return;
        }
        const table = tables[tableName];
        if (!table) { showModal("Error", "Table not found", "⚠️"); return; }
        if (table.guests.includes(walletId)) { showModal("Already Assigned", `${walletId} already at this table`, "⚠️"); return; }
        if (table.guests.length >= table.capacity) { showModal("Table Full", `${tableName} at capacity (${table.capacity})`, "🚫"); return; }
        table.guests.push(walletId);
        table.entriesUsed = table.guests.length;
        if (walletAccounts[walletId]) walletAccounts[walletId].tableName = tableName;
        saveAll();
        renderTables();
        showModal("Assigned", `${walletId} → ${tableName}`, "✅");
        if (document.getElementById(inputId)) document.getElementById(inputId).value = "";
    }
    
    function unassignFromTable(tableName) {
        const walletId = prompt("Enter Wallet ID to remove from this table:");
        if (!walletId) return;
        const table = tables[tableName];
        if (!table) { showModal("Error", "Table not found", "⚠️"); return; }
        const idx = table.guests.indexOf(walletId);
        if (idx !== -1) {
            table.guests.splice(idx, 1);
            table.entriesUsed = table.guests.length;
            if (walletAccounts[walletId]) delete walletAccounts[walletId].tableName;
            saveAll();
            renderTables();
            showModal("Removed", `${walletId} removed from ${tableName}`, "🗑️");
        } else {
            showModal("Not Found", `${walletId} not at this table`, "⚠️");
        }
    }
    
    // ========== BANDS ==========
    function renderBands() {
        const container = document.getElementById("bandsListContainer");
        if (!container) return;
        if (Object.keys(walletAccounts).length === 0) {
            container.innerHTML = '<div class="empty-state">💳 No wristbands registered yet. Create tables and assign guests to generate bands.</div>';
            return;
        }
        container.innerHTML = `
            <div style="overflow-x: auto;">
                <table class="bands-table">
                    <thead><tr><th>🆔 ID</th><th>👤 Name</th><th>💰 Balance</th><th>📋 Table</th><th>🖨️</th></tr></thead>
                    <tbody>
                        ${Object.entries(walletAccounts).map(([id, acc]) => `
                            <tr>
                                <td style="font-family:monospace;">${escapeHtml(id)}</td>
                                <td>${escapeHtml(acc.name || '-')}</td>
                                <td style="color:#cc0000;">R${acc.balance || 0}</td>
                                <td>${acc.tableName ? escapeHtml(acc.tableName) : '<span style="color:#ff9999;">—</span>'}</td>
                                <td><button onclick="printBand('${id.replace(/'/g, "\\'")}')" class="btn-small">🖨️</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div style="margin-top:16px; padding:12px; background:#f5f5f5; border-radius:20px; text-align:center; color:#cc0000; font-size:12px;">
                💡 Total: ${Object.keys(walletAccounts).length} bands | Balance: R${Object.values(walletAccounts).reduce((s, a) => s + (a.balance || 0), 0)}
            </div>
        `;
    }
    
    function printBand(bandId) {
        const account = walletAccounts[bandId];
        if (!account) { showModal("Error", "Band not found", "⚠️"); return; }
        const printWindow = window.open('', '_blank');
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(bandId)}`;
        printWindow.document.write(`
            <!DOCTYPE html><html><head><title>VVIP Wristband - ${bandId}</title>
            <style>body{margin:0;padding:20px;background:white;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial;}
            .wristband{width:320px;background:linear-gradient(145deg,#cc0000,#8b0000);border-radius:40px;padding:30px;text-align:center;color:white;}
            .logo{font-size:36px;margin-bottom:15px;}.band-id{font-size:26px;font-weight:bold;margin:15px 0;background:rgba(255,255,255,0.2);padding:10px;border-radius:50px;}
            .qr{background:white;padding:15px;border-radius:24px;display:inline-block;margin:15px 0;}.qr img{width:150px;height:150px;}</style>
            <body><div class="wristband"><div class="logo">👑 RANDS VVIP</div><div class="band-id">${bandId}</div><div class="qr"><img src="${qrUrl}"></div><div class="footer">Present this wristband for access</div></div></body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    }
    
    // ========== DASHBOARD ==========
    function renderDashboard() {
        const container = document.getElementById("dashboardContent");
        if (!container) return;
        const totalTables = Object.keys(tables).length;
        const occupiedTables = Object.values(tables).filter(t => t.entriesUsed > 0).length;
        const totalGuests = Object.values(tables).reduce((sum, t) => sum + t.entriesUsed, 0);
        const totalTabRemaining = Object.values(tables).reduce((sum, t) => sum + (t.tabBalance || 0), 0);
        const totalTabSpent = Object.values(tables).reduce((sum, t) => sum + ((t.originalTab || t.tabBalance) - (t.tabBalance || 0)), 0);
        container.innerHTML = `
            <div class="dashboard-stats">
                <div class="stat-card"><div class="value">${totalTables}</div><div>Tables</div></div>
                <div class="stat-card"><div class="value">${occupiedTables}</div><div>Occupied</div></div>
                <div class="stat-card"><div class="value">${totalGuests}</div><div>Guests</div></div>
                <div class="stat-card"><div class="value">R${totalTabSpent}</div><div>Spent</div></div>
                <div class="stat-card"><div class="value">R${totalTabRemaining}</div><div>Remaining</div></div>
                <div class="stat-card"><div class="value">R${revenue}</div><div>Revenue</div></div>
            </div>
            <h3 style="margin:20px 0 12px; color:#cc0000; font-size:16px;">📊 Table Breakdown</h3>
            <div style="overflow-x: auto;">
                <table class="dashboard-table"><thead><tr><th>Table</th><th>Cap</th><th>Guests</th><th>Tab</th><th>Spent</th><th>%</th></tr></thead>
                <tbody>${Object.entries(tables).map(([name, t]) => {
                    const original = t.originalTab || t.tabBalance;
                    const spent = original - t.tabBalance;
                    const percent = original > 0 ? (spent / original) * 100 : 0;
                    return `<tr><td><strong>${escapeHtml(name)}</strong></td><td>${t.capacity}</td><td>${t.entriesUsed}/${t.capacity}</td><td style="color:#cc0000;">R${t.tabBalance}</td><td>R${spent}</td><td><div class="progress-bar" style="width:80px;"><div class="progress-fill" style="width:${percent}%;"></div></div></td></tr>`;
                }).join('')}</tbody>
                </table>
            </div>
            <div style="margin-top:20px; background:#f5f5f5; padding:16px; border-radius:20px;">
                <h4 style="color:#cc0000; font-size:14px;">💰 Vendor Sales</h4>
                <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:10px;">
                    <div style="font-size:12px;">🍺 Rands: <strong style="color:#cc0000;">R${vendorSales["Rands Smart Counter"] || 0}</strong></div>
                    <div style="font-size:12px;">💨 Shisha: <strong style="color:#cc0000;">R${vendorSales["Shisha Lounge"] || 0}</strong></div>
                    <div style="font-size:12px;">🥩 Butcher: <strong style="color:#cc0000;">R${vendorSales["The Butcher Shop"] || 0}</strong></div>
                </div>
            </div>
        `;
    }
    
    // ========== ORDERS ==========
    function renderOrders() {
        const container = document.getElementById("activeOrdersGrid");
        if (!container) return;
        const activeOrders = globalOrders.filter(o => o.status !== "collected");
        if (activeOrders.length === 0) {
            container.innerHTML = '<div class="empty-state">🍽️ No active orders. Orders from POS will appear here.</div>';
            return;
        }
        container.innerHTML = activeOrders.map(order => {
            let statusClass = "", statusText = "", readyClass = "";
            if (order.status === "pending") { statusClass = "status-pending"; statusText = "PENDING"; }
            else if (order.status === "preparing") { statusClass = "status-preparing"; statusText = "PREPARING"; }
            else if (order.status === "ready") { statusClass = "status-ready"; statusText = "READY"; readyClass = "ready"; }
            let vendorIcon = order.vendor === "Rands Smart Counter" ? "🍺" : order.vendor === "Shisha Lounge" ? "💨" : "🥩";
            return `<div class="order-card ${readyClass}"><div class="order-header"><span class="order-id">#${order.orderId}</span><span style="color:#ff9999; font-size:11px;">${order.timestamp}</span></div>
            <div style="margin-bottom:10px; font-size:13px;">${vendorIcon} <strong>${order.vendor}</strong> | Band: ${order.bandId}</div>
            <div class="${statusClass}" style="margin-bottom:10px;">${statusText}</div>
            <div style="margin:10px 0;">${order.items.map(item => `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #ffe6e6; font-size:13px;"><span>${item.quantity}x ${item.name}</span><span>R${item.price * item.quantity}</span></div>`).join('')}</div>
            <div class="order-total">Total: R${order.total}</div>
            <button class="collect-btn" onclick="collectOrder(${order.orderId})" ${order.status !== "ready" ? "disabled" : ""}>${order.status === "ready" ? "📦 COLLECT" : "⏳ WAITING"}</button></div>`;
        }).join('');
    }
    
    function collectOrder(orderId) {
        const idx = globalOrders.findIndex(o => o.orderId === orderId);
        if (idx !== -1 && globalOrders[idx].status === "ready") {
            globalOrders[idx].status = "collected";
            saveAll();
            renderOrders();
            showModal("Order Collected", `Order #${orderId} has been marked as collected.`, "📦");
        }
    }
    
    // ========== HISTORY ==========
    function renderHistory() {
        const container = document.getElementById("historyContent");
        if (!container) return;
        const history = transactionHistory || [];
        const totalSpent = history.reduce((sum, tx) => sum + tx.amount, 0);
        const uniqueBands = new Set(history.map(tx => tx.band)).size;
        const vendorCounts = {};
        history.forEach(tx => { vendorCounts[tx.vendor] = (vendorCounts[tx.vendor] || 0) + 1; });
        const topVendor = Object.entries(vendorCounts).sort((a,b) => b[1] - a[1])[0]?.[0] || '-';
        
        if (history.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ No transactions yet. Make a purchase from POS to see VVIP transaction ledger.</div>';
            return;
        }
        
        container.innerHTML = `
            <div class="history-stats">
                <div class="history-stat-card"><div class="value">R${totalSpent.toFixed(2)}</div><div>Total Spent</div></div>
                <div class="history-stat-card"><div class="value">${history.length}</div><div>TX</div></div>
                <div class="history-stat-card"><div class="value">${uniqueBands}</div><div>Customers</div></div>
                <div class="history-stat-card"><div class="value">${topVendor !== '-' ? topVendor.split(' ')[0] : '-'}</div><div>Top</div></div>
            </div>
            <div class="transaction-list">
                ${history.slice(0, 50).map(tx => {
                    let vendorIcon = tx.vendor === "Rands Smart Counter" ? "🍺" : tx.vendor === "Shisha Lounge" ? "💨" : "🥩";
                    return `
                        <div class="transaction-item">
                            <div class="transaction-icon">${vendorIcon}</div>
                            <div class="transaction-details">
                                <div class="transaction-header">
                                    <span class="transaction-vendor">${tx.vendor}</span>
                                    <span class="transaction-band">👤 ${tx.band || 'guest'}</span>
                                    <span class="transaction-amount">+R${tx.amount}</span>
                                </div>
                                <div class="transaction-item-name">${tx.quantity || 1}x ${tx.item}</div>
                                <div class="transaction-time">⏱️ ${tx.time || new Date().toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
            ${history.length > 50 ? '<div style="text-align:center; padding:12px; color:#ff9999; font-size:11px;">Showing last 50</div>' : ''}
        `;
    }
    
    // ========== TAB SWITCHING ==========
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`${tab}Tab`).classList.add('active');
        event.target.classList.add('active');
        if (tab === 'tables') renderTables();
        if (tab === 'bands') renderBands();
        if (tab === 'dashboard') renderDashboard();
        if (tab === 'orders') renderOrders();
        if (tab === 'history') renderHistory();
    }
    
    // ========== SYNC WITH FOCUS PROTECTION ==========
    function safeRenderCurrentTab() {
        // Do NOT re-render if the user is typing in a tables grid input
        if (isTablesGridInputFocused()) {
            return;
        }
        const activeTab = document.querySelector('.tab-content.active')?.id;
        if (activeTab === 'tablesTab') renderTables();
        else if (activeTab === 'bandsTab') renderBands();
        else if (activeTab === 'dashboardTab') renderDashboard();
        else if (activeTab === 'ordersTab') renderOrders();
        else if (activeTab === 'historyTab') renderHistory();
    }
    
    function initSync() {
        loadAll();
        safeRenderCurrentTab();
        
        if (window.BroadcastChannel) {
            const channel = new BroadcastChannel('vvip_sync');
            channel.onmessage = () => {
                loadAll();
                safeRenderCurrentTab();
            };
        }
        
        setInterval(() => {
            loadAll();
            safeRenderCurrentTab();
        }, 3000);
    }
    
    // Expose globals
    window.switchTab = switchTab;
    window.createTable = createTable;
    window.assignToTable = assignToTable;
    window.unassignFromTable = unassignFromTable;
    window.printBand = printBand;
    window.collectOrder = collectOrder;
    window.closeModal = closeModal;
    
    initSync();
</script>
</body>
</html>
