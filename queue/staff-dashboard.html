<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Rands Smart Counter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
body {
  background: #0f0f0f;
  color: #ffffff;
  padding: 20px;
  transition: background 0.3s;
}
.dark-mode { background: #1a1a1a; }
.dashboard-header {
  background: #1a1a1a;
  border-radius: 28px;
  padding: 25px;
  margin-bottom: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  border: 2px solid #b30000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}
.header-title h1 {
  color: #ff4d4d;
  margin-bottom: 5px;
}
.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 40px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: #b30000;
  color: white;
}
.btn-primary:hover {
  background: #ff4d4d;
  transform: translateY(-2px);
}
.btn-secondary {
  background: #2a2a2a;
  color: #ff4d4d;
  border: 1px solid #b30000;
}
.btn-secondary:hover {
  background: #3a3a3a;
}
.btn-success {
  background: #00a86b;
  color: white;
}
.btn-warning {
  background: #ffaa00;
  color: #1a1a1a;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 25px;
}
.stats-card {
  background: #1a1a1a;
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
  border: 1px solid #b30000;
  text-align: center;
}
.stats-card h3 {
  color: #ff9999;
  font-size: 14px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.stats-card .stat-number {
  font-size: 36px;
  font-weight: bold;
  color: #ff4d4d;
}
.queue-section {
  background: #1a1a1a;
  border-radius: 28px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  border: 2px solid #b30000;
  margin-bottom: 25px;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 2px solid #b30000;
}
.section-header h2 {
  color: #ff4d4d;
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ticket-list {
  max-height: 500px;
  overflow-y: auto;
}
.ticket-item {
  background: #222;
  border: 1px solid #b30000;
  border-radius: 40px;
  padding: 15px 20px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ticket-info {
  display: flex;
  align-items: center;
  gap: 15px;
  flex-wrap: wrap;
}
.ticket-number {
  font-size: 18px;
  font-weight: bold;
  background: #1a1a1a;
  padding: 5px 12px;
  border-radius: 40px;
  border: 1px dashed #b30000;
}
.serve-btn, .remove-btn {
  background: #00a86b;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 40px;
  cursor: pointer;
  margin-left: 8px;
  transition: 0.2s;
}
.remove-btn {
  background: #b30000;
}
.serve-btn:hover, .remove-btn:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
}
.action-card {
  background: #1a1a1a;
  border-radius: 28px;
  padding: 20px;
  border: 2px solid #b30000;
  margin-top: 25px;
}
.action-buttons {
  display: grid;
  gap: 10px;
}
.history-card {
  background: #1a1a1a;
  border-radius: 28px;
  padding: 20px;
  border: 2px solid #b30000;
  margin-top: 25px;
}
.history-list {
  max-height: 200px;
  overflow-y: auto;
}
.history-item {
  display: flex;
  justify-content: space-between;
  padding: 8px;
  border-bottom: 1px solid #333;
}
.back-link {
  display: inline-block;
  margin-top: 20px;
  color: #ff4d4d;
  text-decoration: none;
  font-weight: bold;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #ff9999;
}
</style>
</head>
<body>
<div class="dashboard-header">
  <div class="header-title">
    <h1>🍾 Rands Smart Counter · Admin Dashboard</h1>
    <p>Manage booze collection queue</p>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" id="darkModeToggle">🌙 Dark Mode</button>
    <a href="index.html" class="btn btn-primary">← Back to Kiosk</a>
  </div>
</div>

<div class="stats-grid">
  <div class="stats-card"><h3>Total in Queue</h3><div class="stat-number" id="queueTotal">0</div></div>
  <div class="stats-card"><h3>Served Today</h3><div class="stat-number" id="servedTotal">0</div></div>
</div>

<div class="queue-section">
  <div class="section-header">
    <h2>🍾 Current Queue</h2>
    <button class="btn btn-success" onclick="serveNext()">Call Next →</button>
  </div>
  <div class="ticket-list" id="queueList"></div>
</div>

<div class="action-card">
  <h3>⚡ Quick Actions</h3>
  <div class="action-buttons">
    <button class="btn btn-warning" onclick="resetQueue()">🔄 Reset Queue (Demo)</button>
    <button class="btn btn-primary" onclick="refreshQueue()">🔃 Refresh Data</button>
    <button class="btn btn-secondary" onclick="clearHistory()">🗑️ Clear History</button>
  </div>
</div>

<div class="history-card">
  <h3>📋 Recently Served</h3>
  <div class="history-list" id="servedHistory"></div>
</div>

<a href="now-serving-smart-counter.html" class="back-link">📺 View Live Queue</a>

<script>
  const QUEUE_KEY = "rands_smart_queue";
  const HISTORY_KEY = "rands_smart_served_history";

  function getQueue() { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); }
  function saveQueue(queue) { localStorage.setItem(QUEUE_KEY, JSON.stringify(queue)); }
  function getHistory() { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  function saveHistory(history) { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

  function addToHistory(ticketNumber) {
    const history = getHistory();
    history.unshift({ ticket: ticketNumber, time: new Date().toLocaleTimeString() });
    if (history.length > 50) history.pop();
    saveHistory(history);
  }

  function serveNext() {
    let queue = getQueue();
    if (queue.length === 0) { alert('No customers in queue.'); return; }
    const served = queue.shift();
    saveQueue(queue);
    addToHistory(served.ticketNumber);
    updateDisplay();
    alert(`Now serving: ${served.ticketNumber}`);
  }

  function removeTicket(index) {
    let queue = getQueue();
    if (index >= 0 && index < queue.length) {
      const removed = queue.splice(index, 1);
      saveQueue(queue);
      updateDisplay();
      alert(`Removed ticket ${removed[0].ticketNumber}`);
    }
  }

  function updateDisplay() {
    const queue = getQueue();
    document.getElementById('queueTotal').innerText = queue.length;

    const container = document.getElementById('queueList');
    if (queue.length === 0) {
      container.innerHTML = '<div class="empty-state">Queue is empty</div>';
    } else {
      container.innerHTML = queue.map((t, idx) => `
        <div class="ticket-item">
          <div class="ticket-info">
            <span class="ticket-number">${t.ticketNumber}</span>
            <span>${new Date(t.timestamp).toLocaleTimeString()}</span>
          </div>
          <div>
            <button class="serve-btn" onclick="serveTicketFromList(${idx})">Serve</button>
            <button class="remove-btn" onclick="removeTicket(${idx})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    const history = getHistory();
    document.getElementById('servedTotal').innerText = history.length;
    const historyContainer = document.getElementById('servedHistory');
    if (history.length === 0) {
      historyContainer.innerHTML = '<div class="empty-state">No customers served yet</div>';
    } else {
      historyContainer.innerHTML = history.map(h => `
        <div class="history-item">
          <span>${h.ticket}</span>
          <span>${h.time}</span>
        </div>
      `).join('');
    }
  }

  function serveTicketFromList(index) {
    let queue = getQueue();
    if (index >= 0 && index < queue.length) {
      const served = queue.splice(index, 1);
      saveQueue(queue);
      addToHistory(served[0].ticketNumber);
      updateDisplay();
      alert(`Served ${served[0].ticketNumber}`);
    }
  }

  function resetQueue() {
    if (confirm('Reset queue to demo data? This will clear current queue.')) {
      const demoQueue = [
        { ticketNumber: 'RS-001', timestamp: new Date().toISOString(), status: 'waiting' },
        { ticketNumber: 'RS-002', timestamp: new Date().toISOString(), status: 'waiting' }
      ];
      saveQueue(demoQueue);
      updateDisplay();
      alert('Queue reset to demo data.');
    }
  }

  function refreshQueue() { updateDisplay(); alert('Data refreshed.'); }
  function clearHistory() { if (confirm('Clear served history?')) { saveHistory([]); updateDisplay(); } }

  const darkModeToggle = document.getElementById('darkModeToggle');
  darkModeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    darkModeToggle.innerHTML = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
    localStorage.setItem('adminDarkMode', isDark);
  });
  if (localStorage.getItem('adminDarkMode') === 'true') {
    document.body.classList.add('dark-mode');
    darkModeToggle.innerHTML = '☀️ Light Mode';
  }

  updateDisplay();
  setInterval(updateDisplay, 5000);
</script>
</body>
</html>
