<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Bottom Nav - Pure Component</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* BOTTOM NAVIGATION BAR - CLEAN, READY TO INTEGRATE */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
            border-top: 1px solid #eef2f6;
            padding: 8px 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            z-index: 1000;
            border-radius: 0 0 24px 24px;
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 0;
            border-radius: 40px;
            transition: all 0.2s ease;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .nav-btn .nav-icon {
            font-size: 1.35rem;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .nav-btn .nav-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #7e8b9f;
            letter-spacing: -0.2px;
            transition: color 0.2s;
        }

        /* Active tab styles */
        .nav-btn.active .nav-icon {
            color: #E30613;
        }

        .nav-btn.active .nav-label {
            color: #E30613;
        }

        .nav-btn:active {
            transform: scale(0.96);
            background: rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body style="background: #f5f7fb; min-height: 100vh;">
    <!-- 
        PURE BOTTOM NAVIGATION - COPY THIS BLOCK INTO YOUR PROJECT
        No instructions, no extra content, just the nav component.
    -->
    <div class="bottom-nav">
        <button class="nav-btn" data-page="home" onclick="setActiveTab(this); location.href='home.html'">
            <div class="nav-icon"><i class="fas fa-home"></i></div>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-btn" data-page="queue" onclick="setActiveTab(this); location.href='queue.html'">
            <div class="nav-icon"><i class="fas fa-clock"></i></div>
            <span class="nav-label">Queue</span>
        </button>
        <button class="nav-btn" data-page="transact" onclick="setActiveTab(this); location.href='transact.html'">
            <div class="nav-icon"><i class="fas fa-exchange-alt"></i></div>
            <span class="nav-label">Transact</span>
        </button>
        <button class="nav-btn" data-page="card" onclick="setActiveTab(this); location.href='card.html'">
            <div class="nav-icon"><i class="fas fa-credit-card"></i></div>
            <span class="nav-label">Card</span>
        </button>
        <button class="nav-btn" data-page="ticket-store" onclick="setActiveTab(this); location.href='ticket-store.html'">
            <div class="nav-icon"><i class="fas fa-ticket-alt"></i></div>
            <span class="nav-label">Tickets</span>
        </button>
    </div>

    <script>
        // Function to set active tab based on current page
        function setActiveTab(clickedBtn) {
            // Remove active class from all buttons
            const allBtns = document.querySelectorAll('.nav-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('active');
            });
            // Add active class to clicked button
            clickedBtn.classList.add('active');
        }

        // Automatically highlight the correct tab based on current URL
        function highlightCurrentPage() {
            const currentPath = window.location.pathname;
            const currentPage = currentPath.split('/').pop().split('.')[0] || 'home';
            
            const allBtns = document.querySelectorAll('.nav-btn');
            allBtns.forEach(btn => {
                const btnPage = btn.getAttribute('data-page');
                if (btnPage === currentPage) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Run highlight when page loads
        document.addEventListener('DOMContentLoaded', highlightCurrentPage);
    </script>
</body>
</html>
