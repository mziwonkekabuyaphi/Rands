<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Bottom Nav - Pure Component</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            min-height: 100vh;
        }

        /* BOTTOM NAVIGATION BAR */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
            border-top: 1px solid #eef2f6;
            padding: 8px 12px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            z-index: 1000;
        }

        /* Safe area for iOS */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav {
                padding-bottom: calc(20px + env(safe-area-inset-bottom));
            }
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 4px;
            border-radius: 40px;
            transition: all 0.2s ease;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .nav-btn .nav-icon {
            font-size: 1.35rem;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .nav-btn .nav-label {
            font-size: 0.65rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: -0.2px;
        }

        /* Active tab - RED */
        .nav-btn.active .nav-icon,
        .nav-btn.active .nav-label {
            color: #E30613;
        }

        .nav-btn.active .nav-label {
            font-weight: 600;
        }

        /* Click feedback */
        .nav-btn:active {
            transform: scale(0.95);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .bottom-nav {
                padding: 6px 8px 18px;
            }
            .nav-btn .nav-icon {
                font-size: 1.2rem;
            }
            .nav-btn .nav-label {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <!-- PURE BOTTOM NAVIGATION - COPY THIS BLOCK -->
    <div class="bottom-nav">
        <button class="nav-btn" data-page="home" data-url="home.html">
            <div class="nav-icon"><i class="fas fa-home"></i></div>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-btn" data-page="queue" data-url="queue.html">
            <div class="nav-icon"><i class="fas fa-clock"></i></div>
            <span class="nav-label">Queue</span>
        </button>
        <button class="nav-btn" data-page="transact" data-url="transact.html">
            <div class="nav-icon"><i class="fas fa-exchange-alt"></i></div>
            <span class="nav-label">Transact</span>
        </button>
        <button class="nav-btn" data-page="card" data-url="card.html">
            <div class="nav-icon"><i class="fas fa-credit-card"></i></div>
            <span class="nav-label">Card</span>
        </button>
        <button class="nav-btn" data-page="ticket-store" data-url="ticket-store.html">
            <div class="nav-icon"><i class="fas fa-ticket-alt"></i></div>
            <span class="nav-label">Tickets</span>
        </button>
    </div>

    <script>
        (function() {
            const navBtns = document.querySelectorAll('.nav-btn');
            
            function setActive(btn) {
                navBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            
            function getCurrentPage() {
                let page = window.location.pathname.split('/').pop().split('.')[0];
                return (page === '' || page === 'index') ? 'home' : page.toLowerCase();
            }
            
            function highlightTab() {
                const current = getCurrentPage();
                let matched = false;
                navBtns.forEach(btn => {
                    if (btn.dataset.page === current) {
                        setActive(btn);
                        matched = true;
                    }
                });
                if (!matched && navBtns[0]) setActive(navBtns[0]);
            }
            
            navBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const url = btn.dataset.url;
                    if (url) {
                        setActive(btn);
                        setTimeout(() => { window.location.href = url; }, 30);
                    }
                });
            });
            
            highlightTab();
            window.addEventListener('pageshow', highlightTab);
        })();
    </script>
</body>
</html>
