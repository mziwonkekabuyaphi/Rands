<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#cc0000">
<title>VVIP Console - Complete Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}
body {
    background: #0f0f0f;
    color: #ffffff;
    min-height: 100vh;
    padding: 16px;
}
.admin-container {
    max-width: 1600px;
    margin: 0 auto;
}
.admin-header {
    background: linear-gradient(135deg, #b30000, #8b0000);
    border-radius: 28px;
    padding: 20px 25px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}
.admin-header h1 {
    font-size: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.admin-header h1 i {
    font-size: 28px;
}
.sync-status {
    background: rgba(255,255,255,0.2);
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.nav-buttons {
    display: flex;
    gap: 10px;
}
.nav-btn {
    background: #1a1a1a;
    border: 1px solid #b30000;
    padding: 8px 16px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    text-decoration: none;
    font-size: 13px;
}
.nav-btn:hover {
    background: #b30000;
    transform: translateY(-2px);
}
.admin-tabs {
    display: flex;
    gap: 5px;
    background: #1a1a1a;
    border-radius: 60px;
    padding: 5px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}
.admin-tab {
    padding: 10px 20px;
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    font-weight: 600;
    border-radius: 40px;
    transition: 0.2s;
    font-size: 13px;
}
.admin-tab.active {
    background: #b30000;
    color: white;
}
.admin-tab-content {
    display: none;
    animation: fadeIn 0.3s ease;
}
.admin-tab-content.active {
    display: block;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.dashboard-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
}
.stat-card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 16px;
    text-align: center;
    border: 1px solid #333;
}
.stat-card .value {
    font-size: 28px;
    font-weight: 800;
    color: #ff4d4d;
}
.stat-card .label {
    font-size: 11px;
    color: #888;
    margin-top: 5px;
}
.section-card {
    background: #1a1a1a;
    border-radius: 28px;
    padding: 24px;
    border: 1px solid #333;
    margin-bottom: 24px;
}
.section-card:hover {
    border-color: #b30000;
}
.card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid #b30000;
}
.card-header i {
    font-size: 24px;
    color: #ff4d4d;
}
.card-header h2 {
    font-size: 18px;
    color: #ff4d4d;
}
.card-header span {
    margin-left: auto;
    background: #2a2a2a;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 11px;
}
.tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
}
.table-card {
    background: #222;
    border-radius: 20px;
    padding: 16px;
    border: 1px solid #b30000;
    transition: transform 0.2s;
}
.table-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(179,0,0,0.2);
}
.table-name {
    font-size: 18px;
    font-weight: 700;
    color: #ff4d4d;
}
.progress-bar {
    width: 100%;
    background: #333;
    border-radius: 10px;
    height: 6px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: #b30000;
    width: 0%;
    transition: width 0.3s;
}
.btn-small {
    background: #b30000;
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    margin: 4px;
    transition: all 0.2s;
    font-size: 11px;
}
.btn-small:hover {
    background: #8b0000;
    transform: translateY(-1px);
}
.guest-badge {
    background: #b30000;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    display: inline-block;
    margin: 2px;
    color: white;
}
.bands-table {
    width: 100%;
    border-collapse: collapse;
    overflow-x: auto;
    display: block;
    font-size: 13px;
}
.bands-table th, .bands-table td {
    padding: 10px 8px;
    text-align: left;
    border-bottom: 1px solid #333;
    color: #ddd;
}
.bands-table th {
    background: #b30000;
    color: white;
    font-weight: 600;
}
.items-list {
    max-height: 400px;
    overflow-y: auto;
    margin-bottom: 20px;
    border: 1px solid #333;
    border-radius: 20px;
    background: #222;
}
.list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    transition: 0.2s;
}
.list-item:hover {
    background: #2a2a2a;
}
.list-item:last-child {
    border-bottom: none;
}
.item-info {
    flex: 1;
}
.item-name {
    font-weight: 600;
    font-size: 14px;
}
.item-price {
    color: #00ff9c;
    font-size: 12px;
    margin-top: 4px;
}
.item-price input {
    width: 100px;
    padding: 4px 8px;
    background: #333;
    border: 1px solid #b30000;
    border-radius: 20px;
    color: white;
    font-size: 11px;
}
.item-stock {
    color: #ff9800;
    font-size: 11px;
    margin-top: 2px;
}
.item-stock input {
    width: 70px;
    padding: 4px 8px;
    background: #333;
    border: 1px solid #b30000;
    border-radius: 20px;
    color: white;
    font-size: 11px;
}
.item-category {
    font-size: 10px;
    color: #888;
    margin-top: 4px;
}
.item-actions {
    display: flex;
    gap: 8px;
}
.edit-btn, .save-btn, .delete-btn {
    background: #2a2a2a;
    border: none;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 11px;
    transition: 0.2s;
}
.edit-btn { color: #ffaa00; }
.save-btn { color: #00ff9c; }
.delete-btn { color: #ff4d4d; }
.edit-btn:hover, .save-btn:hover, .delete-btn:hover {
    transform: scale(1.05);
}
.add-form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.add-form input, .add-form select {
    background: #2a2a2a;
    border: 1px solid #b30000;
    border-radius: 40px;
    padding: 10px 16px;
    color: white;
    font-size: 13px;
    flex: 1;
    min-width: 120px;
}
.add-btn {
    background: #b30000;
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}
.add-btn:hover {
    background: #ff4d4d;
    transform: translateY(-2px);
}
.empty-state {
    text-align: center;
    padding: 40px;
    color: #888;
}
.info-box {
    background: #2a1500;
    border: 1px solid #ff9800;
    border-radius: 16px;
    padding: 12px;
    margin-top: 16px;
    font-size: 12px;
    color: #ffaa00;
}
.orders-grid {
    display: grid;
    gap: 16px;
}
.order-card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 16px;
    border: 2px solid #b30000;
}
.order-card.ready {
    border-color: #00ff9c;
    box-shadow: 0 0 20px rgba(0,255,156,0.1);
}
.order-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
}
.order-id {
    background: #b30000;
    padding: 4px 10px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 12px;
}
.status-pending, .status-preparing, .status-ready {
    padding: 4px 10px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 600;
    display: inline-block;
}
.status-pending { background: #ffaa00; color: #1a1a1a; }
.status-preparing { background: #00a86b; color: white; }
.status-ready { background: #b30000; color: white; animation: pulse 1s infinite; }
.order-total {
    font-size: 18px;
    font-weight: bold;
    color: #00ff9c;
    margin: 12px 0;
    text-align: right;
}
.collect-btn {
    background: #b30000;
    border: none;
    padding: 10px;
    border-radius: 40px;
    color: white;
    font-weight: 600;
    width: 100%;
    cursor: pointer;
}
.collect-btn:disabled {
    background: #444;
    cursor: not-allowed;
}
.transaction-list {
    background: #1a1a1a;
    border-radius: 20px;
    overflow: hidden;
}
.transaction-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid #333;
}
.transaction-icon {
    font-size: 24px;
    min-width: 40px;
}
.transaction-details {
    flex: 1;
}
.transaction-header {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
}
.transaction-vendor {
    font-weight: 700;
    color: #ff4d4d;
    background: rgba(179,0,0,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
}
.transaction-amount {
    font-weight: 800;
    font-size: 13px;
    color: #00ff9c;
}
.vvip-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(8px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
}
.vvip-modal.active {
    opacity: 1;
    visibility: visible;
}
.vvip-modal-card {
    background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
    border-radius: 32px;
    border: 2px solid #b30000;
    max-width: 90%;
    width: 320px;
    padding: 24px;
    text-align: center;
}
.vvip-modal-btn {
    background: #b30000;
    border: none;
    padding: 10px 28px;
    border-radius: 60px;
    color: white;
    cursor: pointer;
    margin-top: 16px;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}
@media (max-width: 768px) {
    body { padding: 12px; }
    .admin-header h1 { font-size: 18px; }
    .admin-tab { padding: 8px 14px; font-size: 11px; }
    .tables-grid { grid-template-columns: 1fr; }
    .bands-table th, .bands-table td { font-size: 11px; padding: 8px 4px; }
}
</style>
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1>
            <i class="fas fa-crown"></i>
            VVIP Console
        </h1>
        <div class="sync-status">
            <span class="sync-dot" style="width:8px;height:8px;background:#00ff9c;border-radius:50%;display:inline-block;"></span>
            LIVE SYNC
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="window.open('vvip-tab.html', '_blank')">📱 Open POS</button>
        </div>
    </div>

    <div class="admin-tabs">
        <button class="admin-tab active" data-tab="overview">📊 Overview</button>
        <button class="admin-tab" data-tab="tables">📋 Tables</button>
        <button class="admin-tab" data-tab="bands">🖨️ Bands</button>
        <button class="admin-tab" data-tab="inventory">📦 Inventory</button>
        <button class="admin-tab" data-tab="orders">👨‍🍳 Orders</button>
        <button class="admin-tab" data-tab="history">📜 History</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div id="tab-overview" class="admin-tab-content active">
        <div class="dashboard-stats" id="overviewStats"></div>
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-chart-line"></i>
                <h2>Quick Actions</h2>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <button class="add-btn" onclick="switchTab('tables')">📋 Manage Tables</button>
                <button class="add-btn" onclick="switchTab('bands')">🖨️ Manage Bands</button>
                <button class="add-btn" onclick="switchTab('inventory')">📦 Manage Inventory</button>
            </div>
        </div>
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-fire"></i>
                <h2>Low Stock Alerts</h2>
                <span>Needs attention</span>
            </div>
            <div id="lowStockPreview" class="items-list" style="max-height: 200px;"></div>
        </div>
    </div>

    <!-- TABLES TAB -->
    <div id="tab-tables" class="admin-tab-content">
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-plus-circle"></i>
                <h2>Create New Table</h2>
            </div>
            <div class="add-form">
                <input type="text" id="newTableName" placeholder="Table name (e.g., VIP Lounge)">
                <input type="number" id="newTableCapacity" placeholder="Capacity" value="10">
                <input type="number" id="newTableTab" placeholder="Initial Tab (R)" value="8000">
                <button class="add-btn" onclick="createTable()">+ Create Table</button>
            </div>
        </div>
        <div id="tablesList" class="tables-grid"></div>
    </div>

    <!-- BANDS TAB -->
    <div id="tab-bands" class="admin-tab-content">
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-id-card"></i>
                <h2>Registered Wristbands</h2>
                <span>VVIP Members</span>
            </div>
            <div id="bandsListContainer"></div>
        </div>
    </div>

    <!-- INVENTORY TAB -->
    <div id="tab-inventory" class="admin-tab-content">
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-utensils"></i>
                <h2>Menu Items</h2>
                <span>Manage prices & stock</span>
            </div>
            <div id="itemsList" class="items-list"><div class="empty-state">Loading...</div></div>
            <div class="add-form">
                <input type="text" id="newItemName" placeholder="Item name">
                <input type="number" id="newItemPrice" placeholder="Price (R)" step="0.01">
                <select id="newItemCategory">
                    <option value="Shisha">Shisha (Shisha Lounge)</option>
                    <option value="Beers & Ciders">Beers & Ciders (Smart Counter)</option>
                    <option value="Premium Spirits">Premium Spirits (Smart Counter)</option>
                    <option value="Champagne">Champagne (Smart Counter)</option>
                    <option value="Sparkling Wine">Sparkling Wine (Smart Counter)</option>
                    <option value="The Butcher">The Butcher (Butcher Shop)</option>
                    <option value="Non-Alcoholic">Non-Alcoholic (Smart Counter)</option>
                </select>
                <input type="number" id="newItemStock" placeholder="Stock" value="10">
                <button class="add-btn" id="addItemBtn">+ Add Item</button>
            </div>
        </div>
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>Low Stock Items</h2>
            </div>
            <div id="lowStockList" class="items-list" style="max-height: 200px;"></div>
        </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders" class="admin-tab-content">
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-fire"></i>
                <h2>Active Orders</h2>
            </div>
            <div id="activeOrdersGrid" class="orders-grid"></div>
        </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="admin-tab-content">
        <div class="section-card">
            <div class="card-header">
                <i class="fas fa-history"></i>
                <h2>Transaction History</h2>
            </div>
            <div id="historyContent"></div>
        </div>
    </div>
</div>

<div id="vvipModal" class="vvip-modal">
    <div class="vvip-modal-card">
        <div class="vvip-modal-icon" style="font-size:48px;">👑</div>
        <div class="vvip-modal-title" style="font-size:22px; font-weight:800; margin:12px 0;">Notification</div>
        <div class="vvip-modal-message" style="margin:16px 0;">Message</div>
        <button class="vvip-modal-btn" onclick="closeModal()">Confirm</button>
    </div>
</div>

<script>
// ==================== STORAGE KEYS ====================
const INVENTORY_KEY = 'vvip_inventory_data';
const QUEUE_KEY = "butcher_shop_queue";
const ORDERS_KEY = "butcher_shop_orders";

// ==================== GLOBAL STATE ====================
let inventoryProducts = [];
let walletAccounts = {};
let tables = {};
let revenue = 0;
let guests = 0;
let globalOrders = [];
let transactionHistory = [];
let vendorSales = { "Rands Smart Counter":0, "Shisha Lounge":0, "The Butcher Shop":0 };
let editingItemId = null;

// ==================== HELPER FUNCTIONS ====================
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function showModal(title, message) {
    document.getElementById("vvipModal").classList.add("active");
    document.querySelector(".vvip-modal-title").innerText = title;
    document.querySelector(".vvip-modal-message").innerHTML = message;
}
function closeModal() { document.getElementById("vvipModal").classList.remove("active"); }

// ==================== LOAD/SAVE FUNCTIONS ====================
function loadAll() {
    // Load inventory
    const stored = localStorage.getItem(INVENTORY_KEY);
    inventoryProducts = stored ? JSON.parse(stored) : [];
    if (inventoryProducts.length === 0) generateInitialInventory();
    
    // Load wallet accounts from main system
    const mainWallet = JSON.parse(localStorage.getItem('rands_accounts_v2') || '[]');
    const vvipRaw = localStorage.getItem('rands_wallet_accounts');
    let vvipAccounts = vvipRaw ? JSON.parse(vvipRaw) : [];
    let merged = [...vvipAccounts];
    mainWallet.forEach(mainAcc => {
        const idx = merged.findIndex(a => a.id === mainAcc.id);
        if (idx !== -1) merged[idx].balance = mainAcc.balance;
        else merged.push({ id: mainAcc.id, name: mainAcc.name || mainAcc.id, balance: mainAcc.balance || 0, pin: "1234", tableTab: 0, tableName: null });
    });
    localStorage.setItem('rands_wallet_accounts', JSON.stringify(merged));
    walletAccounts = {};
    merged.forEach(acc => { walletAccounts[acc.id] = acc; });
    
    // Load tables
    tables = JSON.parse(localStorage.getItem('tables') || '{}');
    revenue = parseFloat(localStorage.getItem('revenue') || '0');
    guests = parseInt(localStorage.getItem('guests') || '0');
    globalOrders = JSON.parse(localStorage.getItem('globalOrders') || '[]');
    transactionHistory = JSON.parse(localStorage.getItem('transactionHistory') || '[]');
    vendorSales = JSON.parse(localStorage.getItem('vendorSales') || '{"Rands Smart Counter":0,"Shisha Lounge":0,"The Butcher Shop":0}');
}

function saveAll() {
    localStorage.setItem(INVENTORY_KEY, JSON.stringify(inventoryProducts));
    localStorage.setItem('tables', JSON.stringify(tables));
    localStorage.setItem('revenue', revenue);
    localStorage.setItem('guests', guests);
    localStorage.setItem('globalOrders', JSON.stringify(globalOrders));
    localStorage.setItem('transactionHistory', JSON.stringify(transactionHistory));
    localStorage.setItem('vendorSales', JSON.stringify(vendorSales));
    localStorage.setItem('rands_wallet_accounts', JSON.stringify(Object.values(walletAccounts)));
    
    // Sync back to main wallet
    const mainAccounts = JSON.parse(localStorage.getItem('rands_accounts_v2') || '[]');
    Object.values(walletAccounts).forEach(acc => {
        const idx = mainAccounts.findIndex(m => m.id === acc.id);
        if (idx !== -1) mainAccounts[idx].balance = acc.balance;
        else mainAccounts.push({ id: acc.id, name: acc.name || acc.id, balance: acc.balance, status: "Active" });
    });
    localStorage.setItem('rands_accounts_v2', JSON.stringify(mainAccounts));
    window.dispatchEvent(new Event('storage'));
}

function generateInitialInventory() {
    inventoryProducts = [
        { id: Date.now() + 1, name: 'Double Apple Shisha', category: 'Shisha', price: 120, stock: 14, visible: true },
        { id: Date.now() + 2, name: 'Blue Mist Shisha', category: 'Shisha', price: 140, stock: 3, visible: true },
        { id: Date.now() + 3, name: 'Heineken Lager', category: 'Beers & Ciders', price: 35, stock: 48, visible: true },
        { id: Date.now() + 4, name: 'Johnnie Walker Black', category: 'Premium Spirits', price: 380, stock: 8, visible: true },
        { id: Date.now() + 5, name: 'Moët & Chandon', category: 'Champagne', price: 950, stock: 4, visible: true },
        { id: Date.now() + 6, name: 'Prime Rib Steak', category: 'The Butcher', price: 320, stock: 9, visible: true },
        { id: Date.now() + 7, name: 'Coca-Cola Zero', category: 'Non-Alcoholic', price: 25, stock: 56, visible: true }
    ];
    saveAll();
}

// ==================== INVENTORY FUNCTIONS ====================
function addItem(name, price, category, stock) {
    if (!name.trim() || price <= 0) return false;
    inventoryProducts.push({ id: Date.now(), name: name.trim(), price: parseFloat(price), category: category, stock: parseInt(stock) || 0, visible: true });
    saveAll();
    return true;
}
function updateItem(id, newPrice, newStock) {
    const item = inventoryProducts.find(p => p.id === id);
    if (item) {
        if (newPrice !== undefined) item.price = parseFloat(newPrice);
        if (newStock !== undefined) item.stock = parseInt(newStock);
        saveAll();
    }
}
function deleteItem(id) { inventoryProducts = inventoryProducts.filter(p => p.id !== id); saveAll(); }

// ==================== TABLE FUNCTIONS ====================
function createTable() {
    const name = document.getElementById('newTableName')?.value.trim();
    const capacity = parseInt(document.getElementById('newTableCapacity')?.value);
    const tab = parseInt(document.getElementById('newTableTab')?.value);
    if (!name || capacity < 1) { showModal("Error", "Valid name and capacity required"); return; }
    if (tables[name]) { showModal("Duplicate", "Table already exists"); return; }
    tables[name] = { name, capacity, tabBalance: tab, entriesUsed: 0, guests: [], originalTab: tab };
    // NO SERVICE FEE DEDUCTION - table gets exactly the amount entered
    // revenue is NOT increased by 2000 anymore - exact amount stays as is
    saveAll();
    renderAll();
    showModal("Table Created", `${name} created with R${tab} tab (no service fee deducted)`);
    document.getElementById('newTableName').value = '';
}

function assignToTable(tableName) {
    const walletId = prompt("Enter Wallet ID to assign:");
    if (!walletId) return;
    if (!walletAccounts[walletId]) {
        if (confirm(`Wallet "${walletId}" not found. Create new?`)) {
            walletAccounts[walletId] = { id: walletId, name: "Guest", balance: 0, pin: "0000", tableTab: 0, tableName: null };
            saveAll();
        } else return;
    }
    const table = tables[tableName];
    if (!table) return;
    if (table.guests?.includes(walletId)) { showModal("Already Assigned", `${walletId} already at this table`); return; }
    if ((table.guests?.length || 0) >= table.capacity) { showModal("Table Full", `${tableName} at capacity`); return; }
    if (!table.guests) table.guests = [];
    table.guests.push(walletId);
    table.entriesUsed = table.guests.length;
    if (walletAccounts[walletId]) walletAccounts[walletId].tableName = tableName;
    saveAll();
    renderAll();
    showModal("Assigned", `${walletId} → ${tableName}`);
}

function unassignFromTable(tableName) {
    const walletId = prompt("Enter Wallet ID to remove:");
    if (!walletId) return;
    const table = tables[tableName];
    if (!table) return;
    const idx = (table.guests || []).indexOf(walletId);
    if (idx !== -1) {
        table.guests.splice(idx, 1);
        table.entriesUsed = table.guests.length;
        if (walletAccounts[walletId]) delete walletAccounts[walletId].tableName;
        saveAll();
        renderAll();
        showModal("Removed", `${walletId} removed from ${tableName}`);
    } else { showModal("Not Found", `${walletId} not at this table`); }
}

function printBand(bandId) {
    const account = walletAccounts[bandId];
    if (!account) { showModal("Error", "Band not found"); return; }
    const printWindow = window.open('', '_blank');
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(bandId)}`;
    printWindow.document.write(`<!DOCTYPE html><html><head><title>VVIP Wristband - ${bandId}</title><style>body{margin:0;padding:20px;background:white;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial;}.wristband{width:320px;background:linear-gradient(145deg,#b30000,#8b0000);border-radius:40px;padding:30px;text-align:center;color:white;}.logo{font-size:36px;margin-bottom:15px;}.band-id{font-size:26px;font-weight:bold;margin:15px 0;background:rgba(255,255,255,0.2);padding:10px;border-radius:50px;}.qr{background:white;padding:15px;border-radius:24px;display:inline-block;margin:15px 0;}.qr img{width:150px;height:150px;}</style><body><div class="wristband"><div class="logo">👑 RANDS VVIP</div><div class="band-id">${bandId}</div><div class="qr"><img src="${qrUrl}"></div><div class="footer">Present this wristband for access</div></div></body></html>`);
    printWindow.document.close();
    printWindow.print();
}

function collectOrder(orderId) {
    const idx = globalOrders.findIndex(o => o.orderId === orderId);
    if (idx !== -1 && globalOrders[idx].status === "ready") {
        globalOrders[idx].status = "collected";
        saveAll();
        renderAll();
        showModal("Order Collected", `Order #${orderId} collected`);
    }
}

// ==================== RENDER FUNCTIONS ====================
function renderOverview() {
    const totalTables = Object.keys(tables).length;
    const occupiedTables = Object.values(tables).filter(t => t.entriesUsed > 0).length;
    const totalGuests = Object.values(tables).reduce((s, t) => s + (t.entriesUsed || 0), 0);
    const totalRevenue = revenue;
    const totalBands = Object.keys(walletAccounts).length;
    const lowStockCount = inventoryProducts.filter(p => p.stock < 5 && p.stock > 0).length;
    document.getElementById('overviewStats').innerHTML = `
        <div class="stat-card"><div class="value">${totalTables}</div><div class="label">Tables</div></div>
        <div class="stat-card"><div class="value">${occupiedTables}</div><div class="label">Occupied</div></div>
        <div class="stat-card"><div class="value">${totalGuests}</div><div class="label">Guests</div></div>
        <div class="stat-card"><div class="value">R${totalRevenue.toLocaleString()}</div><div class="label">Revenue</div></div>
        <div class="stat-card"><div class="value">${totalBands}</div><div class="label">Bands</div></div>
        <div class="stat-card"><div class="value">${lowStockCount}</div><div class="label">Low Stock</div></div>
    `;
    const lowStockItems = inventoryProducts.filter(p => p.stock < 5 && p.stock > 0).slice(0, 5);
    const previewHtml = lowStockItems.length ? lowStockItems.map(p => `<div class="list-item"><div><strong>${escapeHtml(p.name)}</strong><br><span style="color:#ff9800;">⚠️ ${p.stock} left</span></div><div style="color:#ff9800;">Low Stock</div></div>`).join('') : '<div class="empty-state">✅ No low stock items</div>';
    document.getElementById('lowStockPreview').innerHTML = previewHtml;
}

function renderTables() {
    const container = document.getElementById('tablesList');
    if (!container) return;
    if (Object.keys(tables).length === 0) { container.innerHTML = '<div class="empty-state">✨ No tables. Create one above.</div>'; return; }
    container.innerHTML = Object.entries(tables).map(([name, t]) => {
        const original = t.originalTab || t.tabBalance;
        const spent = original - t.tabBalance;
        const percent = original > 0 ? (spent / original) * 100 : 0;
        return `<div class="table-card"><div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span class="table-name">${escapeHtml(name)}</span><span style="color:#ff4d4d; font-weight:bold;">Tab: R${t.tabBalance}</span></div>
        <div style="margin-bottom:10px;"><div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span>👥 Guests: ${t.entriesUsed}/${t.capacity}</span><span>💰 Spent: R${spent}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div></div>
        <div style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;"><input type="text" id="assign_${name.replace(/\s/g, '_')}" placeholder="Wallet ID" style="flex:1; padding:8px 12px; background:#2a2a2a; border:1px solid #b30000; border-radius:40px; color:white;"><button onclick="assignToTable('${escapeHtml(name).replace(/'/g, "\\'")}')" class="btn-small">➕ Assign</button><button onclick="unassignFromTable('${escapeHtml(name).replace(/'/g, "\\'")}')" class="btn-small">🗑️ Remove</button></div>
        <div><span style="color:#aaa; font-size:12px;">Assigned:</span><div style="margin-top:6px;">${(t.guests || []).map(g => `<span class="guest-badge">${escapeHtml(g)}</span>`).join('') || '<span style="color:#666; font-size:11px;">None</span>'}</div></div></div>`;
    }).join('');
    document.querySelectorAll('[id^="assign_"]').forEach(input => {
        const tableName = input.id.replace('assign_', '').replace(/_/g, ' ');
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') assignToTable(tableName); });
    });
}

function renderBands() {
    const container = document.getElementById('bandsListContainer');
    if (!container) return;
    if (Object.keys(walletAccounts).length === 0) { container.innerHTML = '<div class="empty-state">💳 No wristbands registered yet.</div>'; return; }
    container.innerHTML = `<div style="overflow-x:auto;"><table class="bands-table"><thead><tr><th>🆔 ID</th><th>👤 Name</th><th>💰 Balance</th><th>📋 Table</th><th>🖨️</th></tr></thead><tbody>${Object.entries(walletAccounts).map(([id, acc]) => `<tr><td style="font-family:monospace;">${escapeHtml(id)}</td><td>${escapeHtml(acc.name || '-')}</td><td style="color:#00ff9c;">R${(acc.balance || 0).toLocaleString()}</td><td>${acc.tableName ? escapeHtml(acc.tableName) : '<span style="color:#666;">—</span>'}</td><td><button onclick="printBand('${id.replace(/'/g, "\\'")}')" class="btn-small">🖨️ Print</button></td></tr>`).join('')}</tbody></table></div><div style="margin-top:16px; padding:12px; background:#1a1a1a; border-radius:20px; text-align:center; font-size:12px;">💡 Total: ${Object.keys(walletAccounts).length} bands | Balance: R${Object.values(walletAccounts).reduce((s, a) => s + (a.balance || 0), 0).toLocaleString()}</div>`;
}

function renderInventory() {
    const container = document.getElementById('itemsList');
    if (inventoryProducts.length === 0) { container.innerHTML = '<div class="empty-state">No items. Add your first item!</div>'; return; }
    container.innerHTML = inventoryProducts.map(item => {
        const isEditing = editingItemId === item.id;
        return `<div class="list-item" data-id="${item.id}"><div class="item-info"><div class="item-name">${escapeHtml(item.name)}</div>
        <div class="item-price">${isEditing ? `<input type="number" id="edit-price-${item.id}" value="${item.price}" step="0.01">` : `Price: R${item.price}`}</div>
        <div class="item-stock">${isEditing ? `<input type="number" id="edit-stock-${item.id}" value="${item.stock}">` : `Stock: ${item.stock} units`} ${item.stock < 5 && item.stock > 0 ? ' ⚠️ Low' : ''} ${item.stock === 0 ? ' ❌ Out' : ''}</div>
        <div class="item-category">${item.category}</div></div>
        <div class="item-actions">${isEditing ? `<button class="save-btn" onclick="saveEdit(${item.id})">💾 Save</button><button class="edit-btn" onclick="cancelEdit()">✕ Cancel</button>` : `<button class="edit-btn" onclick="startEdit(${item.id})">✏️ Edit</button><button class="delete-btn" onclick="deleteItem(${item.id}); renderInventory(); renderLowStock();">🗑️ Delete</button>`}</div></div>`;
    }).join('');
}

function startEdit(id) { editingItemId = id; renderInventory(); }
function cancelEdit() { editingItemId = null; renderInventory(); }
function saveEdit(id) {
    const price = document.getElementById(`edit-price-${id}`)?.value;
    const stock = document.getElementById(`edit-stock-${id}`)?.value;
    if (price && stock) updateItem(id, price, stock);
    editingItemId = null;
    renderInventory();
    renderLowStock();
    showModal("Updated", "Item updated and synced to POS");
}

function renderLowStock() {
    const container = document.getElementById('lowStockList');
    const lowStock = inventoryProducts.filter(p => p.stock < 5 && p.stock > 0);
    const outStock = inventoryProducts.filter(p => p.stock === 0);
    if (lowStock.length === 0 && outStock.length === 0) { container.innerHTML = '<div class="empty-state">✅ All stock levels healthy!</div>'; return; }
    let html = '';
    lowStock.forEach(p => html += `<div class="list-item"><div><strong>${escapeHtml(p.name)}</strong><br><span style="color:#ff9800;">⚠️ Only ${p.stock} left</span></div><div style="color:#ff9800;">Low Stock</div></div>`);
    outStock.forEach(p => html += `<div class="list-item"><div><strong>${escapeHtml(p.name)}</strong><br><span style="color:#ff4d4d;">❌ OUT OF STOCK</span></div><div style="color:#ff4d4d;">Restock Needed</div></div>`);
    container.innerHTML = html;
}

function renderOrders() {
    const container = document.getElementById('activeOrdersGrid');
    if (!container) return;
    const activeOrders = globalOrders.filter(o => o.status !== "collected");
    if (activeOrders.length === 0) { container.innerHTML = '<div class="empty-state">🍽️ No active orders.</div>'; return; }
    container.innerHTML = activeOrders.map(order => {
        let statusClass = "", statusText = "", readyClass = "";
        if (order.status === "pending") { statusClass = "status-pending"; statusText = "PENDING"; }
        else if (order.status === "preparing") { statusClass = "status-preparing"; statusText = "PREPARING"; }
        else if (order.status === "ready") { statusClass = "status-ready"; statusText = "READY"; readyClass = "ready"; }
        let vendorIcon = order.vendor === "Rands Smart Counter" ? "🍺" : order.vendor === "Shisha Lounge" ? "💨" : "🥩";
        return `<div class="order-card ${readyClass}"><div class="order-header"><span class="order-id">#${order.orderId}</span><span style="color:#888; font-size:11px;">${order.timestamp}</span></div>
        <div style="margin-bottom:10px; font-size:12px;">${vendorIcon} <strong>${order.vendor}</strong> | Band: ${order.bandId}</div>
        <div class="${statusClass}" style="margin-bottom:10px;">${statusText}</div>
        <div style="margin:10px 0;">${order.items.map(item => `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #333; font-size:12px;"><span>${item.quantity}x ${item.name}</span><span>R${item.price * item.quantity}</span></div>`).join('')}</div>
        <div class="order-total">Total: R${order.total}</div>
        <button class="collect-btn" onclick="collectOrder(${order.orderId})" ${order.status !== "ready" ? "disabled" : ""}>${order.status === "ready" ? "📦 COLLECT" : "⏳ WAITING"}</button></div>`;
    }).join('');
}

function renderHistory() {
    const container = document.getElementById('historyContent');
    if (!container) return;
    const history = transactionHistory || [];
    if (history.length === 0) { container.innerHTML = '<div class="empty-state">✨ No transactions yet.</div>'; return; }
    const totalSpent = history.reduce((s, tx) => s + tx.amount, 0);
    container.innerHTML = `<div class="dashboard-stats"><div class="stat-card"><div class="value">R${totalSpent.toFixed(2)}</div><div class="label">Total Spent</div></div><div class="stat-card"><div class="value">${history.length}</div><div class="label">Transactions</div></div></div><div class="transaction-list">${history.slice(0, 30).map(tx => { let vendorIcon = tx.vendor === "Rands Smart Counter" ? "🍺" : tx.vendor === "Shisha Lounge" ? "💨" : "🥩"; return `<div class="transaction-item"><div class="transaction-icon">${vendorIcon}</div><div class="transaction-details"><div class="transaction-header"><span class="transaction-vendor">${tx.vendor}</span><span class="transaction-amount">+R${tx.amount}</span></div><div class="transaction-item-name">${tx.quantity || 1}x ${tx.item}</div><div class="transaction-time" style="font-size:10px; color:#888;">⏱️ ${tx.time || new Date().toLocaleTimeString()}</div></div></div>`; }).join('')}</div>`;
}

function renderAll() {
    const activeTab = document.querySelector('.admin-tab.active')?.dataset.tab;
    renderOverview();
    if (activeTab === 'overview') { renderOverview(); renderLowStock(); }
    if (activeTab === 'tables') renderTables();
    if (activeTab === 'bands') renderBands();
    if (activeTab === 'inventory') { renderInventory(); renderLowStock(); }
    if (activeTab === 'orders') renderOrders();
    if (activeTab === 'history') renderHistory();
}

// ==================== TAB SWITCHING ====================
function switchTab(tabName) {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`.admin-tab[data-tab="${tabName}"]`).classList.add('active');
    document.getElementById(`tab-${tabName}`).classList.add('active');
    renderAll();
}

// ==================== EVENT LISTENERS ====================
document.getElementById('addItemBtn')?.addEventListener('click', () => {
    const name = document.getElementById('newItemName').value;
    const price = document.getElementById('newItemPrice').value;
    const category = document.getElementById('newItemCategory').value;
    const stock = document.getElementById('newItemStock').value;
    if (addItem(name, price, category, stock)) {
        document.getElementById('newItemName').value = '';
        document.getElementById('newItemPrice').value = '';
        document.getElementById('newItemStock').value = '10';
        renderInventory();
        renderLowStock();
        showModal("Item Added", `${name} added to menu`);
    } else { showModal("Error", "Invalid item data"); }
});

document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ==================== INIT ====================
window.switchTab = switchTab;
window.assignToTable = assignToTable;
window.unassignFromTable = unassignFromTable;
window.printBand = printBand;
window.collectOrder = collectOrder;
window.startEdit = startEdit;
window.cancelEdit = cancelEdit;
window.saveEdit = saveEdit;
window.deleteItem = deleteItem;
window.createTable = createTable;
window.closeModal = closeModal;

loadAll();
renderAll();
setInterval(() => { loadAll(); renderAll(); }, 4000);
window.addEventListener('storage', () => { loadAll(); renderAll(); });
</script>
</body>
