<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ButcherShop · Admin Menu Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
  body { background: #f1f5f9; padding: 20px; min-height: 100vh; }
  .admin-container {
    max-width: 1200px;
    margin: 0 auto;
  }
  .admin-header {
    background: white;
    border-radius: 28px;
    padding: 24px 32px;
    margin-bottom: 24px;
    border: 1px solid #eef2f6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .admin-header h1 {
    color: #dc2626;
    font-size: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sync-status {
    background: #10b981;
    color: white;
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card {
    background: white;
    border-radius: 28px;
    overflow: hidden;
    border: 1px solid #eef2f6;
    margin-bottom: 24px;
  }
  .card-header {
    padding: 20px 24px;
    background: white;
    border-bottom: 2px solid #f0f0f0;
    font-weight: 700;
    font-size: 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .category-list {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 20px 24px;
  }
  .category-tag {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 40px;
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .category-tag span {
    font-weight: 600;
    font-size: 14px;
  }
  .delete-cat-btn {
    background: none;
    border: none;
    color: #f44336;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    transition: color 0.2s;
  }
  .delete-cat-btn:hover {
    color: #d32f2f;
  }
  .add-form {
    padding: 16px 24px 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    border-top: 1px solid #f0f0f0;
  }
  .add-form input, .add-form select {
    padding: 10px 16px;
    border: 1px solid #e2e8f0;
    border-radius: 40px;
    font-size: 14px;
    flex: 1;
    min-width: 150px;
  }
  .add-form button {
    background: #dc2626;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  .add-form button:hover {
    background: #b91c1c;
  }
  .items-table-container {
    padding: 0 24px 24px;
    overflow-x: auto;
  }
  .items-table {
    width: 100%;
    border-collapse: collapse;
  }
  .items-table th, .items-table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #e2e8f0;
  }
  .items-table th {
    background: #f8fafc;
    font-weight: 600;
    color: #1e293b;
  }
  .edit-item-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    font-size: 14px;
  }
  .save-item-btn {
    background: #10b981;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    margin: 0 4px;
    font-size: 12px;
    transition: background 0.2s;
  }
  .save-item-btn:hover {
    background: #059669;
  }
  .delete-item-btn {
    background: #f44336;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    margin: 0 4px;
    font-size: 12px;
    transition: background 0.2s;
  }
  .delete-item-btn:hover {
    background: #d32f2f;
  }
  .category-section {
    margin-bottom: 32px;
  }
  .category-title {
    background: #f1f5f9;
    padding: 12px 24px;
    font-weight: 700;
    color: #dc2626;
    font-size: 18px;
    border-bottom: 2px solid #dc2626;
  }
  .reset-btn {
    background: #f59e0b;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
  }
  .reset-btn:hover {
    background: #d97706;
  }
  .stunning-popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideUp {
    from {
      transform: translateY(40px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }
  .stunning-popup {
    background: linear-gradient(145deg, #ffffff 0%, #fff8f8 100%);
    border-radius: 48px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    padding: 32px 28px;
    animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border: 2px solid #dc2626;
    box-shadow: 0 30px 50px rgba(0,0,0,0.3);
  }
  .stunning-popup-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .stunning-popup-icon i {
    font-size: 40px;
    color: white;
  }
  .stunning-popup h3 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .stunning-popup .popup-message {
    font-size: 14px;
    color: #475569;
    margin-bottom: 20px;
  }
  .stunning-popup-btn {
    background: #dc2626;
    border: none;
    padding: 12px 28px;
    border-radius: 60px;
    font-weight: 700;
    color: white;
    cursor: pointer;
  }
  .stunning-popup-success {
    border-color: #10b981;
  }
  .stunning-popup-success .stunning-popup-icon {
    background: linear-gradient(135deg, #10b981, #059669);
  }
  .stunning-popup-warning {
    border-color: #f59e0b;
  }
  .stunning-popup-warning .stunning-popup-icon {
    background: linear-gradient(135deg, #f59e0b, #d97706);
  }
  @media (max-width: 768px) {
    body { padding: 12px; }
    .admin-header { padding: 16px 20px; }
    .card-header { padding: 16px 20px; }
    .items-table-container { padding: 0 16px 16px; }
  }
</style>
</head>
<body>
<div class="admin-container">
  <div class="admin-header">
    <h1><i class="fas fa-utensils"></i> Butcher Shop · Menu Manager</h1>
    <div>
      <button class="reset-btn" id="resetToDefaultBtn"><i class="fas fa-undo"></i> Reset to Default</button>
      <span class="sync-status" id="syncStatus"><i class="fas fa-check-circle"></i> Live Sync Active</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span><i class="fas fa-tags"></i> Categories</span>
      <span style="font-size: 12px; color: #666;">Changes sync instantly to POS</span>
    </div>
    <div class="category-list" id="categoryList"></div>
    <div class="add-form">
      <input type="text" id="newCategoryName" placeholder="New category name (e.g., Desserts)">
      <button id="addCategoryBtn">+ Add Category</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span><i class="fas fa-list-ul"></i> Menu Items</span>
      <span style="font-size: 12px; color: #666;">Edit prices and names below</span>
    </div>
    <div id="itemsContainer"></div>
    <div class="add-form" style="border-top: 1px solid #f0f0f0;">
      <select id="itemCategorySelect"></select>
      <input type="text" id="newItemName" placeholder="Item name">
      <input type="number" id="newItemPrice" placeholder="Price (R)" step="0.01">
      <button id="addItemBtn">+ Add Item</button>
    </div>
  </div>
</div>

<script>
  // ========== STORAGE KEYS (SAME AS PRE-ORDER POS) ==========
  const MENU_KEY = "butcher_menu_config";
  const DEFAULT_MENU = {
    meat: [{ id: "ribeye", name: "Ribeye Steak", price: 159 }, { id: "beef_sausage", name: "Beef Sausage", price: 89 }, { id: "lamb_chop", name: "Lamb Chop", price: 199 }, { id: "bacon_pack", name: "Bacon 500g", price: 79 }],
    meals: [{ id: "steak_combo", name: "Steak + Chips", price: 189 }, { id: "boerewors_roll", name: "Boerewors Roll", price: 65 }, { id: "barbecue_platter", name: "BBQ Platter", price: 299 }],
    sides: [{ id: "chips", name: "Chips", price: 25 }, { id: "salad", name: "Fresh Salad", price: 32 }, { id: "pap_sheba", name: "Pap & Sheba", price: 28 }],
    drinks: [{ id: "coke", name: "Coca-Cola", price: 18 }, { id: "water", name: "Still Water", price: 12 }, { id: "beer", name: "Castle Lager", price: 28 }]
  };
  
  let menu = {};

  function loadMenu() {
    const saved = localStorage.getItem(MENU_KEY);
    if (saved) {
      menu = JSON.parse(saved);
    } else {
      menu = JSON.parse(JSON.stringify(DEFAULT_MENU));
      saveMenu();
    }
    renderAdminPanel();
  }

  function saveMenu() {
    localStorage.setItem(MENU_KEY, JSON.stringify(menu));
    // Trigger storage event for POS to detect changes
    window.dispatchEvent(new StorageEvent('storage', { key: MENU_KEY, newValue: JSON.stringify(menu) }));
    showPopup('Menu Saved', 'Changes have been synced to the POS system.', 'success', 1500);
  }

  function showPopup(title, message, type = 'success', autoClose = 2000) {
    const overlay = document.createElement('div');
    overlay.className = 'stunning-popup-overlay';
    
    let iconClass = 'fa-check-circle';
    let popupClass = '';
    if (type === 'success') {
      iconClass = 'fa-check-circle';
      popupClass = 'stunning-popup-success';
    } else if (type === 'warning') {
      iconClass = 'fa-exclamation-triangle';
      popupClass = 'stunning-popup-warning';
    } else {
      iconClass = 'fa-info-circle';
      popupClass = 'stunning-popup-success';
    }
    
    overlay.innerHTML = `
      <div class="stunning-popup ${popupClass}">
        <div class="stunning-popup-icon">
          <i class="fas ${iconClass}"></i>
        </div>
        <h3>${title}</h3>
        <div class="popup-message">${message}</div>
        <button class="stunning-popup-btn" id="popupCloseBtn">Got it</button>
      </div>
    `;
    
    document.body.appendChild(overlay);
    
    const closeBtn = overlay.querySelector('#popupCloseBtn');
    const closePopup = () => overlay.remove();
    closeBtn.addEventListener('click', closePopup);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
    
    if (autoClose) {
      setTimeout(() => { if (document.body.contains(overlay)) closePopup(); }, autoClose);
    }
  }

  function getCategoryDisplayName(key) {
    const names = { meat: 'MEAT', meals: 'MEALS', sides: 'SIDES', drinks: 'DRINKS' };
    return names[key] || key.toUpperCase();
  }

  function renderAdminPanel() {
    const categories = Object.keys(menu);
    
    // Render Categories
    const categoryListHtml = categories.map(cat => `
      <div class="category-tag">
        <span>${getCategoryDisplayName(cat)}</span>
        <button class="delete-cat-btn" data-cat="${cat}">✕</button>
      </div>
    `).join('');
    document.getElementById('categoryList').innerHTML = categoryListHtml || '<p style="padding: 0 24px;">No categories yet</p>';
    
    // Delete category handlers
    document.querySelectorAll('.delete-cat-btn').forEach(btn => {
      btn.onclick = () => {
        const catKey = btn.dataset.cat;
        if (confirm(`Delete category "${getCategoryDisplayName(catKey)}" and all its items?`)) {
          delete menu[catKey];
          saveMenu();
          renderAdminPanel();
          showPopup('Category Deleted', `"${getCategoryDisplayName(catKey)}" has been removed.`, 'success', 1500);
        }
      };
    });
    
    // Render Items by Category
    const itemsContainer = document.getElementById('itemsContainer');
    let itemsHtml = '';
    for (let cat of categories) {
      itemsHtml += `
        <div class="category-section">
          <div class="category-title">${getCategoryDisplayName(cat)}</div>
          <div class="items-table-container">
            <table class="items-table">
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Price (R)</th>
                  <th style="width: 150px;">Actions</th>
                </tr>
              </thead>
              <tbody>
      `;
      menu[cat].forEach(item => {
        itemsHtml += `
          <tr data-item-id="${item.id}" data-cat="${cat}">
            <td><input type="text" class="edit-item-input edit-name" value="${escapeHtml(item.name)}" style="width: 100%;"></td>
            <td><input type="number" class="edit-item-input edit-price" value="${item.price}" step="0.01" style="width: 100px;"></td>
            <td>
              <button class="save-item-btn" data-cat="${cat}" data-id="${item.id}">💾 Save</button>
              <button class="delete-item-btn" data-cat="${cat}" data-id="${item.id}">🗑️ Delete</button>
            </td>
          </tr>
        `;
      });
      itemsHtml += `
              </tbody>
            </table>
          </div>
        </div>
      `;
    }
    itemsContainer.innerHTML = itemsHtml || '<div style="padding: 40px; text-align: center;">No items. Add some!</div>';
    
    // Save item handlers
    document.querySelectorAll('.save-item-btn').forEach(btn => {
      btn.onclick = () => {
        const cat = btn.dataset.cat;
        const id = btn.dataset.id;
        const row = btn.closest('tr');
        const newName = row.querySelector('.edit-name').value.trim();
        const newPrice = parseFloat(row.querySelector('.edit-price').value);
        if (newName && !isNaN(newPrice)) {
          const itemIndex = menu[cat].findIndex(i => i.id === id);
          if (itemIndex !== -1) {
            menu[cat][itemIndex].name = newName;
            menu[cat][itemIndex].price = newPrice;
            saveMenu();
            showPopup('Item Updated', `"${newName}" has been updated.`, 'success', 1200);
          }
        } else {
          showPopup('Invalid Input', 'Please enter a valid name and price.', 'warning', 1500);
        }
      };
    });
    
    // Delete item handlers
    document.querySelectorAll('.delete-item-btn').forEach(btn => {
      btn.onclick = () => {
        const cat = btn.dataset.cat;
        const id = btn.dataset.id;
        const item = menu[cat]?.find(i => i.id === id);
        if (confirm(`Delete "${item?.name}" from menu?`)) {
          menu[cat] = menu[cat].filter(i => i.id !== id);
          saveMenu();
          renderAdminPanel();
          showPopup('Item Deleted', `"${item?.name}" has been removed.`, 'success', 1500);
        }
      };
    });
    
    // Update category select dropdown for add item
    const categorySelect = document.getElementById('itemCategorySelect');
    categorySelect.innerHTML = categories.map(cat => `<option value="${cat}">${getCategoryDisplayName(cat)}</option>`).join('');
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  
  // Add Category
  document.getElementById('addCategoryBtn').onclick = () => {
    const newName = document.getElementById('newCategoryName').value.trim();
    if (newName) {
      const catKey = newName.toLowerCase().replace(/\s+/g, '_');
      if (menu[catKey]) {
        showPopup('Category Exists', `Category "${newName}" already exists!`, 'warning', 1500);
        return;
      }
      menu[catKey] = [];
      saveMenu();
      renderAdminPanel();
      document.getElementById('newCategoryName').value = '';
      showPopup('Category Added', `"${newName}" category has been added.`, 'success', 1500);
    } else {
      showPopup('Invalid Name', 'Please enter a category name.', 'warning', 1500);
    }
  };
  
  // Add Item
  document.getElementById('addItemBtn').onclick = () => {
    const category = document.getElementById('itemCategorySelect').value;
    const itemName = document.getElementById('newItemName').value.trim();
    const itemPrice = parseFloat(document.getElementById('newItemPrice').value);
    
    if (!category) {
      showPopup('No Category', 'Please select a category first.', 'warning', 1500);
      return;
    }
    if (!itemName) {
      showPopup('Invalid Name', 'Please enter an item name.', 'warning', 1500);
      return;
    }
    if (isNaN(itemPrice) || itemPrice <= 0) {
      showPopup('Invalid Price', 'Please enter a valid price.', 'warning', 1500);
      return;
    }
    
    const newId = `${category}_${Date.now()}`;
    menu[category].push({ id: newId, name: itemName, price: itemPrice });
    saveMenu();
    renderAdminPanel();
    document.getElementById('newItemName').value = '';
    document.getElementById('newItemPrice').value = '';
    showPopup('Item Added', `"${itemName}" added to ${getCategoryDisplayName(category)}.`, 'success', 1500);
  };
  
  // Reset to Default Menu
  document.getElementById('resetToDefaultBtn').onclick = () => {
    if (confirm('Reset entire menu to default? This will remove all custom categories and items.')) {
      menu = JSON.parse(JSON.stringify(DEFAULT_MENU));
      saveMenu();
      renderAdminPanel();
      showPopup('Menu Reset', 'Menu has been reset to default configuration.', 'success', 1500);
    }
  };
  
  // Initialize
  loadMenu();
  
  // Listen for changes from other tabs (optional)
  window.addEventListener('storage', (e) => {
    if (e.key === MENU_KEY && e.newValue) {
      menu = JSON.parse(e.newValue);
      renderAdminPanel();
    }
  });
</script>
</body>
</html>
