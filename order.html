<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rands Vibe Passport | Order & Track</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }
        .order-container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        /* Header */
        .order-header {
            background: linear-gradient(145deg, #E30613 0%, #a0010e 100%);
            padding: 24px 20px;
            text-align: center;
        }
        .order-header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .order-header p {
            color: rgba(255,255,255,0.8);
            font-size: 0.7rem;
        }
        /* Customer Info Bar */
        .customer-bar {
            background: #f8fafd;
            padding: 16px 20px;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .customer-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .customer-badge {
            background: #E30613;
            color: white;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .balance-badge {
            background: #10b981;
            color: white;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .switch-customer {
            background: #eef2f8;
            border: none;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #E30613;
            cursor: pointer;
        }
        /* Vendor Selector */
        .vendor-selector {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #eef2f8;
        }
        .vendor-selector label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #64748b;
            display: block;
            margin-bottom: 8px;
        }
        .vendor-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #eef2f8;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            background: #f8fafd;
            transition: all 0.2s;
        }
        .vendor-select:focus {
            outline: none;
            border-color: #E30613;
        }
        /* Menu Grid */
        .menu-section {
            padding: 20px;
        }
        .menu-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .menu-item {
            background: #f8fafd;
            border: 1px solid #eef2f8;
            border-radius: 20px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-item:active {
            transform: scale(0.96);
            background: #fff0f0;
            border-color: #E30613;
        }
        .menu-item-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: #1e293b;
        }
        .menu-item-price {
            font-size: 0.7rem;
            color: #E30613;
            font-weight: 600;
            margin-top: 4px;
        }
        /* Cart Section */
        .cart-section {
            background: #f8fafd;
            border-radius: 28px;
            padding: 20px;
            margin-top: 8px;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .cart-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
        }
        .cart-badge {
            background: #E30613;
            color: white;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .cart-items {
            max-height: 300px;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
        }
        .cart-item-price {
            font-size: 0.7rem;
            color: #64748b;
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: white;
            border: 1px solid #e2e8f0;
            font-weight: 700;
            cursor: pointer;
            transition: 0.1s;
        }
        .qty-btn:active {
            transform: scale(0.92);
            background: #E30613;
            color: white;
            border-color: #E30613;
        }
        .cart-item-qty {
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }
        .cart-item-total {
            font-weight: 700;
            font-size: 0.85rem;
            color: #E30613;
            min-width: 55px;
            text-align: right;
        }
        .remove-item {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }
        .cart-summary {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #e2e8f0;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .summary-total {
            font-weight: 800;
            font-size: 1rem;
            color: #E30613;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }
        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(95deg, #E30613, #b0020e);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .checkout-btn:active:not(:disabled) {
            transform: scale(0.97);
        }
        /* Active Orders Section (Customer View) */
        .my-orders-section {
            padding: 0 20px 20px 20px;
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .order-card {
            background: #f8fafd;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #eef2f8;
            transition: all 0.2s;
        }
        .order-card.ready {
            border-color: #10b981;
            background: #f0fdf4;
            animation: pulseGreen 1s infinite;
        }
        @keyframes pulseGreen {
            0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.1); }
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-id {
            font-family: monospace;
            font-size: 0.7rem;
            background: #eef2f8;
            padding: 4px 10px;
            border-radius: 60px;
            font-weight: 600;
        }
        .order-vendor {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 60px;
        }
        .order-status {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 60px;
        }
        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }
        .status-preparing {
            background: #dbeafe;
            color: #2563eb;
        }
        .status-ready {
            background: #10b981;
            color: white;
            animation: pulse 1s infinite;
        }
        .status-collected {
            background: #e2e8f0;
            color: #64748b;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .order-items {
            font-size: 0.75rem;
            color: #475569;
            margin-bottom: 12px;
        }
        .order-total {
            font-weight: 700;
            color: #E30613;
            text-align: right;
            font-size: 0.9rem;
        }
        .empty-orders {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }
        /* Toast Message */
        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 1100;
            font-size: 0.8rem;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .toast-message.show {
            transform: translateY(0);
            opacity: 1;
        }
        /* Alert Modal */
        .alert-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .alert-modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .alert-modal {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 40px;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        .alert-modal-overlay.active .alert-modal {
            transform: scale(1);
        }
        .alert-modal-header {
            background: linear-gradient(135deg, #E30613, #b0020e);
            padding: 20px 24px;
            text-align: center;
        }
        .alert-modal-header i {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 8px;
        }
        .alert-modal-header h3 {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .alert-modal-body {
            padding: 24px;
            color: #1e293b;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .alert-modal-footer {
            padding: 16px 24px 24px;
            border-top: 1px solid #eef2f8;
        }
        .alert-modal-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #E30613, #b0020e);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
        }
        /* Bottom Nav */
        #bottomNav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div id="orderApp">
    <div class="order-container">
        <!-- Header -->
        <div class="order-header">
            <h1><i class="fas fa-shopping-cart"></i> Order & Track</h1>
            <p>Place orders and track their status in real-time</p>
        </div>

        <!-- Customer Info Bar -->
        <div class="customer-bar">
            <div class="customer-info">
                <span class="customer-badge" id="customerNameDisplay">Not logged in</span>
                <span class="balance-badge" id="customerBalanceDisplay">R0</span>
            </div>
            <button class="switch-customer" onclick="window.location.href='home.html'">
                <i class="fas fa-arrow-left"></i> Back to Wallet
            </button>
        </div>

        <!-- Vendor Selector -->
        <div class="vendor-selector">
            <label><i class="fas fa-store"></i> Choose Vendor</label>
            <select id="vendorSelect" class="vendor-select" @change="switchVendor()">
                <option value="Rands Smart Counter">🍺 Rands Smart Counter - Alcohol</option>
                <option value="Shisha Lounge">💨 Shisha Lounge - Hookah Flavours</option>
                <option value="The Butcher Shop">🥩 The Butcher Shop - South African Food</option>
            </select>
        </div>

        <!-- Menu Section -->
        <div class="menu-section">
            <div class="menu-title">
                <i class="fas fa-utensils"></i> Menu Items
            </div>
            <div class="menu-grid" id="menuGrid">
                <div class="loading">Loading menu...</div>
            </div>
        </div>

        <!-- Cart Section -->
        <div class="cart-section">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-bag"></i> Your Order</h3>
                <span class="cart-badge" id="cartCount">0 items</span>
            </div>
            <div class="cart-items" id="cartItems">
                <div style="text-align:center; padding:20px; color:#94a3b8;">Your cart is empty</div>
            </div>
            <div class="cart-summary" id="cartSummary" style="display: none;">
                <div class="summary-row"><span>Subtotal:</span><span id="cartSubtotal">R0</span></div>
                <div class="summary-row summary-total"><span>Total:</span><span id="cartTotal">R0</span></div>
            </div>
            <button class="checkout-btn" id="checkoutBtn" disabled @click="checkout()">
                💳 Place Order
            </button>
        </div>

        <!-- My Active Orders Section -->
        <div class="my-orders-section">
            <div class="section-title">
                <i class="fas fa-clock"></i> My Active Orders
                <span style="font-size:0.6rem; background:#eef2f8; padding:2px 8px; border-radius:60px;" id="ordersCount">0</span>
            </div>
            <div id="myOrdersList" class="orders-list">
                <div class="empty-orders">No active orders. Place an order above.</div>
            </div>
        </div>
    </div>

    <div class="toast-message" :class="{ show: toastVisible }">{{ toastMessage }}</div>

    <!-- Alert Modal -->
    <div id="alertModalOverlay" class="alert-modal-overlay">
        <div class="alert-modal">
            <div class="alert-modal-header">
                <i class="fas fa-info-circle"></i>
                <h3>Notice</h3>
            </div>
            <div class="alert-modal-body" id="alertModalMessage">Message here</div>
            <div class="alert-modal-footer">
                <button class="alert-modal-btn" onclick="document.getElementById('alertModalOverlay').classList.remove('active')">Got It</button>
            </div>
        </div>
    </div>
</div>
<div id="bottomNav"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
<script>
    // ==================== STORAGE KEYS ====================
    const ACCOUNTS_KEY = 'rands_accounts_v2';
    const GLOBAL_ORDERS_KEY = 'globalOrders';

    // ==================== HELPER FUNCTIONS ====================
    function showAlert(message, title = 'Notice') {
        const overlay = document.getElementById('alertModalOverlay');
        const messageEl = document.getElementById('alertModalMessage');
        const titleEl = document.querySelector('#alertModalOverlay .alert-modal-header h3');
        if (titleEl) titleEl.innerText = title;
        messageEl.innerText = message;
        overlay.classList.add('active');
    }

    function getCurrentAccount() {
        const currentId = localStorage.getItem('rands_current_account');
        if (!currentId) return null;
        const accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || '[]');
        return accounts.find(acc => acc.id === currentId) || null;
    }

    function updateAccountBalance(accountId, newBalance) {
        let accounts = JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || '[]');
        const index = accounts.findIndex(acc => acc.id === accountId);
        if (index !== -1) {
            accounts[index].balance = newBalance;
            localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts));
        }
    }

    function playNotificationSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        } catch(e) { console.log("Sound not supported"); }
    }

    // ==================== MENUS ====================
    const vendorMenus = {
        "Rands Smart Counter": [
            { name: "Castle Lager", price: 45 },
            { name: "Windhoek Lager", price: 55 },
            { name: "Savanna Cider", price: 50 },
            { name: "Jameson & Coke", price: 75 },
            { name: "Jack Daniel's & Coke", price: 85 },
            { name: "Smirnoff Spin", price: 60 },
            { name: "Amarula Cream", price: 70 },
            { name: "Champagne", price: 95 }
        ],
        "Shisha Lounge": [
            { name: "Double Apple", price: 150 },
            { name: "Blue Mist", price: 160 },
            { name: "Watermelon Mint", price: 160 },
            { name: "Peach", price: 150 },
            { name: "Grape Mint", price: 160 },
            { name: "Lemon Mint", price: 150 }
        ],
        "The Butcher Shop": [
            { name: "Boerewors Roll", price: 85 },
            { name: "Steak & Chips", price: 150 },
            { name: "Pap & Sous", price: 60 },
            { name: "Bunny Chow", price: 120 },
            { name: "Vetkoek", price: 55 },
            { name: "Samoosas (3)", price: 45 }
        ]
    };

    // ==================== VUE APP ====================
    new Vue({
        el: '#orderApp',
        data: {
            currentAccount: null,
            balance: 0,
            userName: "",
            currentVendor: "Rands Smart Counter",
            cart: [],
            myOrders: [],
            toastVisible: false,
            toastMessage: "",
            toastTimer: null,
            pollingInterval: null
        },
        computed: {
            cartTotal() {
                return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            },
            cartItemCount() {
                return this.cart.reduce((sum, item) => sum + item.quantity, 0);
            }
        },
        mounted() {
            // Load logged-in account
            const account = getCurrentAccount();
            if (!account) {
                showAlert("Please login first to place orders.", "Not Logged In");
                setTimeout(() => { window.location.href = "login.html"; }, 2000);
                return;
            }
            this.currentAccount = account;
            this.balance = account.balance || 0;
            this.userName = account.name.split(' ')[0];
            
            document.getElementById("customerNameDisplay").innerHTML = `<i class="fas fa-user"></i> ${this.userName}`;
            document.getElementById("customerBalanceDisplay").innerHTML = `R${this.balance.toFixed(2)}`;
            
            // Load vendor from localStorage or default
            const savedVendor = localStorage.getItem('lastOrderVendor');
            if (savedVendor && vendorMenus[savedVendor]) {
                this.currentVendor = savedVendor;
                document.getElementById("vendorSelect").value = savedVendor;
            }
            
            this.updateMenu();
            this.loadMyOrders();
            this.startPolling();
            
            if (typeof loadBottomNav === 'function') loadBottomNav();
        },
        beforeDestroy() {
            if (this.pollingInterval) clearInterval(this.pollingInterval);
        },
        methods: {
            showToast(message, duration = 2500) {
                if (this.toastTimer) clearTimeout(this.toastTimer);
                this.toastMessage = message;
                this.toastVisible = true;
                this.toastTimer = setTimeout(() => { this.toastVisible = false; }, duration);
            },
            
            switchVendor() {
                this.currentVendor = document.getElementById("vendorSelect").value;
                localStorage.setItem('lastOrderVendor', this.currentVendor);
                this.updateMenu();
            },
            
            updateMenu() {
                const menu = vendorMenus[this.currentVendor];
                const container = document.getElementById("menuGrid");
                if (!menu) return;
                
                container.innerHTML = "";
                menu.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "menu-item";
                    card.innerHTML = `
                        <div class="menu-item-name">${item.name}</div>
                        <div class="menu-item-price">R${item.price}</div>
                    `;
                    card.onclick = () => this.addToCart(item);
                    container.appendChild(card);
                });
            },
            
            addToCart(item) {
                if (!this.currentAccount) {
                    showAlert("Please login to place orders.", "Login Required");
                    return;
                }
                
                const existing = this.cart.find(i => i.name === item.name && i.vendor === this.currentVendor);
                if (existing) {
                    existing.quantity++;
                } else {
                    this.cart.push({
                        name: item.name,
                        price: item.price,
                        vendor: this.currentVendor,
                        quantity: 1
                    });
                }
                this.updateCartDisplay();
                this.showToast(`Added ${item.name} to cart`, 1500);
            },
            
            updateQuantity(index, delta) {
                if (index >= 0 && index < this.cart.length) {
                    this.cart[index].quantity += delta;
                    if (this.cart[index].quantity <= 0) {
                        this.cart.splice(index, 1);
                    }
                    this.updateCartDisplay();
                }
            },
            
            removeFromCart(index) {
                this.cart.splice(index, 1);
                this.updateCartDisplay();
            },
            
            updateCartDisplay() {
                const container = document.getElementById("cartItems");
                const summaryDiv = document.getElementById("cartSummary");
                const checkoutBtn = document.getElementById("checkoutBtn");
                const cartCountSpan = document.getElementById("cartCount");
                const cartSubtotalSpan = document.getElementById("cartSubtotal");
                const cartTotalSpan = document.getElementById("cartTotal");
                
                cartCountSpan.innerText = `${this.cartItemCount} items`;
                
                if (this.cart.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px; color:#94a3b8;">Your cart is empty</div>';
                    summaryDiv.style.display = "none";
                    checkoutBtn.disabled = true;
                    return;
                }
                
                summaryDiv.style.display = "block";
                checkoutBtn.disabled = false;
                
                let html = "";
                this.cart.forEach((item, idx) => {
                    const itemTotal = item.price * item.quantity;
                    html += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">R${item.price}</div>
                            </div>
                            <div class="cart-item-controls">
                                <button class="qty-btn" onclick="app.updateQuantity(${idx}, -1)">-</button>
                                <span class="cart-item-qty">${item.quantity}</span>
                                <button class="qty-btn" onclick="app.updateQuantity(${idx}, 1)">+</button>
                                <span class="cart-item-total">R${itemTotal}</span>
                                <button class="remove-item" onclick="app.removeFromCart(${idx})"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
                cartSubtotalSpan.innerText = `R${this.cartTotal}`;
                cartTotalSpan.innerText = `R${this.cartTotal}`;
            },
            
            checkout() {
                if (!this.currentAccount) {
                    showAlert("Please login to place orders.", "Login Required");
                    return;
                }
                
                if (this.cart.length === 0) {
                    showAlert("Your cart is empty. Add some items first.", "Empty Cart");
                    return;
                }
                
                const total = this.cartTotal;
                
                if (this.balance < total) {
                    showAlert(`Insufficient balance!\n\nNeed: R${total.toFixed(2)}\nAvailable: R${this.balance.toFixed(2)}\n\nPlease deposit funds first.`, "Insufficient Funds");
                    return;
                }
                
                // Deduct from balance
                this.balance -= total;
                this.currentAccount.balance = this.balance;
                updateAccountBalance(this.currentAccount.id, this.balance);
                document.getElementById("customerBalanceDisplay").innerHTML = `R${this.balance.toFixed(2)}`;
                
                // Create orders (group by vendor)
                const ordersByVendor = {};
                this.cart.forEach(item => {
                    if (!ordersByVendor[item.vendor]) ordersByVendor[item.vendor] = [];
                    ordersByVendor[item.vendor].push({ name: item.name, price: item.price, quantity: item.quantity });
                });
                
                const newOrders = [];
                for (const vendor in ordersByVendor) {
                    const orderId = Date.now() + Math.floor(Math.random() * 1000);
                    const orderTotal = ordersByVendor[vendor].reduce((s, i) => s + (i.price * i.quantity), 0);
                    const newOrder = {
                        orderId: orderId,
                        bandId: this.currentAccount.id,
                        bandName: this.currentAccount.name,
                        vendor: vendor,
                        items: ordersByVendor[vendor],
                        total: orderTotal,
                        timestamp: new Date().toLocaleTimeString(),
                        date: new Date().toISOString(),
                        status: "pending"
                    };
                    newOrders.push(newOrder);
                    
                    // Save to vendor-specific storage
                    const storageKey = vendor === "Rands Smart Counter" ? "rands_smart_counter_orders" :
                                      vendor === "Shisha Lounge" ? "shisha_lounge_orders" : "butcher_shop_orders";
                    let existing = JSON.parse(localStorage.getItem(storageKey) || "[]");
                    existing.push(newOrder);
                    localStorage.setItem(storageKey, JSON.stringify(existing));
                }
                
                // Add to global orders
                let globalOrders = JSON.parse(localStorage.getItem(GLOBAL_ORDERS_KEY) || "[]");
                globalOrders.push(...newOrders);
                localStorage.setItem(GLOBAL_ORDERS_KEY, JSON.stringify(globalOrders));
                
                // Clear cart
                this.cart = [];
                this.updateCartDisplay();
                
                // Refresh orders list
                this.loadMyOrders();
                
                showAlert(`✅ Order placed successfully!\n\nTotal: R${total.toFixed(2)}\n\nYour order has been sent to the kitchen. You will be notified when it's ready.`, "Order Confirmed");
                this.showToast("Order placed! Track status below.", 3000);
            },
            
            loadMyOrders() {
                if (!this.currentAccount) return;
                
                const globalOrders = JSON.parse(localStorage.getItem(GLOBAL_ORDERS_KEY) || "[]");
                this.myOrders = globalOrders
                    .filter(order => order.bandId === this.currentAccount.id && order.status !== "collected")
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
                
                const ordersCountSpan = document.getElementById("ordersCount");
                const ordersList = document.getElementById("myOrdersList");
                
                ordersCountSpan.innerText = this.myOrders.length;
                
                if (this.myOrders.length === 0) {
                    ordersList.innerHTML = '<div class="empty-orders">No active orders. Place an order above.</div>';
                    return;
                }
                
                let html = "";
                this.myOrders.forEach(order => {
                    let statusClass = "", statusText = "", readyClass = "";
                    switch (order.status) {
                        case "pending": statusClass = "status-pending"; statusText = "⏳ PENDING"; break;
                        case "preparing": statusClass = "status-preparing"; statusText = "🔧 PREPARING"; break;
                        case "ready": statusClass = "status-ready"; statusText = "✅ READY FOR COLLECTION"; readyClass = "ready"; break;
                        default: statusClass = "status-pending"; statusText = "PENDING";
                    }
                    
                    let vendorIcon = order.vendor === "Rands Smart Counter" ? "🍺" : order.vendor === "Shisha Lounge" ? "💨" : "🥩";
                    
                    html += `
                        <div class="order-card ${readyClass}">
                            <div class="order-header">
                                <span class="order-id">#${order.orderId}</span>
                                <span class="order-vendor">${vendorIcon} ${order.vendor}</span>
                                <span class="order-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="order-items">
                                ${order.items.map(item => `<div>${item.quantity}x ${item.name}</div>`).join('')}
                            </div>
                            <div class="order-total">Total: R${order.total}</div>
                            <div style="font-size:0.65rem; color:#94a3b8; margin-top:8px;">Placed at: ${order.timestamp}</div>
                        </div>
                    `;
                });
                ordersList.innerHTML = html;
                
                // Check for newly ready orders and play sound
                const justReady = this.myOrders.some(o => o.status === "ready" && !this._lastReadyState);
                if (justReady) {
                    playNotificationSound();
                    this.showToast("🔔 Your order is ready for collection!", 5000);
                }
                this._lastReadyState = this.myOrders.some(o => o.status === "ready");
            },
            
            startPolling() {
                this.pollingInterval = setInterval(() => {
                    if (this.currentAccount) {
                        this.loadMyOrders();
                    }
                }, 3000);
            }
        }
    });
    
    // Make Vue instance accessible globally for cart controls
    let app;
    document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
            if (window.__vue__ && window.__vue__.$children) {
                app = window.__vue__.$children[0];
            } else {
                const elements = document.querySelectorAll('[data-v-]');
                if (window.orderAppVm) app = window.orderAppVm;
            }
        }, 500);
    });
    
    // Expose methods for inline onclick handlers
    window.app = {
        updateQuantity: (idx, delta) => {
            if (window.orderAppVm) window.orderAppVm.updateQuantity(idx, delta);
        },
        removeFromCart: (idx) => {
            if (window.orderAppVm) window.orderAppVm.removeFromCart(idx);
        }
    };
    
    // Capture Vue instance
    setTimeout(() => {
        const vueRoot = document.querySelector('#orderApp').__vue__;
        if (vueRoot) {
            window.orderAppVm = vueRoot;
        }
    }, 100);
</script>
</body>
</html>
