<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rands Wallet | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@400;500;600;700;800&family=Kaushan+Script&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #f4f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 12px; }
        .app-container { max-width: 500px; width: 100%; margin: 0 auto; background: #ffffff; border-radius: 40px; box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08); overflow: hidden; position: relative; }
        .app-header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #eff3f8; }
        .logo { height: 45px; width: auto; max-width: 180px; object-fit: contain; border-radius: 12px; }
        .login-container { padding: 40px 20px; text-align: center; }
        .circular-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E30613, #b0020e);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(227,6,19,0.4);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .circular-logo:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(227,6,19,0.5);
        }
        .circular-logo img {
            width: 70%;
            height: auto;
            object-fit: contain;
        }
        .input-field {
            background: #f8fafd;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 60px;
            width: 100%;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .whatsapp-login-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .whatsapp-login-btn:active { transform: scale(0.98); }
        .toast-msg { position: fixed; bottom: 100px; left: 20px; right: 20px; background: #1e2a3a; color: white; padding: 10px 16px; border-radius: 60px; text-align: center; z-index: 3500; display: none; font-size: 0.8rem; }
        .toast-msg.show { display: block; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="logo"></div>
    </div>
    <div class="login-container">
        <div class="circular-logo">
            <img src="images/rands-logo2.png" alt="Rands Wallet" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23E30613\'/%3E%3Ctext x=\'50\' y=\'67\' font-size=\'45\' text-anchor=\'middle\' fill=\'white\' font-family=\'Arial\'%3ER%3C/text%3E%3C/svg%3E'">
        </div>
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="margin-top: 20px;">Rands Wallet</h2>
            <p style="color: #64748b;">Your phone number is your account ID</p>
        </div>
        <div id="loginForm">
            <input type="tel" id="loginWhatsapp" class="input-field" placeholder="Phone Number (e.g., 0635713652)" style="margin-bottom: 15px;">
            <input type="password" id="loginPin" class="input-field" placeholder="4-digit PIN" maxlength="4" style="margin-bottom: 15px;">
            <button class="whatsapp-login-btn" id="loginBtn"><i class="fab fa-whatsapp"></i> Login</button>
            <p style="text-align: center; margin: 15px 0; color: #64748b;">or</p>
            <button class="whatsapp-login-btn" id="showSignupBtn" style="background: #E30613;"><i class="fas fa-user-plus"></i> Create New Account</button>
        </div>
    </div>
</div>
<div id="globalToast" class="toast-msg"></div>

<script>
    // Storage keys
    const ACCOUNTS_KEY = 'rands_accounts_v2';
    let accounts = [];
    let currentAccountId = null;

    // Helper functions
    function showToastMsg(msg) { 
        let t = document.getElementById('globalToast'); 
        t.innerText = msg; 
        t.classList.add('show'); 
        setTimeout(() => t.classList.remove('show'), 2000); 
    }
    
    function saveAccounts() { 
        localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts)); 
    }
    
    function loadAccounts() { 
        const stored = localStorage.getItem(ACCOUNTS_KEY); 
        if (stored) {
            accounts = JSON.parse(stored);
        } else { 
            // Default account: Mziwonke KaBuyaphi with PIN 1989
            accounts = [{ 
                id: "0635713652", 
                name: "Mziwonke KaBuyaphi", 
                phone: "0635713652", 
                balance: 5000, 
                cardNumber: "4532 1234 5678 9012", 
                cvv: "123", 
                expiry: "12/28", 
                pin: "1989", 
                status: "Active", 
                cardTheme: "card-theme-1", 
                selfie: null, 
                verified: true 
            }]; 
            saveAccounts(); 
        } 
    }

    // Account functions
    function login(phoneNumber, pin) {
        let cleanNumber = phoneNumber.trim();
        const account = accounts.find(a => a.id === cleanNumber);
        if (!account) { 
            showToastMsg("Account not found. Please create an account first."); 
            return false; 
        }
        if (account.pin !== pin) { 
            showToastMsg("Incorrect PIN"); 
            return false; 
        }
        if (account.status === "Blocked") { 
            showToastMsg("Account blocked. Contact support."); 
            return false; 
        }
        currentAccountId = account.id;
        localStorage.setItem('rands_current_account', currentAccountId);
        showToastMsg(`Welcome back, ${account.name.split(' ')[0]}!`);
        return true;
    }
    
    function redirectToWallet() {
        window.location.href = 'wallet.html';
    }
    
    function redirectToRegister() {
        window.location.href = 'register.html';
    }

    // Initialize
    function init() {
        loadAccounts();
        
        // Check if already logged in
        let saved = localStorage.getItem('rands_current_account');
        if (saved && accounts.find(a => a.id === saved)) {
            currentAccountId = saved;
            redirectToWallet();
            return;
        }
        
        // Login button
        document.getElementById("loginBtn")?.addEventListener("click", () => {
            if(login(document.getElementById("loginWhatsapp").value, document.getElementById("loginPin").value)) {
                redirectToWallet();
            }
        });
        
        // Create New Account button - redirect to register.html
        document.getElementById("showSignupBtn")?.addEventListener("click", () => { 
            redirectToRegister();
        });
        
        // Enter key support for login
        const loginPinInput = document.getElementById("loginPin");
        if (loginPinInput) {
            loginPinInput.addEventListener("keypress", function(e) {
                if (e.key === "Enter") {
                    document.getElementById("loginBtn").click();
                }
            });
        }
        
        const loginPhoneInput = document.getElementById("loginWhatsapp");
        if (loginPhoneInput) {
            loginPhoneInput.addEventListener("keypress", function(e) {
                if (e.key === "Enter") {
                    document.getElementById("loginBtn").click();
                }
            });
        }
    }
    
    init();
</script>
</body>
</html>
