<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>The Butcher Shop - Track Your Order</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f111a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  .tracking-container {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 30px;
    border-bottom: 1px solid rgba(220, 38, 38, 0.3);
    margin-bottom: 24px;
  }
  .logo {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 1.8rem;
    color: #dc2626;
    letter-spacing: -0.5px;
  }
  .header p {
    color: #94a3b8;
    font-size: 0.9rem;
    margin-top: 6px;
  }

  /* Progressive Circle Container */
  .progressive-circle-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 30px;
    position: relative;
  }
  
  .progressive-circle {
    position: relative;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1f2e;
    transition: all 0.5s ease;
  }
  
  .progressive-circle svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  
  .progressive-circle circle {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
  }
  
  .circle-bg {
    stroke: #2d3748;
  }
  
  .circle-progress {
    stroke: #dc2626;
    stroke-dasharray: 565.48;
    stroke-dashoffset: 565.48;
  }
  
  .circle-number {
    font-size: 42px;
    font-weight: 800;
    color: white;
    text-align: center;
    z-index: 10;
    background: #1a1f2e;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: all 0.3s ease;
  }
  
  .circle-number small {
    font-size: 12px;
    font-weight: 400;
    color: #94a3b8;
    margin-top: 4px;
  }
  
  .stage-label {
    position: absolute;
    bottom: -30px;
    font-size: 12px;
    font-weight: 600;
    color: #94a3b8;
    text-align: center;
    white-space: nowrap;
  }

  /* Status Card */
  .status-card {
    background: #1a1f2e;
    border-radius: 32px;
    padding: 28px;
    margin-bottom: 20px;
    border: 1px solid rgba(220, 38, 38, 0.2);
  }

  /* Ticket Display */
  .ticket-display {
    text-align: center;
    margin-bottom: 24px;
  }
  .ticket-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #94a3b8;
    margin-bottom: 8px;
  }
  .ticket-number {
    font-size: 3.5rem;
    font-weight: 800;
    color: #dc2626;
    letter-spacing: 2px;
    word-break: break-word;
  }
  .status-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 12px;
  }
  .status-new { background: #f97316; color: white; }
  .status-preparing { background: #3b82f6; color: white; }
  .status-ready { background: #10b981; color: white; animation: pulse 1s infinite; }
  .status-completed { background: #475569; color: white; }
  .status-called { background: #8b5cf6; color: white; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.02); background: #059669; }
  }

  /* Progress Bar */
  .progress-container {
    margin: 24px 0;
  }
  .progress-steps {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .step {
    text-align: center;
    flex: 1;
    font-size: 0.7rem;
    color: #64748b;
    position: relative;
  }
  .step.active {
    color: #dc2626;
    font-weight: 600;
  }
  .step.completed {
    color: #10b981;
  }
  .step-icon {
    display: block;
    font-size: 1.2rem;
    margin-bottom: 4px;
  }
  .progress-bar {
    background: #2d3748;
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    background: #dc2626;
    height: 100%;
    width: 0%;
    transition: width 0.5s ease;
    border-radius: 20px;
  }

  /* Info Rows */
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .info-label {
    color: #94a3b8;
    font-size: 0.9rem;
  }
  .info-value {
    font-weight: 600;
    color: #facc15;
  }
  .info-value.urgent {
    color: #10b981;
    animation: pulse 1.5s infinite;
  }

  /* ORDER ITEMS SECTION */
  .order-items {
    background: #11161f;
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(220, 38, 38, 0.15);
  }
  .order-items h3 {
    font-size: 1rem;
    margin-bottom: 16px;
    color: #facc15;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .order-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .order-item:last-child {
    border-bottom: none;
  }
  .item-info {
    flex: 2;
  }
  .item-name {
    font-weight: 600;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .item-quantity {
    background: #1e293b;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    color: #facc15;
    font-size: 0.8rem;
  }
  .item-price {
    font-weight: 700;
    color: #dc2626;
    min-width: 70px;
    text-align: right;
  }
  .item-notes {
    background: rgba(249,115,22,0.12);
    border-radius: 12px;
    padding: 6px 10px;
    margin-top: 8px;
    font-size: 0.7rem;
    color: #fcd34d;
  }
  .order-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    margin-top: 8px;
    font-weight: 800;
    font-size: 1.1rem;
    border-top: 2px solid rgba(220, 38, 38, 0.3);
  }
  .order-total span:first-child {
    color: #94a3b8;
  }
  .order-total span:last-child {
    color: #facc15;
    font-size: 1.2rem;
  }

  /* Queue Position Card */
  .queue-position-card {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 20px;
    text-align: center;
    border: 1px solid #facc15;
  }
  .queue-position-number {
    font-size: 48px;
    font-weight: 800;
    color: #facc15;
  }
  .ahead-count {
    font-size: 12px;
    color: #94a3b8;
  }

  /* Ready Banner */
  .ready-banner {
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 28px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    animation: slideIn 0.5s ease;
  }
  .ready-banner .icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .ready-banner h2 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .ready-banner p {
    opacity: 0.9;
  }

  @keyframes slideIn {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Action Buttons */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 60px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: 0.2s;
  }
  .btn-whatsapp {
    background: #25D366;
    color: white;
  }
  .btn-sms {
    background: #dc2626;
    color: white;
  }
  .btn-secondary {
    background: #334155;
    color: white;
  }
  .btn:active {
    transform: scale(0.97);
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 20px;
    right: 20px;
    max-width: 460px;
    margin: 0 auto;
    background: #1e293b;
    color: white;
    padding: 14px 20px;
    border-radius: 60px;
    text-align: center;
    font-weight: 600;
    z-index: 1000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .footer {
    text-align: center;
    padding: 20px;
    font-size: 0.7rem;
    color: #475569;
    margin-top: 20px;
  }

  .error-card {
    text-align: center;
    padding: 60px 20px;
    background: #1a1f2e;
    border-radius: 32px;
    border: 1px solid #dc2626;
  }
  .error-card i {
    font-size: 3rem;
    color: #dc2626;
    margin-bottom: 16px;
  }

  @media (max-width: 500px) {
    body { padding: 12px; }
    .ticket-number { font-size: 2.5rem; }
    .status-card { padding: 20px; }
    .queue-position-number { font-size: 36px; }
    .progressive-circle { width: 140px; height: 140px; }
    .circle-number { width: 110px; height: 110px; font-size: 32px; }
  }
</style>
</head>
<body>

<div class="tracking-container" id="trackingApp">
  <div class="header">
    <div class="logo">🥩</div>
    <h1>The Butcher Shop</h1>
    <p>Real-time updates for your order</p>
  </div>

  <div id="mainContent"></div>

  <div class="footer">
    The Butcher Shop • Premium Quality Meats • Fire & Grill
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ==================== STORAGE KEYS (Matching Kiosk System) ====================
  const QUEUE_KEY = "butcher_shop_queue";
  const ORDERS_KEY = "butcher_shop_orders";

  // Get URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('order');

  // Helper functions
  function getQueue() { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); }
  function getOrders() { return JSON.parse(localStorage.getItem(ORDERS_KEY) || '[]'); }

  // Get current status from kiosk data structure
  function getCurrentStatus() {
    if (!orderId) return { error: "No order number provided" };
    
    const queue = getQueue();
    const orders = getOrders();
    
    // Find ticket in queue
    const ticketIndex = queue.findIndex(t => t.ticketNumber === orderId);
    const ticket = ticketIndex !== -1 ? queue[ticketIndex] : null;
    
    // Find order details
    const order = orders.find(o => o.ticketNumber === orderId);
    
    // Calculate queue position (only for non-called, non-ready orders)
    let position = null;
    let aheadCount = 0;
    if (ticketIndex !== -1 && ticket && !ticket.called) {
      // Count how many tickets before this one that haven't been called yet
      aheadCount = queue.filter((t, idx) => idx < ticketIndex && !t.called).length;
      position = aheadCount + 1;
    }
    
    // Determine status from kitchenStatus or queue called flag
    let status = "unknown";
    let statusText = "";
    let statusClass = "";
    let progressPercent = 0;
    let estimatedWait = "";
    
    if (order && order.kitchenStatus === 'ready') {
      status = "ready";
      statusText = "READY FOR COLLECTION! 🎉";
      statusClass = "status-ready";
      progressPercent = 100;
      estimatedWait = "Ready Now!";
    } 
    else if (order && order.kitchenStatus === 'preparing') {
      status = "preparing";
      statusText = "Being Prepared 🔥";
      statusClass = "status-preparing";
      progressPercent = 60;
      estimatedWait = "~5-10 minutes";
    }
    else if (order && order.kitchenStatus === 'new') {
      status = "new";
      statusText = "Order Received 📝";
      statusClass = "status-new";
      progressPercent = 20;
      estimatedWait = position ? `~${position * 4} minutes` : "~10-15 minutes";
    }
    else if (ticket && ticket.called === true) {
      status = "called";
      statusText = "YOU'RE NEXT! 🔔";
      statusClass = "status-called";
      progressPercent = 40;
      estimatedWait = "Now serving!";
    }
    else if (ticket && ticketIndex !== -1) {
      status = "waiting";
      statusText = "In Queue ⏳";
      statusClass = "status-new";
      progressPercent = Math.min(35, Math.floor(((queue.length - position) / queue.length) * 35));
      estimatedWait = `~${position * 4} minutes`;
    }
    else if (order && order.kitchenStatus === 'completed') {
      status = "completed";
      statusText = "Collected ✓";
      statusClass = "status-completed";
      progressPercent = 100;
      estimatedWait = "Enjoy your meal!";
    }
    else {
      status = "not_found";
      statusText = "Order Not Found";
      statusClass = "status-new";
    }
    
    return {
      ticket,
      order,
      position,
      aheadCount,
      queueLength: queue.length,
      status,
      statusText,
      statusClass,
      estimatedWait,
      progressPercent,
      error: null
    };
  }

  // Get circle color based on progress percentage
  function getCircleColor(progressPercent) {
    if (progressPercent < 30) return "#dc2626";  // Red - far
    if (progressPercent < 70) return "#f97316";  // Orange - getting closer
    return "#10b981";  // Green - ready
  }

  // Get stage number that decreases (1 = far from ready, 4 = ready)
  function getDecreasingStageNumber(progressPercent, status) {
    if (status === "ready" || status === "completed") return 1;
    if (status === "preparing") return 2;
    if (status === "called") return 3;
    if (status === "waiting") return 4;
    if (status === "new") return 5;
    return 5;
  }

  // Get stage label
  function getStageLabel(stageNumber) {
    const stages = {
      1: "Ready!",
      2: "Preparing",
      3: "You're Next",
      4: "In Queue",
      5: "Order Placed"
    };
    return stages[stageNumber] || "Order Placed";
  }

  // Render progressive circle
  function renderProgressiveCircle(progressPercent, status) {
    const circumference = 565.48; // 2 * PI * 90 (radius 90)
    const offset = circumference - (progressPercent / 100) * circumference;
    const circleColor = getCircleColor(progressPercent);
    const stageNumber = getDecreasingStageNumber(progressPercent, status);
    const stageLabel = getStageLabel(stageNumber);
    
    return `
      <div class="progressive-circle-container">
        <div class="progressive-circle">
          <svg viewBox="0 0 200 200">
            <circle class="circle-bg" cx="100" cy="100" r="90"></circle>
            <circle class="circle-progress" cx="100" cy="100" r="90" 
                    style="stroke: ${circleColor}; stroke-dashoffset: ${offset};"></circle>
          </svg>
          <div class="circle-number">
            ${stageNumber}
            <small>${stageLabel}</small>
          </div>
        </div>
      </div>
    `;
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function shareWhatsApp() {
    const statusData = getCurrentStatus();
    const isReady = statusData.status === "ready";
    const message = isReady 
      ? `🥩🎉 My order ${orderId} at The Butcher Shop is READY for collection!\nTrack here: ${window.location.href}`
      : `🥩 My order ${orderId} at The Butcher Shop is ${statusData.statusText}\nTrack here: ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    showToast('📱 Opening WhatsApp...');
  }

  function shareSMS() {
    const statusData = getCurrentStatus();
    const isReady = statusData.status === "ready";
    const message = isReady 
      ? `My order ${orderId} at The Butcher Shop is READY! Track: ${window.location.href}`
      : `My order ${orderId} at The Butcher Shop. Track: ${window.location.href}`;
    window.open(`sms:?body=${encodeURIComponent(message)}`, '_blank');
    showToast('💬 Opening SMS...');
  }

  function requestDelay() {
    showToast('⏱️ Delay request sent to staff. They will assist you shortly.');
    const delayRequests = JSON.parse(localStorage.getItem('butcher_delay_requests') || '[]');
    delayRequests.push({
      orderId: orderId,
      timestamp: new Date().toISOString()
    });
    localStorage.setItem('butcher_delay_requests', JSON.stringify(delayRequests));
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function getItemEmoji(name) {
    const nameLower = name.toLowerCase();
    if (nameLower.includes('ribeye') || nameLower.includes('t-bone') || nameLower.includes('steak')) return '🥩';
    if (nameLower.includes('sausage') || nameLower.includes('boerewors')) return '🌭';
    if (nameLower.includes('lamb')) return '🍖';
    if (nameLower.includes('chips') || nameLower.includes('fries')) return '🍟';
    if (nameLower.includes('salad')) return '🥗';
    if (nameLower.includes('pap')) return '🍚';
    if (nameLower.includes('coke') || nameLower.includes('cola')) return '🥤';
    if (nameLower.includes('water')) return '💧';
    if (nameLower.includes('beer')) return '🍺';
    if (nameLower.includes('bbq') || nameLower.includes('barbecue')) return '🔥';
    if (nameLower.includes('burger')) return '🍔';
    if (nameLower.includes('chicken')) return '🍗';
    return '🍽️';
  }

  function renderOrderItems(order) {
    if (!order || !order.items || order.items.length === 0) {
      return '<div style="text-align:center; padding:20px; color:#64748b;">No items found</div>';
    }
    
    let itemsHtml = '';
    let orderTotal = order.total || 0;
    
    order.items.forEach((item) => {
      const itemTotal = item.price * item.quantity;
      const emoji = getItemEmoji(item.name);
      
      itemsHtml += `
        <div class="order-item">
          <div class="item-info">
            <div class="item-name">
              <span>${emoji}</span>
              <span>${escapeHtml(item.name)}</span>
              <span class="item-quantity">x${item.quantity}</span>
            </div>
            ${item.notes ? `<div class="item-notes">📝 ${escapeHtml(item.notes)}</div>` : ''}
          </div>
          <div class="item-price">
            R${itemTotal.toFixed(2)}
          </div>
        </div>
      `;
    });
    
    return `
      ${itemsHtml}
      <div class="order-total">
        <span>Total</span>
        <span>R${orderTotal.toFixed(2)}</span>
      </div>
    `;
  }

  function render() {
    const container = document.getElementById('mainContent');
    const statusData = getCurrentStatus();
    
    if (!orderId) {
      container.innerHTML = `
        <div class="error-card">
          <i class="fas fa-ticket-alt"></i>
          <h3>No Order Number</h3>
          <p style="margin-top: 12px;">Please provide a valid order number in the URL.</p>
          <p style="margin-top: 8px; font-size: 0.8rem;">Example: ?order=B-001</p>
        </div>
      `;
      return;
    }
    
    if (statusData.status === "not_found") {
      container.innerHTML = `
        <div class="error-card">
          <i class="fas fa-search"></i>
          <h3>Order Not Found</h3>
          <p style="margin-top: 12px;">We couldn't find order #${escapeHtml(orderId)}.</p>
          <p style="margin-top: 8px; font-size: 0.8rem;">Please check your ticket number and try again.</p>
        </div>
      `;
      return;
    }
    
    const { order, position, aheadCount, queueLength, statusText, statusClass, estimatedWait, progressPercent, status } = statusData;
    
    // Progressive Circle
    const progressiveCircleHtml = renderProgressiveCircle(progressPercent, status);
    
    // Ready banner
    const readyBanner = statusData.status === "ready" ? `
      <div class="ready-banner">
        <div class="icon">🎉🥩</div>
        <h2>READY FOR COLLECTION!</h2>
        <p>Your order is ready at the counter</p>
        <p style="margin-top: 12px; font-size: 0.9rem;">Please have your ticket number ready</p>
      </div>
    ` : '';
    
    // Queue position card (only show if waiting)
    const queueCard = (statusData.status === "waiting" || statusData.status === "new") && position ? `
      <div class="queue-position-card">
        <div class="queue-position-number">#${position}</div>
        <div>Your position in queue</div>
        <div class="ahead-count">${aheadCount} ${aheadCount === 1 ? 'order' : 'orders'} ahead of you</div>
      </div>
    ` : '';
    
    // Build order items HTML
    const orderItemsHtml = order ? renderOrderItems(order) : '<div style="text-align:center; padding:20px;">Loading order details...</div>';
    
    // Steps based on actual status
    let stepCompleted = 0;
    if (statusData.status === "new") stepCompleted = 0;
    else if (statusData.status === "waiting") stepCompleted = 0;
    else if (statusData.status === "called") stepCompleted = 1;
    else if (statusData.status === "preparing") stepCompleted = 2;
    else if (statusData.status === "ready") stepCompleted = 3;
    else if (statusData.status === "completed") stepCompleted = 4;
    
    const steps = [
      { name: "Order Placed", icon: "📝", completed: stepCompleted >= 0 },
      { name: "Queue", icon: "⏳", completed: stepCompleted >= 1 },
      { name: "Preparing", icon: "👨‍🍳", completed: stepCompleted >= 2 },
      { name: "Ready", icon: "✅", completed: stepCompleted >= 3 },
      { name: "Collected", icon: "🎉", completed: stepCompleted >= 4 }
    ];
    
    container.innerHTML = `
      ${progressiveCircleHtml}
      ${readyBanner}
      ${queueCard}
      
      <div class="status-card">
        <div class="ticket-display">
          <div class="ticket-label">YOUR ORDER NUMBER</div>
          <div class="ticket-number">${escapeHtml(orderId)}</div>
          <span class="status-badge ${statusClass}">${statusText}</span>
        </div>
        
        <div class="progress-container">
          <div class="progress-steps">
            ${steps.map(step => `
              <div class="step ${step.completed ? 'completed' : ''}">
                <span class="step-icon">${step.icon}</span>
                <span>${step.name}</span>
              </div>
            `).join('')}
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progressPercent}%;"></div>
          </div>
        </div>
        
        <div class="info-row">
          <span class="info-label">⏱️ Estimated Wait</span>
          <span class="info-value ${statusData.status === 'ready' || statusData.status === 'called' ? 'urgent' : ''}">${estimatedWait}</span>
        </div>
        
        <div class="info-row">
          <span class="info-label">📅 Order Placed</span>
          <span class="info-value">${order?.createdAt ? new Date(order.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '—'}</span>
        </div>
        
        <div class="info-row">
          <span class="info-label">🔄 Last Updated</span>
          <span class="info-value" id="lastUpdate">Just now</span>
        </div>
      </div>
      
      <div class="order-items">
        <h3>
          <i class="fas fa-receipt"></i>
          Your Order Summary
        </h3>
        ${orderItemsHtml}
      </div>
      
      <div class="action-buttons">
        <button class="btn btn-whatsapp" id="shareWhatsAppBtn">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </button>
        <button class="btn btn-sms" id="shareSMSBtn">
          <i class="fas fa-sms"></i> SMS
        </button>
        <button class="btn btn-secondary" id="delayBtn">
          <i class="fas fa-clock"></i> Need Help?
        </button>
      </div>
    `;
    
    // Update last update time
    const updateTime = document.getElementById('lastUpdate');
    if (updateTime) {
      updateTime.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    
    // Attach event listeners
    document.getElementById('shareWhatsAppBtn')?.addEventListener('click', shareWhatsApp);
    document.getElementById('shareSMSBtn')?.addEventListener('click', shareSMS);
    document.getElementById('delayBtn')?.addEventListener('click', requestDelay);
  }
  
  // Check for updates and notify on status change
  let lastStatus = null;
  let lastQueuePosition = null;
  
  function checkForUpdates() {
    const statusData = getCurrentStatus();
    const newStatus = statusData.status;
    const newPosition = statusData.position;
    
    if (lastStatus !== newStatus) {
      // Status changed!
      if (newStatus === "ready" && lastStatus !== "ready") {
        showToast('🎉 Your order is ready for collection! Head to the counter.');
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        // Play sound
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
      } else if (newStatus === "called" && lastStatus !== "called") {
        showToast('🔔 You\'re next! Please get ready at the counter.');
        if (navigator.vibrate) navigator.vibrate(100);
      } else if (newStatus === "preparing" && lastStatus === "new") {
        showToast('🔥 Your order is now being prepared!');
      }
      lastStatus = newStatus;
    }
    
    if (lastQueuePosition !== newPosition && newPosition && newPosition > 0) {
      // Position changed
      if (newPosition < lastQueuePosition) {
        showToast(`📊 You moved up! ${newPosition} ${newPosition === 1 ? 'person' : 'people'} ahead of you now.`);
      }
      lastQueuePosition = newPosition;
    }
    
    render();
  }
  
  // Listen for storage events (updates from kiosk/kitchen)
  window.addEventListener('storage', (event) => {
    if (event.key === QUEUE_KEY || event.key === ORDERS_KEY) {
      checkForUpdates();
    }
  });
  
  // Initial render
  const initialData = getCurrentStatus();
  if (initialData.status !== "not_found") {
    lastStatus = initialData.status;
    lastQueuePosition = initialData.position;
  }
  render();
  
  // Auto-refresh every 2 seconds
  setInterval(checkForUpdates, 2000);
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
