<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Butcher Shop - Track Your Order</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f111a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }

  .tracking-container {
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 30px;
    border-bottom: 1px solid rgba(220, 38, 38, 0.3);
    margin-bottom: 24px;
  }
  .logo {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 1.8rem;
    color: #dc2626;
    letter-spacing: -0.5px;
  }
  .header p {
    color: #94a3b8;
    font-size: 0.9rem;
    margin-top: 6px;
  }

  /* Status Card */
  .status-card {
    background: #1a1f2e;
    border-radius: 32px;
    padding: 28px;
    margin-bottom: 20px;
    border: 1px solid rgba(220, 38, 38, 0.2);
  }

  /* VVIP Badge */
  .vvip-badge {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #1a1a1a;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
    display: inline-block;
    margin-left: 10px;
    animation: pulse 1s infinite;
  }

  /* Ticket Display */
  .ticket-display {
    text-align: center;
    margin-bottom: 24px;
  }
  .ticket-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #94a3b8;
    margin-bottom: 8px;
  }
  .ticket-number {
    font-size: 3.5rem;
    font-weight: 800;
    color: #dc2626;
    letter-spacing: 2px;
    word-break: break-word;
  }
  .status-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-top: 12px;
  }
  .status-pending { background: #f97316; color: white; }
  .status-preparing { background: #3b82f6; color: white; }
  .status-ready { background: #10b981; color: white; animation: pulse 1s infinite; }
  .status-collected { background: #475569; color: white; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.02); background: #059669; }
  }

  /* Progress Bar */
  .progress-container {
    margin: 24px 0;
  }
  .progress-steps {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .step {
    text-align: center;
    flex: 1;
    font-size: 0.7rem;
    color: #64748b;
    position: relative;
  }
  .step.active {
    color: #dc2626;
    font-weight: 600;
  }
  .step.completed {
    color: #10b981;
  }
  .step-icon {
    display: block;
    font-size: 1.2rem;
    margin-bottom: 4px;
  }
  .progress-bar {
    background: #2d3748;
    border-radius: 20px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    background: #dc2626;
    height: 100%;
    width: 0%;
    transition: width 0.5s ease;
    border-radius: 20px;
  }

  /* Info Rows */
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .info-label {
    color: #94a3b8;
    font-size: 0.9rem;
  }
  .info-value {
    font-weight: 600;
    color: #facc15;
  }
  .info-value.urgent {
    color: #10b981;
    animation: pulse 1.5s infinite;
  }

  /* ORDER ITEMS SECTION */
  .order-items {
    background: #11161f;
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(220, 38, 38, 0.15);
  }
  .order-items h3 {
    font-size: 1rem;
    margin-bottom: 16px;
    color: #facc15;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .order-items h3 i {
    font-size: 1rem;
  }
  .order-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .order-item:last-child {
    border-bottom: none;
  }
  .item-info {
    flex: 2;
  }
  .item-name {
    font-weight: 600;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .item-quantity {
    background: #1e293b;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    color: #facc15;
    font-size: 0.8rem;
  }
  .item-price {
    font-weight: 700;
    color: #dc2626;
    min-width: 70px;
    text-align: right;
  }
  .order-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    margin-top: 8px;
    font-weight: 800;
    font-size: 1.1rem;
    border-top: 2px solid rgba(220, 38, 38, 0.3);
  }
  .order-total span:first-child {
    color: #94a3b8;
  }
  .order-total span:last-child {
    color: #facc15;
    font-size: 1.2rem;
  }

  /* Ready Banner */
  .ready-banner {
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 28px;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    animation: slideIn 0.5s ease;
  }
  .ready-banner .icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .ready-banner h2 {
    font-size: 1.5rem;
    margin-bottom: 8px;
  }
  .ready-banner p {
    opacity: 0.9;
  }

  @keyframes slideIn {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Action Buttons */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 60px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: 0.2s;
  }
  .btn-whatsapp {
    background: #25D366;
    color: white;
  }
  .btn-sms {
    background: #dc2626;
    color: white;
  }
  .btn-secondary {
    background: #334155;
    color: white;
  }
  .btn:active {
    transform: scale(0.97);
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 20px;
    right: 20px;
    max-width: 460px;
    margin: 0 auto;
    background: #1e293b;
    color: white;
    padding: 14px 20px;
    border-radius: 60px;
    text-align: center;
    font-weight: 600;
    z-index: 1000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 0.7rem;
    color: #475569;
    margin-top: 20px;
  }

  /* Loading & Error States */
  .loading, .error-card {
    text-align: center;
    padding: 60px 20px;
    color: #94a3b8;
  }
  .error-card {
    background: #1a1f2e;
    border-radius: 32px;
    border: 1px solid #dc2626;
  }
  .error-card i {
    font-size: 3rem;
    color: #dc2626;
    margin-bottom: 16px;
  }

  /* Empty Cart State */
  .empty-cart {
    text-align: center;
    padding: 30px;
    color: #64748b;
  }
  .empty-cart i {
    font-size: 2rem;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  @media (max-width: 500px) {
    body { padding: 12px; }
    .ticket-number { font-size: 2.5rem; }
    .status-card { padding: 20px; }
    .item-name { font-size: 0.85rem; }
    .order-total span:last-child { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="tracking-container" id="trackingApp">
  <!-- Header -->
  <div class="header">
    <div class="logo">🥩</div>
    <h1>The Butcher Shop</h1>
    <p>Real-time updates for your order</p>
  </div>

  <!-- Dynamic Content -->
  <div id="mainContent"></div>

  <!-- Footer -->
  <div class="footer">
    The Butcher Shop • Premium Quality Meats • Fire & Grill
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ==================== STORAGE KEYS (Matching Kitchen Screen) ====================
  const VENDOR_NAME = "The Butcher Shop";
  const GLOBAL_ORDERS_KEY = "globalOrders";

  // Get URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('order');

  // Helper functions
  function getAllOrders() { 
    return JSON.parse(localStorage.getItem(GLOBAL_ORDERS_KEY) || '[]'); 
  }

  // Get current status with order items
  function getCurrentStatus() {
    if (!orderId) return { error: "No order number provided" };
    
    const allOrders = getAllOrders();
    
    // Find order that matches the orderId and vendor
    const order = allOrders.find(o => o.orderId == orderId && o.vendor === VENDOR_NAME);
    
    if (!order) {
      return {
        error: "Order not found",
        status: "not_found",
        statusText: "Order Not Found",
        statusClass: "status-pending"
      };
    }
    
    // Map status from kitchen system to customer-friendly status
    let status = order.status;
    let statusText = "";
    let statusClass = "";
    let progressPercent = 0;
    let estimatedWait = "";
    
    switch(order.status) {
      case "pending":
        statusText = "Order Received";
        statusClass = "status-pending";
        progressPercent = 10;
        estimatedWait = "~10-15 min";
        break;
      case "preparing":
        statusText = "Being Prepared 🔥";
        statusClass = "status-preparing";
        progressPercent = 50;
        estimatedWait = "~5-10 min";
        break;
      case "ready":
        statusText = "READY FOR COLLECTION! 🎉";
        statusClass = "status-ready";
        progressPercent = 100;
        estimatedWait = "Ready Now!";
        break;
      case "collected":
        statusText = "Collected ✓";
        statusClass = "status-collected";
        progressPercent = 100;
        estimatedWait = "Enjoy your meal!";
        break;
      default:
        statusText = order.status;
        statusClass = "status-pending";
        progressPercent = 0;
        estimatedWait = "~10-15 min";
    }
    
    // Calculate queue position for pending orders
    let position = null;
    if (order.status === "pending") {
      const pendingOrders = allOrders.filter(o => o.vendor === VENDOR_NAME && o.status === "pending");
      const idx = pendingOrders.findIndex(o => o.orderId == orderId);
      position = idx !== -1 ? idx + 1 : null;
      if (position) {
        estimatedWait = `~${position * 5} min`;
      }
    }
    
    return {
      order,
      position,
      status: order.status,
      statusText,
      statusClass,
      estimatedWait,
      progressPercent,
      isVVIP: order.isVVIP || false,
      error: null
    };
  }

  // Show toast message
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Share via WhatsApp
  function shareWhatsApp() {
    const status = getCurrentStatus();
    const isReady = status.status === "ready";
    const message = isReady 
      ? `🥩🎉 My order ${orderId} at The Butcher Shop is READY for collection!\nTrack here: ${window.location.href}`
      : `🥩 My order ${orderId} at The Butcher Shop is ${status.statusText}\nTrack here: ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
    showToast('📱 Opening WhatsApp...');
  }

  // Share via SMS
  function shareSMS() {
    const status = getCurrentStatus();
    const isReady = status.status === "ready";
    const message = isReady 
      ? `My order ${orderId} at The Butcher Shop is READY! Track: ${window.location.href}`
      : `My order ${orderId} at The Butcher Shop. Track: ${window.location.href}`;
    window.open(`sms:?body=${encodeURIComponent(message)}`, '_blank');
    showToast('💬 Opening SMS...');
  }

  // Request delay
  function requestDelay() {
    showToast('⏱️ Delay request sent to kitchen staff. They will assist you shortly.');
    // Store delay request in localStorage for kitchen to see
    const delayRequests = JSON.parse(localStorage.getItem('delayRequests') || '[]');
    delayRequests.push({
      orderId: orderId,
      timestamp: new Date().toISOString(),
      vendor: VENDOR_NAME
    });
    localStorage.setItem('delayRequests', JSON.stringify(delayRequests));
  }

  // Escape HTML helper
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Get emoji for item
  function getItemEmoji(name) {
    const nameLower = name.toLowerCase();
    if (nameLower.includes('ribeye') || nameLower.includes('t-bone') || nameLower.includes('steak')) return '🥩';
    if (nameLower.includes('sausage') || nameLower.includes('boerewors')) return '🌭';
    if (nameLower.includes('lamb')) return '🍖';
    if (nameLower.includes('chips') || nameLower.includes('fries')) return '🍟';
    if (nameLower.includes('salad')) return '🥗';
    if (nameLower.includes('pap')) return '🍚';
    if (nameLower.includes('coke') || nameLower.includes('cola')) return '🥤';
    if (nameLower.includes('water')) return '💧';
    if (nameLower.includes('beer') || nameLower.includes('lager')) return '🍺';
    if (nameLower.includes('bbq') || nameLower.includes('barbecue')) return '🔥';
    if (nameLower.includes('burger')) return '🍔';
    if (nameLower.includes('chicken')) return '🍗';
    return '🍽️';
  }

  // Format timestamp
  function formatTime(timestamp) {
    if (!timestamp) return '—';
    try {
      const date = new Date(timestamp);
      return date.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    } catch(e) {
      return timestamp;
    }
  }

  // Render order items
  function renderOrderItems(order) {
    if (!order || !order.items || order.items.length === 0) {
      return `
        <div class="empty-cart">
          <i class="fas fa-shopping-basket"></i>
          <p>No items in this order</p>
        </div>
      `;
    }
    
    let itemsHtml = '';
    let orderTotal = order.total || 0;
    
    order.items.forEach((item, idx) => {
      const itemTotal = item.price * item.quantity;
      const emoji = getItemEmoji(item.name);
      
      itemsHtml += `
        <div class="order-item">
          <div class="item-info">
            <div class="item-name">
              <span>${emoji}</span>
              <span>${escapeHtml(item.name)}</span>
              <span class="item-quantity">x${item.quantity}</span>
            </div>
          </div>
          <div class="item-price">
            R${itemTotal.toFixed(2)}
          </div>
        </div>
      `;
    });
    
    return `
      ${itemsHtml}
      <div class="order-total">
        <span>Total</span>
        <span>R${orderTotal.toFixed(2)}</span>
      </div>
    `;
  }

  // Render the main UI
  function render() {
    const container = document.getElementById('mainContent');
    const statusData = getCurrentStatus();
    
    // Handle error / no order ID
    if (!orderId) {
      container.innerHTML = `
        <div class="error-card">
          <i class="fas fa-ticket-alt"></i>
          <h3>No Order Number</h3>
          <p style="margin-top: 12px;">Please provide a valid order number in the URL.</p>
          <p style="margin-top: 8px; font-size: 0.8rem;">Example: ?order=12345</p>
        </div>
      `;
      return;
    }
    
    if (statusData.error || statusData.status === "not_found") {
      container.innerHTML = `
        <div class="error-card">
          <i class="fas fa-search"></i>
          <h3>Order Not Found</h3>
          <p style="margin-top: 12px;">We couldn't find order #${escapeHtml(orderId)}.</p>
          <p style="margin-top: 8px; font-size: 0.8rem;">Please check your order number and try again.</p>
          <p style="margin-top: 8px; font-size: 0.8rem;">Make sure you're looking up an order from The Butcher Shop.</p>
        </div>
      `;
      return;
    }
    
    const { order, position, statusText, statusClass, estimatedWait, progressPercent, isVVIP } = statusData;
    
    // Determine step completion based on status
    let stepCompleted = 0;
    if (order.status === "pending") stepCompleted = 0;
    else if (order.status === "preparing") stepCompleted = 1;
    else if (order.status === "ready") stepCompleted = 2;
    else if (order.status === "collected") stepCompleted = 3;
    
    const steps = [
      { name: "Order Received", icon: "📝", completed: stepCompleted >= 0 },
      { name: "Preparing", icon: "👨‍🍳", completed: stepCompleted >= 1 },
      { name: "Ready", icon: "✅", completed: stepCompleted >= 2 },
      { name: "Collected", icon: "🎉", completed: stepCompleted >= 3 }
    ];
    
    // Ready banner
    const readyBanner = order.status === "ready" ? `
      <div class="ready-banner">
        <div class="icon">🎉🥩</div>
        <h2>READY FOR COLLECTION!</h2>
        <p>Your order is ready at the counter</p>
        <p style="margin-top: 12px; font-size: 0.9rem;">Please have your order number ready</p>
      </div>
    ` : '';
    
    // VVIP badge
    const vvipHtml = isVVIP ? '<span class="vvip-badge">👑 VVIP PRIORITY 👑</span>' : '';
    
    // Build order items HTML
    const orderItemsHtml = renderOrderItems(order);
    
    // Main content
    container.innerHTML = `
      ${readyBanner}
      
      <div class="status-card">
        <div class="ticket-display">
          <div class="ticket-label">YOUR ORDER NUMBER</div>
          <div class="ticket-number">#${escapeHtml(String(order.orderId))} ${isVVIP ? '👑' : ''}</div>
          ${vvipHtml}
          <span class="status-badge ${statusClass}">${statusText}</span>
        </div>
        
        <div class="progress-container">
          <div class="progress-steps">
            ${steps.map(step => `
              <div class="step ${step.completed ? 'completed' : ''}">
                <span class="step-icon">${step.icon}</span>
                <span>${step.name}</span>
              </div>
            `).join('')}
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progressPercent}%;"></div>
          </div>
        </div>
        
        ${order.status === "pending" && position ? `
          <div class="info-row">
            <span class="info-label">📊 Queue Position</span>
            <span class="info-value">#${position} in line</span>
          </div>
        ` : ''}
        
        <div class="info-row">
          <span class="info-label">⏱️ Estimated Wait</span>
          <span class="info-value ${order.status === 'ready' ? 'urgent' : ''}">${estimatedWait}</span>
        </div>
        
        <div class="info-row">
          <span class="info-label">👤 Customer</span>
          <span class="info-value">${escapeHtml(order.bandName || order.bandId || 'Walk-in Customer')}</span>
        </div>
        
        <div class="info-row">
          <span class="info-label">📅 Order Placed</span>
          <span class="info-value">${formatTime(order.timestamp)}</span>
        </div>
        
        <div class="info-row">
          <span class="info-label">🔄 Last Updated</span>
          <span class="info-value" id="lastUpdate">Just now</span>
        </div>
      </div>
      
      <!-- ORDER ITEMS SECTION -->
      <div class="order-items">
        <h3>
          <i class="fas fa-receipt"></i>
          Your Order Summary
        </h3>
        ${orderItemsHtml}
      </div>
      
      <div class="action-buttons">
        <button class="btn btn-whatsapp" id="shareWhatsAppBtn">
          <i class="fab fa-whatsapp"></i> WhatsApp
        </button>
        <button class="btn btn-sms" id="shareSMSBtn">
          <i class="fas fa-sms"></i> SMS
        </button>
        <button class="btn btn-secondary" id="delayBtn">
          <i class="fas fa-clock"></i> Delay?
        </button>
      </div>
    `;
    
    // Update last update time
    const updateTime = document.getElementById('lastUpdate');
    if (updateTime) {
      updateTime.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    
    // Attach event listeners
    document.getElementById('shareWhatsAppBtn')?.addEventListener('click', shareWhatsApp);
    document.getElementById('shareSMSBtn')?.addEventListener('click', shareSMS);
    document.getElementById('delayBtn')?.addEventListener('click', requestDelay);
  }
  
  // Check for order status changes and notify
  let lastStatus = null;
  
  function checkForUpdates() {
    const statusData = getCurrentStatus();
    if (statusData.order && lastStatus !== statusData.order.status) {
      // Status changed!
      const oldStatus = lastStatus;
      lastStatus = statusData.order.status;
      
      if (statusData.order.status === "ready" && oldStatus !== "ready") {
        showToast('🎉 Your order is ready for collection! Head to the counter.');
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        // Play a beep if possible
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.3);
        } catch(e) {}
      } else if (statusData.order.status === "preparing" && oldStatus === "pending") {
        showToast('🔥 Your order is now being prepared!');
      }
    }
    render();
  }
  
  // Listen for storage events (updates from kitchen screen)
  window.addEventListener('storage', (event) => {
    if (event.key === GLOBAL_ORDERS_KEY) {
      checkForUpdates();
    }
  });
  
  // Initial render
  const initialData = getCurrentStatus();
  if (initialData.order) {
    lastStatus = initialData.order.status;
  }
  render();
  
  // Auto-refresh every 2 seconds
  setInterval(checkForUpdates, 2000);
</script>
