<!DOCTYPE html>
<html>
<head>
  <title>Events Test</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .event {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h2>Events Test</h2>

  <button onclick="loadEvents()">Load Events</button>

  <p id="status"></p>

  <div id="events"></div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://fqbcidcezfprranfxhyj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxYmNpZGNlemZwcnJhbmZ4aHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjY0ODgsImV4cCI6MjA5MzIwMjQ4OH0.eGCEE-lA8yLGjU1nFXv_A1RjbWvRbb5Mfm8FMzVRgHI"
    );

    const status = document.getElementById("status");
    const eventsDiv = document.getElementById("events");

    window.loadEvents = async function () {
      status.innerText = "Loading...";

      const { data, error } = await supabase
        .from("events")
        .select("*");

      if (error) {
        status.innerText = "Error: " + error.message;
        return;
      }

      status.innerText = "Loaded " + data.length + " events";

      eventsDiv.innerHTML = "";

      data.forEach(event => {
        const div = document.createElement("div");
        div.className = "event";

        div.innerHTML = `
          <strong>${event.name || "No name"}</strong><br>
          Date: ${event.date || "N/A"}<br>
          ID: ${event.id}
        `;

        eventsDiv.appendChild(div);
      });
    };
  </script>

</body>
</html>
