<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Manager - Rands</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/event-manager.css">
</head>
<body>
  <div class="bg-pattern"></div>
  
  <div class="container">
    <!-- Header -->
    <div class="dashboard-header">
      <div class="header-badge">
        <i class="fas fa-calendar-alt"></i>
        <span>Event Manager</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="totalEvents">0</div>
          <div class="stat-label">Total Events</div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="action-btn primary" onclick="openCreateModal()">
        <i class="fas fa-plus"></i> Create Event
      </button>
      <button class="action-btn info" onclick="loadEvents()">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>

    <!-- Events List -->
    <div class="dashboard-card">
      <div class="card-header">
        <h3><i class="fas fa-calendar"></i> Events</h3>
        <div class="search-box">
          <i class="fas fa-search" style="color: #6c7a8e;"></i>
          <input type="text" id="searchEvent" placeholder="Search events..." oninput="filterEvents()">
        </div>
      </div>
      <div class="card-body">
        <div id="eventsList" class="account-list">
          <div class="empty-state">
            <span><i class="fas fa-calendar-times" style="font-size: 48px; color: #E30613;"></i></span>
            <p style="margin-top: 12px;">Loading events...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="dashboard-footer">
      Rands Event Manager &copy; 2025
    </div>
  </div>

  <!-- Create/Edit Event Modal -->
  <div class="modal" id="eventModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Create Event</h3>
      </div>
      <div class="modal-body">
        <input type="hidden" id="eventId">
        
        <div class="form-group">
          <label class="form-label">Event Name *</label>
          <input type="text" id="eventName" class="form-input" placeholder="Enter event name" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" id="eventLocation" class="form-input" placeholder="Enter location">
        </div>
        
        <div class="form-group">
          <label class="form-label">Date & Time</label>
          <input type="datetime-local" id="eventStartTime" class="form-input">
        </div>
        
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="eventDescription" class="form-input form-textarea" placeholder="Enter event description" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn confirm" onclick="saveEvent()">Save Event</button>
      </div>
    </div>
  </div>

  <!-- View Event Modal -->
  <div class="modal" id="viewModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Event Details</h3>
      </div>
      <div class="modal-body" id="viewModalBody">
        <!-- Content filled dynamically -->
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel" onclick="closeViewModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal" id="deleteModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 style="color: #b71c1c;">Delete Event</h3>
      </div>
      <div class="modal-body">
        <p style="text-align: center; font-size: 1rem; color: #475569;">
          Are you sure you want to delete this event?<br>
          <strong id="deleteEventName" style="color: #E30613;"></strong>
        </p>
        <input type="hidden" id="deleteEventId">
      </div>
      <div class="modal-footer">
        <button class="modal-btn cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="modal-btn confirm" style="background: #b71c1c;" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <style>
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #E30613;
    }
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    .event-card {
      background: #f8fafd;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #eef2f8;
      transition: all 0.2s;
    }
    .event-card:hover {
      border-color: #E30613;
      background: #fff5f5;
    }
    .event-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .event-card-title {
      font-weight: 700;
      color: #E30613;
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .event-card-date {
      font-size: 0.75rem;
      color: #6c7a8e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .event-card-location {
      font-size: 0.75rem;
      color: #6c7a8e;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .event-card-description {
      font-size: 0.8rem;
      color: #475569;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #e2e8f0;
    }
    .event-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .event-action-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .event-action-btn:active {
      transform: scale(0.96);
    }
    .event-action-btn.view {
      background: #10b981;
      color: white;
    }
    .event-action-btn.edit {
      background: #3b82f6;
      color: white;
    }
    .event-action-btn.delete {
      background: #ef4444;
      color: white;
    }
    .detail-row {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f2f5;
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6c7a8e;
      min-width: 100px;
    }
    .detail-value {
      font-size: 0.85rem;
      color: #1e293b;
      flex: 1;
    }
  </style>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // Initialize Supabase
    const supabase = createClient(
      "https://fqbcidcezfprranfxhyj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxYmNpZGNlemZwcnJhbmZ4aHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjY0ODgsImV4cCI6MjA5MzIwMjQ4OH0.eGCEE-lA8yLGjU1nFXv_A1RjbWvRbb5Mfm8FMzVRgHI"
    );

    let allEvents = [];

    // Show toast notification
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    // Load all events from Supabase
    async function loadEvents() {
      const container = document.getElementById('eventsList');
      container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin" style="font-size: 32px; color: #E30613;"></i><p style="margin-top: 12px;">Loading...</p></div>';

      const { data, error } = await supabase
        .from('events')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle" style="font-size: 48px; color: #E30613;"></i><p style="margin-top: 12px;">Error: ${error.message}</p></div>`;
        showToast('Failed to load events', 'error');
        return;
      }

      allEvents = data || [];
      document.getElementById('totalEvents').textContent = allEvents.length;
      renderEvents(allEvents);
      showToast(`Loaded ${allEvents.length} events`, 'success');
    }

    // Render events list
    function renderEvents(events) {
      const container = document.getElementById('eventsList');
      
      if (!events || events.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times" style="font-size: 48px; color: #E30613;"></i><p style="margin-top: 12px;">No events found. Click "Create Event" to add one.</p></div>';
        return;
      }

      container.innerHTML = events.map(event => {
        const startTime = event.start_time ? new Date(event.start_time).toLocaleString() : 'Not set';
        const description = event.description ? (event.description.length > 100 ? event.description.substring(0, 100) + '...' : event.description) : '';
        
        return `
          <div class="event-card" data-id="${event.id}">
            <div class="event-card-header">
              <div>
                <div class="event-card-title">${escapeHtml(event.name || 'Unnamed Event')}</div>
                <div class="event-card-date">
                  <i class="fas fa-clock"></i> ${startTime}
                </div>
                <div class="event-card-location">
                  <i class="fas fa-map-marker-alt"></i> ${escapeHtml(event.location || 'Location not set')}
                </div>
              </div>
            </div>
            ${description ? `<div class="event-card-description">${escapeHtml(description)}</div>` : ''}
            <div class="event-card-actions">
              <button class="event-action-btn view" onclick="viewEvent('${event.id}')">
                <i class="fas fa-eye"></i> View
              </button>
              <button class="event-action-btn edit" onclick="editEvent('${event.id}')">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="event-action-btn delete" onclick="openDeleteModal('${event.id}', '${escapeHtml(event.name || 'Unnamed Event')}')">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Filter events by search term
    function filterEvents() {
      const searchTerm = document.getElementById('searchEvent').value.toLowerCase();
      const filtered = allEvents.filter(event => 
        (event.name && event.name.toLowerCase().includes(searchTerm)) ||
        (event.location && event.location.toLowerCase().includes(searchTerm)) ||
        (event.description && event.description.toLowerCase().includes(searchTerm))
      );
      renderEvents(filtered);
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Open create modal
    function openCreateModal() {
      document.getElementById('modalTitle').textContent = 'Create Event';
      document.getElementById('eventId').value = '';
      document.getElementById('eventName').value = '';
      document.getElementById('eventLocation').value = '';
      document.getElementById('eventStartTime').value = '';
      document.getElementById('eventDescription').value = '';
      document.getElementById('eventModal').classList.add('active');
    }

    // Open edit modal
    function editEvent(id) {
      const event = allEvents.find(e => e.id === id);
      if (!event) {
        showToast('Event not found', 'error');
        return;
      }

      document.getElementById('modalTitle').textContent = 'Edit Event';
      document.getElementById('eventId').value = event.id;
      document.getElementById('eventName').value = event.name || '';
      document.getElementById('eventLocation').value = event.location || '';
      document.getElementById('eventDescription').value = event.description || '';
      
      // Format datetime for input
      if (event.start_time) {
        const date = new Date(event.start_time);
        const formatted = date.toISOString().slice(0, 16);
        document.getElementById('eventStartTime').value = formatted;
      } else {
        document.getElementById('eventStartTime').value = '';
      }
      
      document.getElementById('eventModal').classList.add('active');
    }

    // View event details
    function viewEvent(id) {
      const event = allEvents.find(e => e.id === id);
      if (!event) {
        showToast('Event not found', 'error');
        return;
      }

      const startTime = event.start_time ? new Date(event.start_time).toLocaleString() : 'Not set';
      const createdAt = event.created_at ? new Date(event.created_at).toLocaleString() : 'Unknown';

      document.getElementById('viewModalBody').innerHTML = `
        <div class="detail-row">
          <div class="detail-label">Name</div>
          <div class="detail-value">${escapeHtml(event.name || 'Not set')}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Location</div>
          <div class="detail-value">${escapeHtml(event.location || 'Not set')}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Date & Time</div>
          <div class="detail-value">${startTime}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Description</div>
          <div class="detail-value">${escapeHtml(event.description || 'No description')}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Created At</div>
          <div class="detail-value">${createdAt}</div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Event ID</div>
          <div class="detail-value" style="font-size: 0.7rem; font-family: monospace;">${event.id}</div>
        </div>
      `;
      
      document.getElementById('viewModal').classList.add('active');
    }

    // Close modals
    function closeModal() {
      document.getElementById('eventModal').classList.remove('active');
    }

    function closeViewModal() {
      document.getElementById('viewModal').classList.remove('active');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('active');
    }

    // Open delete confirmation modal
    function openDeleteModal(id, name) {
      document.getElementById('deleteEventId').value = id;
      document.getElementById('deleteEventName').textContent = name;
      document.getElementById('deleteModal').classList.add('active');
    }

    // Save event (create or update)
    async function saveEvent() {
      const id = document.getElementById('eventId').value;
      const name = document.getElementById('eventName').value.trim();
      const location = document.getElementById('eventLocation').value.trim();
      const startTime = document.getElementById('eventStartTime').value;
      const description = document.getElementById('eventDescription').value.trim();

      if (!name) {
        showToast('Event name is required', 'error');
        return;
      }

      const eventData = {
        name,
        location: location || null,
        start_time: startTime || null,
        description: description || null
      };

      let result;
      
      if (id) {
        // Update existing event
        result = await supabase
          .from('events')
          .update(eventData)
          .eq('id', id);
      } else {
        // Create new event
        result = await supabase
          .from('events')
          .insert([eventData]);
      }

      if (result.error) {
        showToast(`Error: ${result.error.message}`, 'error');
        return;
      }

      closeModal();
      showToast(id ? 'Event updated successfully' : 'Event created successfully', 'success');
      loadEvents();
    }

    // Confirm delete
    async function confirmDelete() {
      const id = document.getElementById('deleteEventId').value;
      
      const { error } = await supabase
        .from('events')
        .delete()
        .eq('id', id);

      if (error) {
        showToast(`Error: ${error.message}`, 'error');
        return;
      }

      closeDeleteModal();
      showToast('Event deleted successfully', 'success');
      loadEvents();
    }

    // Expose functions to window for onclick handlers
    window.loadEvents = loadEvents;
    window.filterEvents = filterEvents;
    window.openCreateModal = openCreateModal;
    window.editEvent = editEvent;
    window.viewEvent = viewEvent;
    window.closeModal = closeModal;
    window.closeViewModal = closeViewModal;
    window.closeDeleteModal = closeDeleteModal;
    window.openDeleteModal = openDeleteModal;
    window.saveEvent = saveEvent;
    window.confirmDelete = confirmDelete;

    // Load events on page load
    document.addEventListener('DOMContentLoaded', loadEvents);
  </script>
</body>
</html>
