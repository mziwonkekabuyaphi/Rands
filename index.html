<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rands Vibe Pass</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/index.css">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

</head>

<body>

<div class="splash">
  <div class="logo-3d">
    <div class="flip-card">
      <div class="flip-front">
        <img src="images/rands-logo2.png" alt="Rands Vibe Pass">
      </div>
      <div class="flip-back">
        <i class="fas fa-crown"></i>
        <span>RANDS</span>
        <small style="font-size: 10px;">Vibe Pass</small>
      </div>
    </div>
    <div class="pulse-ring"></div>
  </div>

  <h1>Rands Vibe Pass</h1>
  <div class="version">✦ Secure Digital Pass ✦</div>
  <div class="loading-bar"><div class="progress" id="progressFill"></div></div>
  <div class="loading-circle"><div class="spinner"></div></div>
  <div class="status-message" id="statusMessage">
    <span>✨ Initializing Rands Vibe Pass</span>
  </div>
  <div class="percentage" id="percentage">0%</div>
  <div class="tagline">#See Your Vibe</div>
</div>

<div id="installBanner" class="install-banner" style="display:none;">
  <p>📱 <strong>Add to Home Screen</strong></p>
  <div>
    <button id="installBtn">Install</button>
    <button id="closeInstallBtn" class="close-install">✕</button>
  </div>
</div>

<!-- Font Awesome -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

<!-- JS -->
<script src="assets/js/index.js"></script>

</body>
</html>
