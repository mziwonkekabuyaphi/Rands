<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Supabase Event Test - Mobile Friendly</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f4f6fa;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eef2f8;
        }
        h2 { font-size: 1.2rem; color: #E30613; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        input, button {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        button {
            background: #E30613;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); }
        .status {
            padding: 10px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }
        .status.success { background: #e6f7ec; color: #2b7a3e; }
        .status.error { background: #ffe6e6; color: #E30613; }
        .event-item {
            background: #f8fafd;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            border: 1px solid #eef2f8;
        }
        .event-name { font-weight: 700; color: #E30613; }
        .event-date { font-size: 0.7rem; color: #6c7a8e; margin-top: 4px; }
        
        /* Mobile Console Panel */
        .console-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f172a;
            color: #38bdf8;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 200px;
            overflow-y: auto;
            padding: 12px;
            border-top: 2px solid #E30613;
            z-index: 1000;
            transition: max-height 0.3s;
        }
        .console-panel.minimized { max-height: 40px; overflow-y: hidden; }
        .console-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
        }
        .console-log { line-height: 1.4; }
        .log-line { margin-bottom: 4px; word-break: break-word; }
        .log-error { color: #ef4444; }
        .log-success { color: #10b981; }
        .clear-btn {
            background: #334155;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🔌 Supabase Test</h2>
        <div id="status" class="status">⏳ Checking connection...</div>
        <input type="text" id="eventName" placeholder="Event name *">
        <input type="text" id="eventLocation" placeholder="Location">
        <input type="datetime-local" id="eventDateTime">
        <button id="createBtn">➕ Create Event</button>
        <button id="refreshBtn" style="background:#475569; margin-top:8px;">🔄 Refresh Events</button>
    </div>
    
    <div class="card">
        <h2>📋 Events in Database</h2>
        <div id="eventsList">Loading...</div>
    </div>
</div>

<!-- Mobile Console Panel -->
<div class="console-panel" id="consolePanel">
    <div class="console-header" onclick="toggleConsole()">
        <span>📟 CONSOLE LOG</span>
        <span class="clear-btn" onclick="clearConsoleLog(event)">Clear</span>
    </div>
    <div id="consoleLog" class="console-log">Ready...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase credentials
    const SUPABASE_URL = 'https://qrjlgfajglvkbifhlebc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyamxnZmFqZ2x2a2JpZmhsZWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjAzOTAsImV4cCI6MjA5MjY5NjM5MH0.dBj6kPPyBE7LwrZZudyNkUsFcq_8NJBIXCJcNH41ajY';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Mobile console functions
    let consoleLines = [];
    
    function addLog(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const className = type === 'error' ? 'log-error' : (type === 'success' ? 'log-success' : '');
        const icon = type === 'error' ? '❌' : (type === 'success' ? '✅' : '📝');
        const logLine = `<div class="log-line ${className}">[${time}] ${icon} ${message}</div>`;
        consoleLines.push(logLine);
        if (consoleLines.length > 30) consoleLines.shift();
        document.getElementById('consoleLog').innerHTML = consoleLines.join('');
        console.log(message);
    }
    
    window.toggleConsole = function() {
        const panel = document.getElementById('consolePanel');
        panel.classList.toggle('minimized');
    };
    
    window.clearConsoleLog = function(e) {
        e.stopPropagation();
        consoleLines = [];
        document.getElementById('consoleLog').innerHTML = 'Console cleared.';
        addLog('Console cleared', 'info');
    };
    
    function showStatus(message, isError = false) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = message;
        statusDiv.className = isError ? 'status error' : 'status success';
    }
    
    // Load events from Supabase
    async function loadEvents() {
        addLog('Fetching events from Supabase...', 'info');
        try {
            const { data, error } = await supabase.from('events').select('*').order('created_at', { ascending: false });
            
            if (error) {
                addLog(`READ ERROR: ${error.message}`, 'error');
                showStatus(`Error: ${error.message}`, true);
                document.getElementById('eventsList').innerHTML = `<div class="event-item">❌ Error: ${error.message}</div>`;
                return;
            }
            
            addLog(`Found ${data?.length || 0} events in database`, 'success');
            showStatus(`✅ Connected - ${data?.length || 0} events`, false);
            
            if (!data || data.length === 0) {
                document.getElementById('eventsList').innerHTML = '<div class="event-item">📭 No events yet. Create one!</div>';
                return;
            }
            
            document.getElementById('eventsList').innerHTML = data.map(ev => `
                <div class="event-item">
                    <div class="event-name">📌 ${escapeHtml(ev.name)}</div>
                    <div class="event-date">📍 ${escapeHtml(ev.location || 'No location')} | 📅 ${ev.start_time ? ev.start_time.split('T')[0] : 'No date'}</div>
                    <div style="font-size:0.65rem; color:#64748b;">🆔 ${ev.id?.slice(0,8)}</div>
                </div>
            `).join('');
        } catch(err) {
            addLog(`Exception: ${err.message}`, 'error');
            showStatus(`Exception: ${err.message}`, true);
        }
    }
    
    // Create event
    async function createEvent() {
        const name = document.getElementById('eventName').value.trim();
        const location = document.getElementById('eventLocation').value.trim();
        const startTime = document.getElementById('eventDateTime').value;
        
        if (!name) {
            addLog('Event name is required!', 'error');
            showStatus('Please enter event name', true);
            return;
        }
        
        addLog(`Creating event: "${name}"...`, 'info');
        
        const eventData = {
            name: name,
            location: location || null,
            start_time: startTime || new Date().toISOString(),
            description: `Created from mobile test at ${new Date().toLocaleString()}`
        };
        
        try {
            const { data, error } = await supabase.from('events').insert([eventData]).select();
            
            if (error) {
                addLog(`INSERT ERROR: ${error.message}`, 'error');
                showStatus(`Failed: ${error.message}`, true);
                return;
            }
            
            addLog(`✅ SUCCESS! Event "${name}" saved to Supabase!`, 'success');
            showStatus(`✅ "${name}" created!`, false);
            
            // Clear form
            document.getElementById('eventName').value = '';
            document.getElementById('eventLocation').value = '';
            document.getElementById('eventDateTime').value = '';
            
            // Refresh list
            await loadEvents();
            
        } catch(err) {
            addLog(`Exception: ${err.message}`, 'error');
            showStatus(`Error: ${err.message}`, true);
        }
    }
    
    // Test connection on load
    async function testConnection() {
        addLog('Testing Supabase connection...', 'info');
        try {
            const { error } = await supabase.from('events').select('count', { count: 'exact', head: true });
            if (error) {
                addLog(`Connection FAILED: ${error.message}`, 'error');
                showStatus(`Connection failed: ${error.message}`, true);
                return;
            }
            addLog('✅ Supabase connected successfully!', 'success');
            showStatus('Connected to Supabase!', false);
            await loadEvents();
        } catch(err) {
            addLog(`Connection error: ${err.message}`, 'error');
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Event listeners
    document.getElementById('createBtn').addEventListener('click', createEvent);
    document.getElementById('refreshBtn').addEventListener('click', loadEvents);
    
    // Enter key support
    document.getElementById('eventName').addEventListener('keypress', (e) => { if(e.key === 'Enter') createEvent(); });
    
    testConnection();
</script>
</body>
</html>
