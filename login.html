<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Vibe Passport | Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #D42B2B;
      --red-dark:   #A81E1E;
      --red-light:  #F9DADA;
      --red-mid:    #E85555;
      --white:      #FFFFFF;
      --off-white:  #FDF5F5;
      --gray-100:   #F5F5F5;
      --gray-300:   #D4D4D4;
      --gray-500:   #8A8A8A;
      --gray-700:   #444444;
      --black:      #1A1A1A;
      --radius-sm:  10px;
      --radius-md:  18px;
      --radius-lg:  28px;
      --shadow-card: 0 20px 60px rgba(212,43,43,0.18), 0 4px 16px rgba(0,0,0,0.10);
      --shadow-btn:  0 4px 18px rgba(212,43,43,0.35);
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Nunito', sans-serif;
      --transition:   0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--off-white);
      overflow: hidden;
    }

    /* ─── ANIMATED BACKGROUND ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(212,43,43,0.13) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 90%, rgba(212,43,43,0.10) 0%, transparent 70%),
        linear-gradient(145deg, #fff5f5 0%, #fdf0f0 40%, #fff 100%);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -60px; right: -60px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,43,43,0.09) 0%, transparent 70%);
      animation: floatBg 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes floatBg {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-30px, 40px) scale(1.15); }
    }

    /* ─── LAYOUT ───────────────────────────────────────────────── */
    .scene {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ─── CARD ─────────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ─── CARD HEADER ──────────────────────────────────────────── */
    .card-header {
      background: linear-gradient(145deg, var(--red) 0%, var(--red-dark) 100%);
      padding: 28px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card-header::before {
      content: '';
      position: absolute;
      top: -40%; left: -20%;
      width: 140%; height: 140%;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Pattern dots */
    .card-header::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    /* ─── LOGO ─────────────────────────────────────────────────── */
    .logo-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .logo-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      backdrop-filter: blur(4px);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .logo-ring:active { transform: scale(0.93); }

    .logo-ring img {
      width: 52px; height: 52px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    /* fallback icon if no image */
    .logo-ring .logo-fallback {
      font-size: 32px;
      color: var(--white);
    }

    /* tap ripple */
    .tap-ripple {
      position: absolute; inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }

    .tap-ripple span {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      opacity: 0;
      transform: scale(0.8);
    }

    .logo-ring.tapped .tap-ripple span {
      animation: ripple 0.5s ease-out forwards;
    }

    @keyframes ripple {
      to { opacity: 0; transform: scale(1.5); }
    }

    /* tap counter badge */
    .tap-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: var(--white);
      color: var(--red);
      font-size: 10px;
      font-weight: 900;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.2s, transform 0.2s;
    }

    .tap-badge.visible { opacity: 1; transform: scale(1); }

    .brand-name {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--white);
      line-height: 1;
      position: relative; z-index: 1;
    }

    .brand-tagline {
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
      position: relative; z-index: 1;
    }

    /* ─── CARD BODY ────────────────────────────────────────────── */
    .card-body {
      padding: 24px 24px 20px;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 18px;
      text-align: center;
    }

    /* ─── FIELD GROUP ──────────────────────────────────────────── */
    .field-group { margin-bottom: 14px; }

    .field-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--gray-500);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--gray-100);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      transition: border-color var(--transition), background var(--transition);
    }

    .input-wrap:focus-within {
      border-color: var(--red);
      background: var(--white);
    }

    .input-wrap .fi {
      padding: 0 10px 0 14px;
      color: var(--gray-500);
      font-size: 14px;
      flex-shrink: 0;
    }

    .input-wrap:focus-within .fi { color: var(--red); }

    .phone-prefix {
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--gray-700);
      padding-right: 8px;
      border-right: 2px solid var(--gray-300);
      margin-right: 8px;
      flex-shrink: 0;
    }

    .input-field {
      flex: 1;
      border: none;
      background: transparent;
      padding: 13px 14px 13px 0;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--black);
      outline: none;
    }

    .input-field::placeholder { color: var(--gray-300); font-weight: 500; }

    .select-field {
      flex: 1;
      border: none;
      background: transparent;
      padding: 13px 14px 13px 0;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--black);
      outline: none;
      cursor: pointer;
      appearance: none;
    }

    .pw-toggle {
      padding: 0 14px;
      color: var(--gray-500);
      cursor: pointer;
      font-size: 14px;
      transition: color var(--transition);
    }
    .pw-toggle:hover { color: var(--red); }

    /* ─── PIN DISPLAY ──────────────────────────────────────────── */
    .pin-display {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 16px 0 20px;
    }

    .pin-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2.5px solid var(--gray-300);
      background: transparent;
      transition: background var(--transition), border-color var(--transition), transform 0.15s;
    }

    .pin-dot.filled {
      background: var(--red);
      border-color: var(--red);
      transform: scale(1.15);
    }

    .pin-dot.error {
      background: #E53E3E;
      border-color: #E53E3E;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    /* ─── PIN PAD ──────────────────────────────────────────────── */
    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 4px;
    }

    .pin-key {
      background: var(--gray-100);
      border: none;
      border-radius: var(--radius-sm);
      height: 56px;
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--black);
      cursor: pointer;
      transition: background var(--transition), transform 0.1s, color var(--transition);
      position: relative;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .pin-key:active {
      background: var(--red-light);
      color: var(--red);
      transform: scale(0.93);
    }

    .pin-key.zero  { grid-column: 1; }
    .pin-key.del   { grid-column: 3; font-size: 1.2rem; color: var(--gray-500); }
    .pin-key.del:active { color: var(--red); }

    /* ─── BUTTONS ──────────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.97); }

    .btn-red {
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      color: var(--white);
      box-shadow: var(--shadow-btn);
      margin-top: 10px;
    }

    .btn-red:hover { box-shadow: 0 6px 24px rgba(212,43,43,0.45); }

    .btn-outline {
      background: var(--white);
      color: var(--red);
      border: 2px solid var(--red);
      margin-top: 10px;
    }

    .btn-outline:hover { background: var(--red-light); }

    /* ─── DIVIDER ──────────────────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0 0;
      color: var(--gray-500);
      font-size: 0.78rem;
      font-weight: 600;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--gray-300);
    }

    /* ─── ERROR / LOCK ─────────────────────────────────────────── */
    .error-msg {
      color: var(--red);
      font-size: 0.78rem;
      font-weight: 700;
      text-align: center;
      margin: 8px 0 4px;
      min-height: 18px;
      display: none;
    }

    .lock-timer {
      background: var(--red-light);
      color: var(--red-dark);
      border-left: 3px solid var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      text-align: center;
      margin: 8px 0;
      display: none;
    }

    /* ─── CARD FOOTER ──────────────────────────────────────────── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-top: 1px solid var(--gray-100);
      background: var(--off-white);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22C55E;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    .powered-tag {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray-500);
    }

    /* ─── MODAL BACKDROP ───────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ─── ADMIN MODAL ──────────────────────────────────────────── */
    .admin-modal {
      background: var(--white);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-width: 480px;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
      max-height: 90dvh;
      overflow-y: auto;
    }

    .modal-backdrop.open .admin-modal {
      transform: translateY(0);
    }

    .admin-modal-header {
      padding: 12px 20px 0;
      position: sticky; top: 0;
      background: var(--white);
      z-index: 2;
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--gray-300);
      border-radius: 99px;
      margin: 0 auto 12px;
    }

    .modal-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: var(--black);
    }

    .modal-close {
      background: var(--gray-100);
      border: none;
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--gray-700);
      cursor: pointer;
      font-size: 14px;
      transition: background var(--transition), color var(--transition);
      position: absolute;
      top: 16px; right: 20px;
    }

    .modal-close:hover { background: var(--red-light); color: var(--red); }

    /* ─── MODAL TABS ───────────────────────────────────────────── */
    .modal-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      background: var(--gray-100);
      border-radius: var(--radius-sm);
      padding: 4px;
    }

    .modal-tab {
      flex: 1;
      padding: 10px 6px;
      border: none;
      border-radius: 8px;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--gray-500);
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      display: flex; align-items: center; justify-content: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-tab.active {
      background: var(--white);
      color: var(--red);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .admin-modal-body {
      padding: 0 20px 20px;
    }

    /* ─── STAFF PIN (8-digit) ──────────────────────────────────── */
    .staff-pin-display {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 16px 0 20px;
      flex-wrap: wrap;
    }

    .staff-pin-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--gray-300);
      background: transparent;
      transition: background var(--transition), border-color var(--transition), transform 0.15s;
    }

    .staff-pin-dot.filled {
      background: var(--red);
      border-color: var(--red);
      transform: scale(1.15);
    }

    /* ─── HIDDEN UTIL ──────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ─── SPINNER ──────────────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner.active { display: block; }

    /* ─── TOAST ────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--black);
      color: var(--white);
      padding: 12px 20px;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      pointer-events: none;
      max-width: calc(100vw - 48px);
      white-space: normal;
      text-align: center;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { background: #16a34a; }
    #toast.error   { background: var(--red-dark); }

    /* ─── RESPONSIVE ───────────────────────────────────────────── */
    @media (min-height: 750px) {
      .card-body { padding: 28px 28px 24px; }
      .admin-modal-body { padding: 0 24px 24px; }
      .admin-modal-header { padding: 14px 24px 0; }
    }

    @media (max-height: 650px) {
      .pin-key { height: 46px; font-size: 1.3rem; }
      .card-header { padding: 18px 24px 16px; }
      .logo-ring { width: 64px; height: 64px; }
      .logo-ring img { width: 40px; height: 40px; }
    }
  </style>

</head>
