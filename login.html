<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Your Vibe Passport | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body>

<!-- CUSTOMER CARD -->
<div class="card">
    <div class="card-header">
        <div class="logo-wrap" id="logoWrap">
            <div class="logo-icon" id="logoIcon">
                <img src="images/rands-logo2.png" alt="Vibe Passport Logo">
            </div>
            <div class="tap-dots" id="tapDots">
                <div class="tap-dot" id="td0"></div>
                <div class="tap-dot" id="td1"></div>
                <div class="tap-dot" id="td2"></div>
                <div class="tap-dot" id="td3"></div>
                <div class="tap-dot" id="td4"></div>
            </div>
        </div>
        <div class="brand-name">Your Vibe Passport</div>
        <div class="brand-tagline">Your Digital Vibe Experience</div>
    </div>

    <div class="card-body">
        <p class="section-label">Sign In to Your Vibe</p>

        <!-- Phone -->
        <div class="field-group">
            <div class="field-label">Phone Number</div>
            <div class="input-wrap">
                <i class="fi fas fa-phone"></i>
                <span class="phone-prefix">+27</span>
                <input type="tel" id="customerPhone" class="input-field phone-input"
                       placeholder="8x xxx xxxx" maxlength="10" autocomplete="off">
            </div>
        </div>

        <div class="field-label" style="text-align:center; margin-bottom:10px;">Enter Your 4-Digit PIN</div>

        <!-- PIN dots -->
        <div class="pin-display">
            <div class="pin-dot" id="dot-0"></div>
            <div class="pin-dot" id="dot-1"></div>
            <div class="pin-dot" id="dot-2"></div>
            <div class="pin-dot" id="dot-3"></div>
        </div>

        <!-- PIN pad -->
        <div class="pin-pad">
            <button class="pin-key" data-k="1">1</button>
            <button class="pin-key" data-k="2">2</button>
            <button class="pin-key" data-k="3">3</button>
            <button class="pin-key" data-k="4">4</button>
            <button class="pin-key" data-k="5">5</button>
            <button class="pin-key" data-k="6">6</button>
            <button class="pin-key" data-k="7">7</button>
            <button class="pin-key" data-k="8">8</button>
            <button class="pin-key" data-k="9">9</button>
            <button class="pin-key zero" data-k="0">0</button>
            <button class="pin-key del" data-k="del"><i class="fas fa-delete-left"></i></button>
        </div>

        <input type="password" id="pin" style="display: none;" maxlength="4" autocomplete="off">

        <div id="pinError" class="error-message" style="color: #e53e3e; font-size: 0.8rem; margin: 8px 0 12px 0; font-weight: 500; display: none; text-align: center;"></div>
        <div id="lockTimer" class="lock-timer" style="color: #c53030; background-color: #fff5f5; padding: 10px 12px; border-radius: 12px; text-align: center; font-weight: 600; font-size: 0.9rem; margin: 0 0 16px 0; border-left: 3px solid #e53e3e; display: none;"></div>

        <button class="btn btn-green" id="loginBtn">
            <i class="fas fa-arrow-right-to-bracket"></i>
            <span>Enter My Vibe</span>
        </button>

        <div class="divider"><span>Don't have an account?</span></div>
        <button class="btn btn-red" id="createAccountBtn">
            <i class="fas fa-user-plus"></i>
            <span>Create New Account</span>
        </button>
    </div>

    <div class="card-footer">
        <div class="status-dot"></div>
        <span class="powered-tag">Secure · Encrypted · Local</span>
    </div>
</div>

<!-- ADMIN / STAFF MODAL -->
<div class="modal-backdrop" id="adminBackdrop">
    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-header">
            <div class="modal-handle"></div>
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div class="modal-tabs" id="modalTabsContainer">
                <button class="modal-tab" data-role="super_administrator" id="tabSuper">
                    <i class="fas fa-crown"></i> Super
                </button>
                <button class="modal-tab" data-role="tenant_admin" id="tabTenant">
                    <i class="fas fa-building"></i> Tenant
                </button>
                <button class="modal-tab" data-role="staff" id="tabStaff">
                    <i class="fas fa-users"></i> Staff
                </button>
            </div>
        </div>

        <div class="admin-modal-body">
            <p class="section-label" id="adminFormLabel">Super Admin Login</p>

            <!-- Venue (hidden for super) -->
            <div class="field-group hidden" id="venueGroup">
                <div class="field-label">Select Venue</div>
                <div class="input-wrap">
                    <i class="fi fas fa-store"></i>
                    <select class="select-field" id="tenantDropdown">
                        <option value="">— Choose Venue —</option>
                    </select>
                </div>
            </div>

            <!-- Email field (changed from Username) -->
            <div class="field-group">
                <div class="field-label">Email Address</div>
                <div class="input-wrap">
                    <i class="fi fas fa-envelope"></i>
                    <input type="email" id="adminUsername" class="input-field"
                           placeholder="Enter your email" autocomplete="off">
                </div>
            </div>

            <div class="field-group">
                <div class="field-label">Password</div>
                <div class="input-wrap">
                    <i class="fi fas fa-lock"></i>
                    <input type="password" id="adminPassword" class="input-field"
                           placeholder="Enter password" autocomplete="off">
                    <span class="pw-toggle" id="pwToggle"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            <button class="btn btn-green" id="adminLoginBtn" style="margin-bottom:0;">
                <div class="spinner" id="adminSpinner"></div>
                <i class="fas fa-arrow-right-to-bracket" id="adminIcon"></i>
                <span id="adminBtnText">Login</span>
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>

<!-- SCRIPTS -->
<!-- Regular scripts (non‑module) -->
<script src="assets/js/data.js"></script>

<!-- Supabase client and login logic as ES modules (order matters) -->
<script type="module" src="config/supabase.js"></script>
<script type="module" src="assets/js/login.js"></script>

</body>
</html>
