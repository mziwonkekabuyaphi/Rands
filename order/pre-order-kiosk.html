<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Butcher Smart Queue - Pre-order Kiosk</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e30613;
    --red-dark: #b3040f;
    --red-light: #fff0f1;
    --red-border: #ffd0d3;
    --bg: #f5f5f5;
    --surface: #ffffff;
    --text: #111111;
    --muted: #666666;
    --radius: 20px;
    --radius-lg: 28px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
font-family: ‘Inter’, sans-serif;
color: var(–text);
padding-bottom: 80px;
}

/* ── HEADER ── */
.movable-header-group {
position: sticky;
top: 0;
z-index: 100;
width: 100%;
background: var(–surface);
transition: transform 0.3s ease;
will-change: transform;
box-shadow: 0 1px 0 #eee;
}
.header-hidden { transform: translateY(-100%); }

.app-header {
padding: 14px 20px;
display: flex;
justify-content: space-between;
align-items: center;
background: var(–surface);
}
.logo {
height: 42px;
width: auto;
max-width: 160px;
object-fit: contain;
border-radius: 10px;
}
.header-icons { display: flex; gap: 8px; }
.header-icon {
width: 40px;
height: 40px;
background: var(–bg);
border-radius: 50%;
display: inline-flex;
align-items: center;
justify-content: center;
color: var(–red);
font-size: 1.1rem;
cursor: pointer;
transition: background 0.15s, transform 0.15s;
border: none;
}
.header-icon:active { transform: scale(0.92); background: var(–red-light); }

.welcome-greeting {
padding: 10px 20px;
background: var(–surface);
font-size: 0.9rem;
font-weight: 600;
color: var(–text);
display: flex;
align-items: center;
gap: 10px;
border-top: 1px solid #f0f0f0;
flex-wrap: wrap;
}
.welcome-greeting i { color: var(–red); }
.welcome-greeting span {
background: linear-gradient(135deg, var(–red), var(–red-dark));
-webkit-background-clip: text;
background-clip: text;
color: transparent;
font-weight: 800;
}
#pendingRequestIndicator {
background: var(–red-light);
padding: 3px 10px;
border-radius: 30px;
font-size: 0.68rem;
color: var(–red);
font-weight: 600;
}

/* ── HERO / TITLE ── */
#header { width: 100%; max-width: 800px; margin-bottom: 0; }
#bottomNav { width: 100%; max-width: 480px; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 1000; }

.smartq-title {
text-align: center;
padding: 28px 20px 20px;
width: 100%;
max-width: 800px;
}
.smartq-title h2 {
font-size: 2rem;
font-weight: 900;
color: var(–text);
letter-spacing: -1px;
line-height: 1.1;
}
.smartq-title h2 span { color: var(–red); }
.smartq-title p {
font-size: 0.88rem;
color: var(–muted);
margin-top: 6px;
font-weight: 500;
}

/* ── MAIN LAYOUT ── */
.kiosk-container {
width: 100%;
max-width: 800px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
padding: 0 16px;
}

/* ── JOIN PANEL ── */
.join-panel {
background: var(–surface);
border-radius: var(–radius-lg);
padding: 24px;
box-shadow: var(–shadow);
border: 1px solid #ebebeb;
}

.panel-label {
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 1.2px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 16px;
}

.form-group { margin-bottom: 0; }
.form-group label {
display: flex;
align-items: center;
gap: 7px;
color: var(–muted);
font-weight: 600;
margin-bottom: 10px;
font-size: 0.85rem;
}
.form-group label i { color: #25D366; font-size: 1rem; }

.form-group input {
width: 100%;
padding: 14px 16px;
border: 2px solid #e8e8e8;
border-radius: var(–radius);
font-size: 16px;
font-family: ‘Inter’, sans-serif;
color: var(–text);
background: var(–bg);
transition: border-color 0.2s, background 0.2s;
font-weight: 600;
outline: none;
}
.form-group input::placeholder { font-weight: 400; color: #bbb; }
.form-group input:focus { border-color: var(–red); background: #fff; }
.form-group input.valid { border-color: #22c55e; background: #f0fdf4; }
.form-group input.invalid { border-color: #f97316; background: #fff7ed; }

.phone-hint {
font-size: 0.72rem;
color: var(–muted);
margin-top: 7px;
display: flex;
align-items: center;
gap: 5px;
font-weight: 500;
}
.phone-hint.valid { color: #16a34a; }
.phone-hint.invalid { color: #ea580c; }

.join-btn {
width: 100%;
padding: 18px;
background: var(–red);
color: white;
border: none;
border-radius: var(–radius);
font-size: 1.05rem;
font-weight: 800;
cursor: pointer;
margin-top: 18px;
transition: background 0.2s, transform 0.1s;
font-family: ‘Inter’, sans-serif;
letter-spacing: -0.3px;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}
.join-btn:not(:disabled):hover { background: var(–red-dark); }
.join-btn:not(:disabled):active { transform: scale(0.97); }
.join-btn:disabled, .join-btn.disabled {
background: #d4d4d4;
color: #999;
cursor: not-allowed;
transform: none;
}

/* ── NOW SERVING PANEL ── */
.serving-panel {
background: var(–surface);
border-radius: var(–radius-lg);
padding: 24px;
box-shadow: var(–shadow);
border: 1px solid #ebebeb;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
}
.serving-panel h2 {
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 1.2px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 16px;
}

.counter-serving {
background: linear-gradient(145deg, var(–red), var(–red-dark));
border-radius: var(–radius);
padding: 24px 20px;
color: white;
text-align: center;
width: 100%;
box-shadow: 0 8px 24px rgba(227,6,19,0.3);
}
.counter-serving h3 {
font-size: 0.8rem;
font-weight: 600;
opacity: 0.85;
margin-bottom: 10px;
letter-spacing: 0.5px;
text-transform: uppercase;
}
.serving-number {
font-size: 52px;
font-weight: 900;
letter-spacing: -2px;
line-height: 1;
margin-bottom: 4px;
}
.serving-sub {
font-size: 0.72rem;
opacity: 0.7;
font-weight: 500;
}

/* ── FOOTER ── */
.footer {
text-align: center;
padding: 20px;
color: #aaa;
font-size: 0.68rem;
font-weight: 500;
}

/* ─────────────────────────────────────────────
PREORDER MODAL
───────────────────────────────────────────── */
.preorder-modal {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.85);
backdrop-filter: blur(6px);
z-index: 10000;
display: flex;
align-items: flex-end;
justify-content: center;
}

.preorder-container {
background: var(–surface);
border-radius: 32px 32px 0 0;
width: 100%;
max-width: 560px;
max-height: 92vh;
overflow-y: auto;
padding: 24px 20px 32px;
position: relative;
animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp {
from { transform: translateY(100px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
width: 40px;
height: 4px;
background: #ddd;
border-radius: 4px;
margin: 0 auto 20px;
}

.close-modal {
position: absolute;
top: 20px;
right: 20px;
width: 36px;
height: 36px;
background: var(–bg);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
cursor: pointer;
color: var(–muted);
border: none;
font-family: ‘Inter’, sans-serif;
transition: background 0.15s;
}
.close-modal:hover { background: #e8e8e8; }

.modal-title {
font-size: 1.25rem;
font-weight: 800;
color: var(–text);
letter-spacing: -0.5px;
margin-bottom: 4px;
}
.modal-subtitle {
font-size: 0.8rem;
color: var(–muted);
margin-bottom: 18px;
font-weight: 500;
}

/* Category pills */
.category-row {
display: flex;
gap: 8px;
margin-bottom: 16px;
overflow-x: auto;
padding-bottom: 2px;
-ms-overflow-style: none;
scrollbar-width: none;
}
.category-row::-webkit-scrollbar { display: none; }

.cat-pill {
background: var(–bg);
padding: 9px 18px;
border-radius: 40px;
font-weight: 700;
cursor: pointer;
border: none;
font-size: 0.8rem;
white-space: nowrap;
font-family: ‘Inter’, sans-serif;
color: var(–text);
transition: background 0.15s, color 0.15s;
}
.cat-pill.active {
background: var(–red);
color: white;
}

/* Items grid */
.items-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
margin-bottom: 20px;
max-height: 280px;
overflow-y: auto;
}

.menu-item {
background: var(–bg);
border-radius: var(–radius);
padding: 16px 12px;
text-align: center;
cursor: pointer;
border: 2px solid transparent;
transition: border-color 0.15s, background 0.15s, transform 0.1s;
position: relative;
overflow: hidden;
}
.menu-item:active {
transform: scale(0.95);
background: var(–red-light);
border-color: var(–red);
}

.item-emoji {
font-size: 2rem;
margin-bottom: 6px;
display: block;
}
.item-name {
font-weight: 700;
font-size: 0.82rem;
color: var(–text);
margin-bottom: 4px;
line-height: 1.2;
}
.item-price {
color: var(–red);
font-weight: 800;
font-size: 0.95rem;
}
.item-add-hint {
position: absolute;
bottom: 6px;
right: 8px;
font-size: 0.65rem;
color: var(–muted);
font-weight: 600;
}

/* Cart throw animation */
@keyframes throwToCart {
0% { transform: scale(1) rotate(0deg); opacity: 1; }
30% { transform: scale(1.1) rotate(5deg); background: var(–red); }
100% { transform: translate(80px, 120px) scale(0.2) rotate(15deg); opacity: 0; }
}
.menu-item-throw {
animation: throwToCart 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards !important;
pointer-events: none;
z-index: 1000;
}

/* ── CART SECTION ── */
.cart-section {
background: var(–red-light);
border-radius: var(–radius);
padding: 16px;
border: 2px solid var(–red-border);
transition: all 0.2s;
}

.cart-header {
display: flex;
align-items: center;
gap: 8px;
font-weight: 800;
font-size: 0.95rem;
color: var(–red);
margin-bottom: 12px;
}

.cart-item-count {
background: var(–red);
color: white;
width: 20px;
height: 20px;
border-radius: 50%;
font-size: 0.65rem;
font-weight: 800;
display: inline-flex;
align-items: center;
justify-content: center;
}

.cart-items-list {
max-height: 200px;
overflow-y: auto;
margin-bottom: 10px;
}

.cart-item-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 10px;
background: white;
border-radius: 12px;
margin-bottom: 6px;
gap: 8px;
transition: all 0.2s;
border: 1px solid var(–red-border);
}
.cart-item-info { flex: 2; min-width: 80px; }
.cart-item-name { font-weight: 700; font-size: 0.82rem; color: var(–text); }
.cart-item-price { font-size: 0.68rem; color: var(–red); font-weight: 600; }

.cart-item-quantity { display: flex; align-items: center; gap: 6px; }
.qty-btn {
background: var(–bg);
border: none;
width: 28px;
height: 28px;
border-radius: 50%;
font-weight: 800;
cursor: pointer;
font-size: 16px;
color: var(–text);
display: flex;
align-items: center;
justify-content: center;
line-height: 1;
font-family: ‘Inter’, sans-serif;
transition: background 0.1s;
}
.qty-btn:active { transform: scale(0.88); background: #e5e5e5; }
.qty-value { font-weight: 800; min-width: 20px; text-align: center; font-size: 0.9rem; }

.cart-item-total { font-weight: 800; color: var(–red); min-width: 52px; text-align: right; font-size: 0.85rem; }
.remove-item { background: none; border: none; color: #f44336; font-size: 16px; cursor: pointer; padding: 4px; opacity: 0.7; transition: opacity 0.15s; }
.remove-item:hover { opacity: 1; }

@keyframes highlightFlash {
0% { transform: translateX(-4px); background: #fff; }
30% { transform: translateX(4px); background: #ffe0e0; }
100% { transform: translateX(0); background: white; }
}
.new-item-highlight { animation: highlightFlash 0.4s ease; }

@keyframes cartBounce {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.04); }
}
.cart-bounce { animation: cartBounce 0.35s ease; }

.cart-total {
text-align: right;
font-weight: 900;
font-size: 1.3rem;
padding-top: 10px;
border-top: 2px solid var(–red-border);
color: var(–red);
letter-spacing: -0.5px;
}
.cart-total span { font-size: 0.7rem; font-weight: 500; color: var(–muted); margin-right: 4px; }

.empty-cart-message {
text-align: center;
padding: 20px;
color: #bbb;
font-size: 0.82rem;
font-weight: 500;
}
.empty-cart-message i { font-size: 1.5rem; display: block; margin-bottom: 6px; }

.special-instructions {
width: 100%;
padding: 11px 14px;
border-radius: var(–radius);
border: 2px solid #e8e8e8;
margin-top: 12px;
font-size: 0.85rem;
font-family: ‘Inter’, sans-serif;
color: var(–text);
background: white;
transition: border-color 0.2s;
outline: none;
}
.special-instructions:focus { border-color: var(–red); }
.special-instructions::placeholder { color: #bbb; }

.btn-primary-modal {
background: var(–red);
color: white;
border: none;
padding: 16px;
border-radius: var(–radius);
font-weight: 800;
width: 100%;
margin-top: 14px;
cursor: pointer;
font-size: 1rem;
font-family: ‘Inter’, sans-serif;
letter-spacing: -0.3px;
transition: background 0.2s, transform 0.1s;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}
.btn-primary-modal:not(:disabled):hover { background: var(–red-dark); }
.btn-primary-modal:not(:disabled):active { transform: scale(0.97); }
.btn-primary-modal:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─────────────────────────────────────────────
TICKET CONFIRMATION
───────────────────────────────────────────── */
.ticket-overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.95);
z-index: 20000;
display: flex;
align-items: flex-start;
justify-content: center;
padding: 20px;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

.ticket-confirmation {
background: white;
border-radius: var(–radius-lg);
padding: 28px 22px;
text-align: center;
max-width: 420px;
width: 100%;
margin: auto;
animation: slideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
border: 2px solid #d1fae5;
}

.ticket-scroll-content { }

.check-icon {
width: 64px;
height: 64px;
background: #d1fae5;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
margin: 0 auto 16px;
color: #059669;
font-size: 1.8rem;
}

.ticket-confirmation h2 {
font-size: 1.4rem;
font-weight: 900;
color: var(–text);
letter-spacing: -0.5px;
margin-bottom: 4px;
}
.ticket-confirmation > p, .ticket-scroll-content > p {
color: var(–muted);
font-size: 0.85rem;
font-weight: 500;
}

.ticket-number-display {
font-size: 2rem;
font-weight: 900;
color: var(–red);
letter-spacing: 1px;
margin: 14px 0;
background: var(–red-light);
display: inline-block;
padding: 8px 24px;
border-radius: 50px;
border: 2px solid var(–red-border);
word-break: break-all;
}

.qr-code-container {
background: var(–bg);
padding: 16px;
border-radius: var(–radius);
display: flex;
justify-content: center;
align-items: center;
margin: 16px auto;
border: 1px solid #eee;
overflow-x: auto;
}
#confirmationQrcode { display: flex; justify-content: center; min-width: 140px; }
#confirmationQrcode img, #confirmationQrcode canvas { width: 160px !important; height: 160px !important; max-width: 100%; }

.qr-zoom-instruction {
font-size: 0.7rem;
color: var(–muted);
margin-top: 6px;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
font-weight: 500;
}

.tracking-link {
background: var(–bg);
padding: 10px 12px;
border-radius: var(–radius);
margin: 12px 0;
word-break: break-all;
font-size: 0.68rem;
color: #334155;
text-align: left;
border: 1px solid #e8e8e8;
}

.copy-btn {
background: #1e293b;
color: white;
border: none;
padding: 9px 20px;
border-radius: 40px;
cursor: pointer;
font-size: 0.8rem;
font-weight: 700;
font-family: ‘Inter’, sans-serif;
transition: background 0.15s;
}
.copy-btn:hover { background: #0f172a; }

.wait-info {
background: #fef3c7;
padding: 12px 14px;
border-radius: var(–radius);
margin: 14px 0;
color: #92400e;
font-size: 0.8rem;
font-weight: 500;
text-align: left;
border: 1px solid #fde68a;
}
.wait-info i { margin-right: 4px; }

.reset-btn {
background: var(–red);
color: white;
border: none;
padding: 14px 20px;
border-radius: var(–radius);
font-weight: 800;
font-size: 0.95rem;
cursor: pointer;
margin-top: 10px;
width: 100%;
font-family: ‘Inter’, sans-serif;
transition: background 0.2s, transform 0.1s;
letter-spacing: -0.3px;
}
.reset-btn:active { transform: scale(0.97); }

@keyframes subtlePulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
.zoom-hint { animation: subtlePulse 2s ease-in-out infinite; }

@keyframes slideIn {
from { transform: translateY(-30px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}

/* ─────────────────────────────────────────────
POPUP MODAL
───────────────────────────────────────────── */
.popup-modal-overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.75);
backdrop-filter: blur(4px);
z-index: 30000;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
visibility: hidden;
transition: all 0.25s ease;
}
.popup-modal-overlay.active { opacity: 1; visibility: visible; }

.popup-modal {
background: white;
border-radius: var(–radius-lg);
width: 88%;
max-width: 320px;
padding: 28px 22px;
text-align: center;
transform: scale(0.9);
transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
box-shadow: 0 25px 50px rgba(0,0,0,0.35);
}
.popup-modal-overlay.active .popup-modal { transform: scale(1); }

.popup-icon { font-size: 40px; margin-bottom: 12px; }
.popup-icon.warning { color: #f97316; }
.popup-icon.error { color: var(–red); }
.popup-icon.success { color: #10b981; }
.popup-icon.info { color: #3b82f6; }

.popup-title {
font-size: 1.1rem;
font-weight: 800;
color: var(–text);
margin-bottom: 6px;
letter-spacing: -0.3px;
}
.popup-message {
font-size: 0.83rem;
color: var(–muted);
line-height: 1.5;
margin-bottom: 20px;
white-space: pre-line;
font-weight: 500;
}
.popup-btn {
background: var(–red);
color: white;
border: none;
padding: 12px 20px;
border-radius: var(–radius);
font-weight: 700;
font-size: 0.9rem;
cursor: pointer;
width: 100%;
font-family: ‘Inter’, sans-serif;
transition: background 0.15s;
}
.popup-btn:active { background: var(–red-dark); }

/* ── RESPONSIVE ── */
@media (max-width: 650px) {
.kiosk-container { grid-template-columns: 1fr; gap: 14px; }
.smartq-title h2 { font-size: 1.55rem; }
.serving-number { font-size: 44px; }
.join-panel, .serving-panel { padding: 20px; }
.join-btn { font-size: 0.95rem; }
.items-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
.ticket-number-display { font-size: 1.5rem; }
}

@media (max-width: 480px) {
body { padding-bottom: 80px; }
.smartq-title { padding: 20px 16px 14px; }
.kiosk-container { padding: 0 14px; }
.serving-number { font-size: 38px; }
.cart-item-row { flex-wrap: wrap; }
.cart-item-total { align-self: flex-end; }
.ticket-number-display { font-size: 1.25rem; }
#confirmationQrcode img, #confirmationQrcode canvas { width: 130px !important; height: 130px !important; }
}

@media (max-width: 700px) {
.app-header { padding: 12px 16px; }
.welcome-greeting { padding: 8px 16px; }
.header-icon { width: 36px; height: 36px; font-size: 1rem; }
.logo { height: 36px; }
}
</style>

</head>
<body>

<!-- ========== GLOBAL HEADER ========== -->

<div class="movable-header-group" id="movableHeaderGroup">
  <div class="app-header">
    <img src="images/rands-logo1.png" alt="Rands Wallet" class="logo"
      onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 40\'%3E%3Crect width=\'100\' height=\'40\' rx=\'8\' fill=\'%23E30613\'/%3E%3Ctext x=\'50\' y=\'27\' font-size=\'20\' font-weight=\'bold\' text-anchor=\'middle\' fill=\'white\' font-family=\'Arial\'%3ERANDS%3C/text%3E%3C/svg%3E'">
    <div class="header-icons">
      <span class="header-icon" id="logoutHeaderBtn"><i class="fas fa-sign-out-alt"></i></span>
      <span class="header-icon" id="infoHeaderBtn"><i class="fas fa-info-circle"></i></span>
      <span class="header-icon" id="profileBtn"><i class="fas fa-user-circle"></i></span>
    </div>
  </div>
  <div class="welcome-greeting" id="welcomeGreeting">
    <i class="fas fa-hand-peace"></i>
    <span id="greetingName">Fola, User</span>
    <span id="pendingRequestIndicator" style="display:none;">⏳ Unlock Pending</span>
  </div>
</div>

<script>
(function() {
  function loadUserAndUpdateGreeting() {
    const saved = localStorage.getItem('rands_accounts_v2');
    let userName = "User";
    if (saved) {
      try {
        const accounts = JSON.parse(saved);
        const userAccount = accounts.find(acc => acc.name && acc.name.toLowerCase().includes('mziwonke')) || accounts[0];
        if (userAccount && userAccount.name) userName = userAccount.name.split(' ')[0];
      } catch(e) { console.error(e); }
    }
    const greetingSpan = document.getElementById('greetingName');
    if (greetingSpan) greetingSpan.innerText = `Fola, ${userName}`;
  }

  const header = document.getElementById('movableHeaderGroup');
  let lastScroll = 0;
  if (header) {
    window.addEventListener('scroll', () => {
      const currentScroll = window.scrollY;
      if (currentScroll > lastScroll && currentScroll > 50) header.classList.add('header-hidden');
      else if (currentScroll < lastScroll) header.classList.remove('header-hidden');
      lastScroll = currentScroll;
    }, { passive: true });
  }

  document.getElementById('logoutHeaderBtn')?.addEventListener('click', () => window.location.href = 'home.html');
  document.getElementById('infoHeaderBtn')?.addEventListener('click', () => {
    showAlert(
      "📋 How It Works:\n\n1️⃣ Enter your WhatsApp number\n2️⃣ Browse the menu and add items to your order\n3️⃣ Confirm your order – you'll receive a ticket number\n4️⃣ Scan the QR code to track your order status\n5️⃣ Wait for your number to be called on the 'Now Serving' board\n\n✅ Your food will be prepared fresh and ready when you arrive!",
      "Smart Queue Guide", "info"
    );
  });
  document.getElementById('profileBtn')?.addEventListener('click', () => window.location.href = 'profile.html');

  loadUserAndUpdateGreeting();
  window.addEventListener('storage', (e) => { if (e.key === 'rands_accounts_v2') loadUserAndUpdateGreeting(); });
})();
</script>

<!-- ========== END GLOBAL HEADER ========== -->

<!-- TITLE -->

<div class="smartq-title">
  <h2>🥩 Butcher <span>SmartQ</span></h2>
  <p>Pre-order & join the queue instantly</p>
</div>

<div class="kiosk-container">
  <!-- JOIN PANEL -->
  <div class="join-panel">
    <div class="panel-label">Your Contact</div>
    <div class="form-group">
      <label><i class="fab fa-whatsapp"></i> WhatsApp Number</label>
      <input type="tel" id="whatsappNumber" placeholder="e.g. 0635713652" value="" maxlength="10" inputmode="numeric">
      <div class="phone-hint" id="phoneHint">
        <i class="fas fa-info-circle"></i> Enter 10-digit number
      </div>
    </div>
    <button class="join-btn" id="joinBtn" disabled>
      <i class="fas fa-utensils"></i> Pre-order &amp; Queue
    </button>
  </div>

  <!-- NOW SERVING -->

  <div class="serving-panel">
    <h2>🔴 NOW SERVING</h2>
    <div id="butcherServing" class="counter-serving">
      <h3>🥩 The Butcher Counter</h3>
      <div class="serving-number" id="butcherTicket">—</div>
      <div class="serving-sub">Current ticket</div>
    </div>
  </div>
</div>

<div class="footer">Created by Mziwonke KaBuyaphi</div>

<!-- Bottom navigation -->

<div id="bottomNav"></div>

<!-- Popup Modal -->

<div id="popupModal" class="popup-modal-overlay">
  <div class="popup-modal">
    <div class="popup-icon" id="popupIcon">⚠️</div>
    <div class="popup-title" id="popupTitle">Notification</div>
    <div class="popup-message" id="popupMessage">Message here</div>
    <button class="popup-btn" id="popupOkBtn">Got it</button>
  </div>
</div>

<script src="app.js"></script>

<script>
  const QUEUE_KEY = "butcher_shop_queue";
  const ORDERS_KEY = "butcher_shop_orders";

  const menu = {
    meat: [
      { id: "ribeye",       name: "🥩 Ribeye Steak",  price: 159 },
      { id: "beef_sausage", name: "🌭 Beef Sausage",   price: 89  },
      { id: "lamb_chop",    name: "🍖 Lamb Chop",      price: 199 },
      { id: "tbone",        name: "🥩 T-Bone Steak",   price: 249 }
    ],
    meals: [
      { id: "steak_combo",      name: "🍟 Steak + Chips", price: 189 },
      { id: "boerewors_roll",   name: "🌭 Boerewors Roll", price: 65 },
      { id: "barbecue_platter", name: "🔥 BBQ Platter",    price: 299 }
    ],
    sides: [
      { id: "chips",     name: "🍟 Chips",       price: 25 },
      { id: "salad",     name: "🥗 Fresh Salad", price: 32 },
      { id: "pap_sheba", name: "🍚 Pap & Sheba", price: 28 }
    ],
    drinks: [
      { id: "coke",  name: "🥤 Coca-Cola",    price: 18 },
      { id: "water", name: "💧 Still Water",   price: 12 },
      { id: "beer",  name: "🍺 Castle Lager",  price: 28 }
    ]
  };

  // ── POPUP SYSTEM ──
  function showPopup(options) {
    return new Promise((resolve) => {
      const modal    = document.getElementById('popupModal');
      const icon     = document.getElementById('popupIcon');
      const title    = document.getElementById('popupTitle');
      const message  = document.getElementById('popupMessage');
      const okBtn    = document.getElementById('popupOkBtn');
      const icons    = { warning:'⚠️', error:'❌', success:'✅', info:'ℹ️' };
      icon.innerHTML = options.icon || icons[options.type] || 'ℹ️';
      icon.className = `popup-icon ${options.type || 'info'}`;
      title.innerText   = options.title   || 'Notification';
      message.innerText = options.message || '';
      const newOkBtn = okBtn.cloneNode(true);
      okBtn.parentNode.replaceChild(newOkBtn, okBtn);
      newOkBtn.onclick = () => { modal.classList.remove('active'); resolve(true); };
      modal.classList.add('active');
    });
  }
  async function showAlert(message, title = 'Notification', type = 'info') {
    await showPopup({ message, title, type });
  }

  // ── QUEUE FUNCTIONS ──
  function getQueue()   { return JSON.parse(localStorage.getItem(QUEUE_KEY)   || '[]'); }
  function saveQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
  function getOrders()  { return JSON.parse(localStorage.getItem(ORDERS_KEY)  || '[]'); }
  function saveOrders(orders) { localStorage.setItem(ORDERS_KEY, JSON.stringify(orders)); }

  function generateTicketNumber() {
    const queue = getQueue();
    let nextNum = queue.length + 1;
    while (queue.some(t => t.ticketNumber === `B-${String(nextNum).padStart(3,'0')}`)) nextNum++;
    return `B-${String(nextNum).padStart(3,'0')}`;
  }

  function updateNowServing() {
    const queue = getQueue();
    document.getElementById('butcherTicket').textContent = queue.length > 0 ? queue[0].ticketNumber : '—';
  }

  function validatePhoneNumber(phone) {
    const d = phone.replace(/\D/g,'');
    return d.length === 10 && /^[0-9]{10}$/.test(d);
  }

  function updateJoinButtonState() {
    const phoneInput = document.getElementById('whatsappNumber');
    const joinBtn    = document.getElementById('joinBtn');
    const phoneHint  = document.getElementById('phoneHint');
    const v = phoneInput.value.trim();
    if (validatePhoneNumber(v)) {
      joinBtn.disabled = false;
      joinBtn.classList.remove('disabled');
      phoneInput.classList.add('valid');
      phoneInput.classList.remove('invalid');
      phoneHint.innerHTML = '<i class="fas fa-check-circle"></i> Valid phone number';
      phoneHint.className = 'phone-hint valid';
    } else {
      joinBtn.disabled = true;
      joinBtn.classList.add('disabled');
      phoneInput.classList.remove('valid');
      phoneInput.classList.add('invalid');
      if (v.length > 0 && v.replace(/\D/g,'').length < 10) {
        phoneHint.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Need 10 digits';
      } else {
        phoneHint.innerHTML = '<i class="fas fa-info-circle"></i> Enter 10-digit number';
      }
      phoneHint.className = 'phone-hint invalid';
    }
  }

  function animateCartBounce() {
    const cartSection = document.querySelector('.cart-section');
    if (cartSection) {
      cartSection.classList.add('cart-bounce');
      setTimeout(() => cartSection.classList.remove('cart-bounce'), 350);
    }
  }

  function highlightCartItem(itemIndex) {
    setTimeout(() => {
      const cartItems = document.querySelectorAll('.cart-item-row');
      if (cartItems[itemIndex]) {
        cartItems[itemIndex].classList.add('new-item-highlight');
        setTimeout(() => cartItems[itemIndex].classList.remove('new-item-highlight'), 500);
      }
    }, 100);
  }

  function animateThrowToCart(element, callback) {
    if (!element) { if (callback) callback(); return; }
    const rect = element.getBoundingClientRect();
    const cartSection = document.querySelector('.cart-section');
    const cartRect = cartSection ? cartSection.getBoundingClientRect() : null;
    const clone = element.cloneNode(true);
    clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;margin:0;z-index:20000;pointer-events:none;transition:all 0.4s cubic-bezier(0.34,1.2,0.64,1);border-radius:18px;box-shadow:0 4px 20px rgba(227,6,19,0.4);`;
    document.body.appendChild(clone);
    if (cartRect) {
      setTimeout(() => {
        clone.style.transform = `translate(${cartRect.left+cartRect.width/2-rect.left-rect.width/2}px, ${cartRect.top+cartRect.height/2-rect.top-rect.height/2}px) scale(0.3) rotate(15deg)`;
        clone.style.opacity = '0.4';
      }, 10);
    } else {
      clone.style.transform = 'scale(0.1) rotate(15deg)';
      clone.style.opacity = '0';
    }
    setTimeout(() => { clone.remove(); if (callback) callback(); }, 450);
  }

  function showTicketConfirmation(ticketNumber, total) {
    const baseUrl = window.location.origin + window.location.pathname.replace('queue.html','customer-status-page.html');
    const trackingUrl = `${baseUrl}?order=${ticketNumber}&counter=butcher`;
    const overlay = document.createElement('div');
    overlay.className = 'ticket-overlay';
    overlay.innerHTML = `
      <div class="ticket-confirmation">
        <div class="ticket-scroll-content">
          <div class="check-icon"><i class="fas fa-check"></i></div>
          <h2>Order Confirmed!</h2>
          <p>Your ticket number is</p>
          <div class="ticket-number-display">${ticketNumber}</div>
          <div class="qr-code-container"><div id="confirmationQrcode"></div></div>
          <div class="qr-zoom-instruction zoom-hint"><i class="fas fa-hand-peace"></i> Pinch to zoom <i class="fas fa-magnifying-glass-plus"></i></div>
          <p style="margin:8px 0 10px; font-weight:600; font-size:0.82rem;">Scan to track your order</p>
          <div class="tracking-link"><small>Or use this link:</small><br><span id="trackingUrl">${trackingUrl}</span></div>
          <button class="copy-btn" id="copyLinkBtn">📋 Copy Link</button>
          <div class="wait-info"><i class="fas fa-clock"></i> Estimated wait: ~${Math.max(5, Math.floor(Math.random()*15)+5)} minutes<br><small>You will be called when your order is ready</small></div>
          <button class="reset-btn" id="closeConfirmationBtn">Start New Order →</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const qrContainer = document.getElementById('confirmationQrcode');
    if (qrContainer && typeof QRCode !== 'undefined') {
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, { text: trackingUrl, width: 160, height: 160, colorDark:"#000", colorLight:"#fff", correctLevel: QRCode.CorrectLevel.H });
      const qrWrapper = qrContainer.parentElement;
      if (qrWrapper) { qrWrapper.style.overflowX = 'auto'; qrWrapper.style.webkitOverflowScrolling = 'touch'; }
    } else {
      qrContainer.innerHTML = `<div style="width:140px;height:140px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;border-radius:16px;font-size:12px;">QR Code<br>Not Available</div>`;
    }
    document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(trackingUrl);
      showAlert('Tracking link copied to clipboard!', 'Copied', 'success');
    });
    document.getElementById('closeConfirmationBtn')?.addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    localStorage.setItem('lastTicket', ticketNumber);
    localStorage.setItem('lastTrackingUrl', trackingUrl);
  }

  function openPreorderModal() {
    let cart = [];
    let currentCategory = "meat";
    const modal = document.createElement('div');
    modal.className = 'preorder-modal';

    function renderModal() {
      const categoriesHtml = Object.keys(menu).map(cat =>
        `<button class="cat-pill ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${cat.toUpperCase()}</button>`
      ).join('');
      const items = menu[currentCategory] || [];
      const itemsHtml = items.map(item => `
        <div class="menu-item" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}">
          <div class="item-name">${item.name}</div>
          <div class="item-price">R${item.price}</div>
        </div>`).join('');
      const cartTotal = cart.reduce((sum,i) => sum + (i.price * i.quantity), 0);
      const cartItemCount = cart.reduce((s,i) => s + i.quantity, 0);
      const cartHtml = cart.length > 0 ? cart.map((item, idx) => `
        <div class="cart-item-row" data-cart-index="${idx}">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">R${item.price} each</div>
          </div>
          <div class="cart-item-quantity">
            <button class="qty-btn inc-qty" data-idx="${idx}">+</button>
            <span class="qty-value">${item.quantity}</span>
            <button class="qty-btn dec-qty" data-idx="${idx}">-</button>
          </div>
          <div class="cart-item-total">R${(item.price * item.quantity).toFixed(2)}</div>
          <button class="remove-item" data-idx="${idx}">🗑️</button>
        </div>`).join('')
        : '<div class="empty-cart-message"><i class="fas fa-shopping-cart"></i> Your cart is empty<br>Tap items above to add</div>';

      modal.innerHTML = `
        <div class="preorder-container">
          <div class="modal-handle"></div>
          <button class="close-modal">&times;</button>
          <div class="modal-title">📝 Pre-order Menu</div>
          <div class="modal-subtitle">Tap items to add to your order</div>
          <div class="category-row" id="categoryRow">${categoriesHtml}</div>
          <div class="items-grid" id="itemsGrid">${itemsHtml}</div>
          <div class="cart-section">
            <div class="cart-header">
              <i class="fas fa-shopping-cart"></i> Your Order
              ${cartItemCount > 0 ? `<span class="cart-item-count">${cartItemCount}</span>` : ''}
            </div>
            <div class="cart-items-list" id="cartList">${cartHtml}</div>
            <div class="cart-total"><span>Total</span> R${cartTotal.toFixed(2)}</div>
            <input type="text" id="specialInstructions" class="special-instructions" placeholder="Special instructions (e.g., well done, no salt)">
            <button id="confirmOrderBtn" class="btn-primary-modal" ${cart.length === 0 ? 'disabled' : ''}>
              <i class="fas fa-check-circle"></i> Confirm &amp; Join Queue
            </button>
          </div>
        </div>`;

      modal.querySelectorAll('.cat-pill').forEach(btn => btn.addEventListener('click', () => { currentCategory = btn.dataset.cat; renderModal(); }));
      modal.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = item.dataset.id, name = item.dataset.name, price = parseFloat(item.dataset.price);
          animateThrowToCart(item, () => {
            const existing = cart.find(i => i.id === id);
            let newItemIndex = -1;
            if (existing) { existing.quantity++; newItemIndex = cart.findIndex(i => i.id === id); }
            else { cart.push({ id, name, price, quantity: 1 }); newItemIndex = cart.length - 1; }
            renderModal(); animateCartBounce();
            if (newItemIndex >= 0) highlightCartItem(newItemIndex);
          });
        });
      });
      modal.querySelectorAll('.inc-qty').forEach(btn => btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        cart[idx].quantity++;
        renderModal(); animateCartBounce(); highlightCartItem(idx);
      }));
      modal.querySelectorAll('.dec-qty').forEach(btn => btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.idx);
        if (cart[idx].quantity > 1) { cart[idx].quantity--; renderModal(); animateCartBounce(); highlightCartItem(idx); }
        else { cart.splice(idx, 1); renderModal(); animateCartBounce(); }
      }));
      modal.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', (e) => {
        e.stopPropagation(); cart.splice(parseInt(btn.dataset.idx), 1); renderModal(); animateCartBounce();
      }));
      modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());

      const confirmBtn = modal.querySelector('#confirmOrderBtn');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', async () => {
          if (cart.length === 0) { await showAlert('Please add items to your order', 'Empty Cart', 'warning'); return; }
          const whatsapp = document.getElementById('whatsappNumber').value.trim();
          if (!validatePhoneNumber(whatsapp)) { await showAlert('Please enter a valid 10-digit WhatsApp number', 'Invalid Number', 'warning'); return; }
          const ticketNumber = generateTicketNumber();
          const total = cart.reduce((sum,i) => sum + (i.price * i.quantity), 0);
          const instructions = document.getElementById('specialInstructions')?.value || '';
          const queue = getQueue();
          queue.push({ ticketNumber, timestamp: new Date().toISOString(), called: false, customerName: `Customer ${ticketNumber}`, whatsapp });
          saveQueue(queue);
          const orders = getOrders();
          orders.push({ ticketNumber, customerName: `Customer ${ticketNumber}`, whatsapp, items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity, notes: instructions })), total, paid: false, kitchenStatus: 'new', createdAt: new Date().toISOString() });
          saveOrders(orders);
          modal.remove();
          showTicketConfirmation(ticketNumber, total);
          document.getElementById('whatsappNumber').value = '';
          updateJoinButtonState();
          updateNowServing();
          window.dispatchEvent(new StorageEvent('storage', { key: QUEUE_KEY }));
          window.dispatchEvent(new StorageEvent('storage', { key: ORDERS_KEY }));
        });
      }
    }
    renderModal();
    document.body.appendChild(modal);
  }

  function autoFillWalletPhone() {
    const saved = localStorage.getItem('rands_accounts_v2');
    if (saved) {
      try {
        const accounts = JSON.parse(saved);
        const userAccount = accounts.find(acc => acc.name && acc.name.toLowerCase().includes('mziwonke')) || accounts[0];
        if (userAccount) {
          let phone = userAccount.phone || userAccount.id;
          if (phone) {
            let digits = phone.replace(/\D/g,'');
            if (digits.length >= 10) {
              digits = digits.slice(-10);
              const phoneInput = document.getElementById('whatsappNumber');
              if (phoneInput) { phoneInput.value = digits; updateJoinButtonState(); }
            }
          }
        }
      } catch(e) { console.error(e); }
    }
  }

  const phoneInput = document.getElementById('whatsappNumber');
  phoneInput.addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g,'');
    if (value.length > 10) value = value.slice(0, 10);
    e.target.value = value;
    updateJoinButtonState();
  });
  phoneInput.addEventListener('keypress', function(e) { if (!/[0-9]/.test(e.key)) e.preventDefault(); });

  document.getElementById('joinBtn').addEventListener('click', () => {
    const phoneValue = phoneInput.value.trim();
    if (validatePhoneNumber(phoneValue)) openPreorderModal();
    else showAlert('Please enter a valid 10-digit WhatsApp number', 'Invalid Number', 'warning');
  });

  updateNowServing();
  setInterval(updateNowServing, 5000);
  updateJoinButtonState();
  autoFillWalletPhone();

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof loadBottomNav === 'function') loadBottomNav();
  });
</script>

</body>
</html>
