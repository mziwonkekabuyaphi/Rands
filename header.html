<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rands Wallet Header</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&family=Kaushan+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .movable-header-group {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            transition: transform 0.3s ease;
            will-change: transform;
        }
        
        .header-hidden {
            transform: translateY(-100%);
        }
        
        .app-header {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #eff3f8;
        }
        
        .logo {
            height: 45px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            border-radius: 12px;
        }
        
        .header-icons {
            display: flex;
            gap: 8px;
        }
        
        .header-icon {
            width: 40px;
            height: 40px;
            background: #f7f9fd;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #E30613;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .header-icon:active {
            transform: scale(0.94);
        }
        
        .welcome-greeting {
            padding: 12px 24px 8px 24px;
            background: white;
            font-size: 0.95rem;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #f0f4fa;
            flex-wrap: wrap;
        }
        
        .welcome-greeting i {
            color: #E30613;
            font-size: 1rem;
        }
        
        .welcome-greeting span {
            background: linear-gradient(135deg, #E30613 0%, #b0020e 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
        }
    </style>
</head>
<body>
    <!-- HEADER COMPONENT - Ready to Integrate -->
    <div class="movable-header-group" id="movableHeaderGroup">
        <div class="app-header">
            <img src="images/rands-logo.png" alt="Rands Wallet" class="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%23E30613\'/%3E%3Ctext x=\'50\' y=\'65\' font-size=\'40\' text-anchor=\'middle\' fill=\'white\'%3ER%3C/text%3E%3C/svg%3E'">
            <div class="header-icons">
                <span class="header-icon" id="logoutHeaderBtn"><i class="fas fa-sign-out-alt"></i></span>
                <span class="header-icon" id="posModeBtn"><i class="fas fa-cash-register"></i></span>
                <span class="header-icon" id="profileBtn"><i class="fas fa-user-circle"></i></span>
            </div>
        </div>
        <div class="welcome-greeting" id="welcomeGreeting">
            <i class="fas fa-hand-peace"></i> <span id="greetingName">Molo, User</span>
            <span id="pendingRequestIndicator" style="display: none;">⏳ Unlock Pending</span>
        </div>
    </div>

    <script>
        // Header scroll behavior
        const header = document.getElementById('movableHeaderGroup');
        let lastScroll = 0;
        
        if (header) {
            window.addEventListener('scroll', () => {
                const currentScroll = window.scrollY;
                if (currentScroll > lastScroll && currentScroll > 50) {
                    header.classList.add('header-hidden');
                } else if (currentScroll < lastScroll) {
                    header.classList.remove('header-hidden');
                }
                lastScroll = currentScroll;
            }, { passive: true });
        }
        
        // Header button handlers - ready for integration
        document.getElementById('logoutHeaderBtn')?.addEventListener('click', () => console.log('Logout clicked'));
        document.getElementById('posModeBtn')?.addEventListener('click', () => console.log('POS Mode clicked'));
        document.getElementById('profileBtn')?.addEventListener('click', () => console.log('Profile clicked'));
    </script>
</body>
</html>
