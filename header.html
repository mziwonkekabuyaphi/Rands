<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rands Wallet Header</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&family=Kaushan+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .movable-header-group {
            position: sticky;
            top: 16px;
            z-index: 100;
            margin: 0 16px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease, top 0.2s ease;
            will-change: transform;
            border: 1px solid rgba(227, 6, 19, 0.15);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(227, 6, 19, 0.05);
        }
        
        .header-hidden {
            transform: translateY(-100%);
            top: 0;
        }
        
        .app-header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
        }
        
        .logo {
            height: 40px;
            width: auto;
            max-width: 150px;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .header-icons {
            display: flex;
            gap: 10px;
        }
        
        .header-icon {
            width: 38px;
            height: 38px;
            background: rgba(227, 6, 19, 0.08);
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #E30613;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .header-icon:hover {
            background: #E30613;
            color: white;
            transform: scale(1.02);
        }
        
        .header-icon:active {
            transform: scale(0.94);
        }
        
        .welcome-greeting {
            padding: 10px 20px 14px 20px;
            background: transparent;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(227, 6, 19, 0.08);
        }
        
        .welcome-greeting i {
            color: #E30613;
            font-size: 1rem;
        }
        
        .welcome-greeting span {
            background: linear-gradient(135deg, #E30613 0%, #b0020e 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
        }
        
        .pending-badge {
            background: rgba(227, 6, 19, 0.1);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #E30613;
        }
    </style>
</head>
<body>
    <div class="movable-header-group" id="movableHeaderGroup">
        <div class="app-header">
            <img src="images/rands-logo.png" alt="Rands Wallet" class="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%23E30613\'/%3E%3Ctext x=\'50\' y=\'65\' font-size=\'40\' text-anchor=\'middle\' fill=\'white\'%3ER%3C/text%3E%3C/svg%3E'">
            <div class="header-icons">
                <span class="header-icon" id="logoutHeaderBtn"><i class="fas fa-sign-out-alt"></i></span>
                <span class="header-icon" id="posModeBtn"><i class="fas fa-cash-register"></i></span>
                <span class="header-icon" id="profileBtn"><i class="fas fa-user-circle"></i></span>
            </div>
        </div>
        <div class="welcome-greeting" id="welcomeGreeting">
            <i class="fas fa-hand-peace"></i> 
            <span id="greetingName">Molo, User</span>
            <span class="pending-badge" id="pendingRequestIndicator" style="display: none;">⏳ Unlock Pending</span>
        </div>
    </div>

    <script>
        const header = document.getElementById('movableHeaderGroup');
        let lastScroll = 0;
        
        if (header) {
            window.addEventListener('scroll', () => {
                const currentScroll = window.scrollY;
                if (currentScroll > lastScroll && currentScroll > 80) {
                    header.classList.add('header-hidden');
                } else if (currentScroll < lastScroll) {
                    header.classList.remove('header-hidden');
                }
                lastScroll = currentScroll;
            }, { passive: true });
        }
        
        document.getElementById('logoutHeaderBtn')?.addEventListener('click', () => console.log('Logout clicked'));
        document.getElementById('posModeBtn')?.addEventListener('click', () => console.log('POS Mode clicked'));
        document.getElementById('profileBtn')?.addEventListener('click', () => console.log('Profile clicked'));
    </script>
</body>
</html>
